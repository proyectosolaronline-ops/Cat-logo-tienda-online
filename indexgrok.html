<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio Solar • Mapa 20km</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{ --primary:#1a73e8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#000; color:#fff; height:100vh; overflow:hidden; }

#map { width:100%; height:100vh; }

.header {
  position:absolute; top:0; left:0; right:0; z-index:1100;
  background:linear-gradient(180deg, rgba(0,0,0,.8) 0%, transparent 100%);
  padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
}
.header-logo { font-size:24px; font-weight:700; font-family:'Outfit',sans-serif; }

.search-overlay {
  position:absolute; top:75px; left:50%; transform:translateX(-50%);
  width:90%; max-width:420px; z-index:1000;
  background:#fff; border-radius:50px; box-shadow:0 6px 25px rgba(0,0,0,.4);
  display:flex; align-items:center; padding:12px 20px;
}
.search-overlay input { flex:1; border:none; outline:none; font-size:16px; }

.count-float {
  position:absolute; bottom:100px; left:20px; z-index:1000;
  background:rgba(0,0,0,.85); color:#fff; padding:10px 18px;
  border-radius:50px; font-size:14.5px; font-weight:600;
}

/* Botón flotante "Mostrar tiendas encontradas" */
.btn-mostrar {
  position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:1000; background:var(--primary); color:#fff;
  border:none; padding:14px 28px; border-radius:50px; font-size:16px;
  font-weight:600; box-shadow:0 6px 20px rgba(26,115,232,.4);
  cursor:pointer; white-space:nowrap;
}

/* Modal Lista de Tiendas */
.modal {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
  z-index:2000; align-items:center; justify-content:center; padding:15px;
}
.modal-content {
  background:#fff; color:#222; width:100%; max-width:460px;
  border-radius:20px; max-height:85vh; overflow:hidden;
}
.modal-header {
  padding:20px; background:var(--primary); color:#fff; font-weight:700; font-size:18px;
  display:flex; justify-content:space-between; align-items:center;
}
.modal-body {
  padding:15px; max-height:60vh; overflow-y:auto;
}
.store-item {
  display:flex; gap:15px; padding:15px; border-bottom:1px solid #eee; cursor:pointer;
}
.store-item:hover { background:#f8f9fa; }
.store-logo {
  width:60px; height:60px; border-radius:12px; overflow:hidden; flex-shrink:0;
}
.store-info h3 { margin:0 0 6px 0; font-size:17px; }
.store-distance { color:#16a34a; font-weight:600; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">☀️ Directorio Solar</div>
  <div style="font-size:14px;">Radio: 20 km</div>
</div>

<div id="map"></div>

<div class="search-overlay">
  <input type="text" id="search-input" placeholder="Buscar en el mapa..." onkeyup="filterMarkers()">
</div>

<div class="count-float" id="count-float">Cargando tiendas cercanas...</div>

<button class="btn-mostrar" onclick="showStoresModal()">
  📋 Mostrar tiendas encontradas
</button>

<!-- MODAL LISTA DE TIENDAS -->
<div class="modal" id="stores-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Tiendas encontradas (≤ 20 km)</span>
      <span onclick="closeModal()" style="cursor:pointer;font-size:24px;">×</span>
    </div>
    <div class="modal-body" id="modal-stores-list">
      <!-- Se llena con JavaScript -->
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const BACKEND = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';
const RADIO_KM = 20;

let ALL_STORES = [];
let map;
let markers = [];
let userLat = null;
let userLng = null;
let nearbyStores = [];

// ==================== UTILIDADES ====================
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fixImgUrl(u) {
  if (!u) return '';
  const m = u.match(/[?&]id=([\w-]+)/) || u.match(/\/d\/([\w-]+)/);
  return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : u;
}

// ==================== CARGA Y UBICACIÓN ====================
async function loadStores() {
  try {
    const r = await fetch(BACKEND + '?action=stores.directory');
    const data = await r.json();
    ALL_STORES = (data.stores || []).map(s => {
      s.config = typeof s.config === 'string' ? JSON.parse(s.config) : s.config || {};
      return s;
    });
    getUserLocation();
  } catch(e) {
    document.getElementById('count-float').textContent = 'Error al cargar';
  }
}

function getUserLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      showStoresOnMap();
    }, () => {
      userLat = 19.4326; userLng = -99.1332;
      showStoresOnMap();
    });
  }
}

// ==================== MAPA ====================
function showStoresOnMap() {
  if (!userLat || !userLng) return;

  nearbyStores = ALL_STORES.filter(s => {
    const cfg = s.config || {};
    const lat = parseFloat(cfg.locationLat);
    const lng = parseFloat(cfg.locationLng);
    if (isNaN(lat) || isNaN(lng)) return false;
    return haversineKm(userLat, userLng, lat, lng) <= RADIO_KM;
  }).sort((a,b) => {
    const ca = a.config || {}, cb = b.config || {};
    return haversineKm(userLat, userLng, parseFloat(ca.locationLat), parseFloat(ca.locationLng)) -
           haversineKm(userLat, userLng, parseFloat(cb.locationLat), parseFloat(cb.locationLng));
  });

  initMap(nearbyStores);
}

function initMap(stores) {
  if (map) map.remove();

  map = L.map('map').setView([userLat, userLng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // Marcador usuario
  L.circleMarker([userLat, userLng], {radius:8, color:'#16a34a', fillColor:'#fff', weight:3}).addTo(map);

  markers = [];

  stores.forEach(store => {
    const cfg = store.config || {};
    const lat = parseFloat(cfg.locationLat);
    const lng = parseFloat(cfg.locationLng);
    if (isNaN(lat) || isNaN(lng)) return;

    const logoUrl = fixImgUrl(cfg.logo || cfg.logoUrl);
    const pinHTML = logoUrl 
      ? `<img src="${logoUrl}" style="width:48px;height:48px;border-radius:50%;border:4px solid #fff;object-fit:cover;">`
      : `<div style="width:48px;height:48px;background:#1a73e8;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:4px solid #fff;">☀️</div>`;

    const icon = L.divIcon({ html: pinHTML, className:'', iconSize:[52,52], iconAnchor:[26,26] });

    const marker = L.marker([lat, lng], {icon}).addTo(map);
    markers.push({marker, store});
  });

  document.getElementById('count-float').innerHTML = `✅ ${stores.length} tiendas a menos de 20 km`;
}

// ==================== MODAL CON LISTA DE TIENDAS ====================
function showStoresModal() {
  const container = document.getElementById('modal-stores-list');
  container.innerHTML = '';

  if (nearbyStores.length === 0) {
    container.innerHTML = '<p style="text-align:center;padding:40px;color:#666;">No se encontraron tiendas cercanas.</p>';
  } else {
    nearbyStores.forEach(store => {
      const cfg = store.config || {};
      const logoUrl = fixImgUrl(cfg.logo || cfg.logoUrl);
      const dist = userLat ? haversineKm(userLat, userLng, parseFloat(cfg.locationLat||0), parseFloat(cfg.locationLng||0)).toFixed(1) : '?';

      const item = document.createElement('div');
      item.className = 'store-item';
      item.innerHTML = `
        <div class="store-logo">
          ${logoUrl ? `<img src="${logoUrl}" style="width:100%;height:100%;object-fit:cover;">` : '☀️'}
        </div>
        <div class="store-info">
          <h3>${store.name}</h3>
          <div class="store-distance">📍 ${dist} km</div>
          <p style="margin:6px 0 0 0; font-size:13px; color:#555;">${cfg.description || 'Tienda de energía solar'}</p>
        </div>
      `;
      item.onclick = () => {
        closeModal();
        const url = `https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=${encodeURIComponent(BACKEND)}&store=${store.storeId}`;
        window.open(url, '_blank');
      };
      container.appendChild(item);
    });
  }

  document.getElementById('stores-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('stores-modal').style.display = 'none';
}

// Buscador en mapa
function filterMarkers() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  markers.forEach(item => {
    const text = (item.store.name + " " + (item.store.config.description || "")).toLowerCase();
    if (!q || text.includes(q)) {
      item.marker.addTo(map);
    } else {
      map.removeLayer(item.marker);
    }
  });
}

// Iniciar
window.addEventListener('load', loadStores);
</script>
</body>
</html>
