<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zonas · Directorio Easylink</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #f5f6fa;
  --surface: #fff;
  --border: #e8eaf0;
  --accent: #1a73e8;
  --accent2: #ff6900;
  --green: #16a34a;
  --text: #111;
  --muted: #888;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* HEADER */
#header {
  background:linear-gradient(135deg,#1a73e8,#0d47a1);
  padding:12px 16px;
  flex-shrink:0;
  z-index:1100;
}
.h-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.h-logo { width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px; }
.h-title { font-size:15px;font-weight:800;color:#fff;line-height:1.2; }
.h-sub { font-size:10px;color:rgba(255,255,255,.6);font-family:'DM Mono',monospace; }

.mode-tabs { display:flex;gap:6px;margin-bottom:8px; }
.tab {
  flex:1; padding:8px 0; border:none; border-radius:8px;
  font-family:'Syne',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; transition:background .15s,color .15s;
}
.tab.active { background:#fff; color:var(--accent); }
.tab.inactive { background:rgba(255,255,255,.15); color:rgba(255,255,255,.7); }

/* BOTÓN AGREGAR TIENDA */
#btn-add-mode {
  width:100%;
  padding:9px;
  background:rgba(255,255,255,.15);
  color:#fff;
  border:1.5px solid rgba(255,255,255,.35);
  border-radius:10px;
  font-family:'Syne',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
#btn-add-mode.add-active {
  background:rgba(255,105,0,.5);
  border-color:#ff6900;
  animation:pulse-add .8s ease-in-out infinite alternate;
}
@keyframes pulse-add {
  from { box-shadow: 0 0 0 0 rgba(255,105,0,.4); }
  to   { box-shadow: 0 0 0 8px rgba(255,105,0,0); }
}

/* PANEL GPS */
#panel-gps {
  background:#fff;
  padding:10px 16px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  z-index:1050;
}
.gps-row { display:flex;gap:8px;align-items:center; }
.gps-btn {
  flex:1; padding:10px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.gps-btn:active { background:#0d5cc4; }
.radio-select {
  padding:10px 8px; border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Mono',monospace; font-size:12px; background:#f5f6fa;
  color:var(--text); outline:none; cursor:pointer;
}
.gps-status {
  margin-top:6px; font-size:11px; font-family:'DM Mono',monospace;
  color:var(--muted); display:none;
}

/* PANEL ESTADO */
#panel-estado {
  background:#fff;
  padding:10px 16px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  z-index:1050;
  display:none;
}
.estado-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
  max-height:160px; overflow-y:auto;
}
.estado-chip {
  padding:8px 6px; border:1.5px solid var(--border);
  border-radius:8px; font-size:11px; font-weight:700;
  text-align:center; cursor:pointer; transition:all .15s;
  background:#f5f6fa; color:var(--text);
}
.estado-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.estado-chip:active { transform:scale(.96); }

/* MAP */
#map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; z-index:1; }

/* BANNER ADD MODE (sobre el mapa) */
#add-banner {
  display:none;
  position:absolute;
  top:0; left:0; right:0;
  z-index:1200;
  background:linear-gradient(135deg,#ff6900,#e65c00);
  color:#fff;
  text-align:center;
  padding:13px 16px;
  font-size:13px;
  font-weight:700;
  font-family:'Syne',sans-serif;
  box-shadow:0 3px 12px rgba(230,92,0,.4);
  animation:slideDown .25s ease-out;
}
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
#add-banner.show { display:block; }
#btn-cancel-add {
  margin-left:12px;
  background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.4);
  color:#fff;
  padding:5px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-family:'Syne',sans-serif;
  font-weight:700;
}

/* BOTTOM SHEET */
#sheet-bg {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.6); z-index:2000;
  align-items:flex-end; justify-content:center;
}
#sheet-bg.open { display:flex; }
#sheet {
  background:#fff; width:100%; border-radius:20px 20px 0 0;
  max-height:85dvh; display:flex; flex-direction:column;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-drag { width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px; }
.sheet-head {
  padding:8px 16px 12px; border-bottom:1px solid #f0f0f0;
  display:flex;align-items:center;justify-content:space-between;
}
.sheet-title { font-size:15px;font-weight:800; }
.sheet-count { font-size:11px;font-family:'DM Mono',monospace;color:var(--muted); }
.sheet-close { width:30px;height:30px;border-radius:50%;background:#f0f0f0;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.sheet-body { flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch; }

/* STORE CARD */
.store-card {
  display:flex; gap:12px; padding:12px 16px;
  border-bottom:1px solid #f5f5f5; cursor:pointer;
  transition:background .1s;
}
.store-card:active { background:#f0f4ff; }
.store-thumb {
  width:52px;height:52px;border-radius:12px;
  overflow:hidden;background:#fff3e0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;border:1px solid #ffe0cc;
}
.store-thumb img { width:100%;height:100%;object-fit:cover; }
.store-info { flex:1;min-width:0; }
.store-name { font-size:14px;font-weight:700;color:#111;margin-bottom:2px; }
.store-tipo { font-size:10px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.04em; }
.store-dist { font-size:12px;color:var(--green);font-weight:700;margin-top:3px; }
.store-loc { font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.store-actions { display:flex;flex-direction:column;gap:4px;justify-content:center; }
.btn-sm {
  padding:6px 10px;border:none;border-radius:8px;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Syne',sans-serif;color:#fff;
  display:flex;align-items:center;gap:4px;
}
.btn-wpp { background:#25D366; }
.btn-map { background:var(--accent); }

/* POPUP TIENDA */
#ext-popup-bg {
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.72);z-index:2100;
  align-items:flex-end;justify-content:center;
}
#ext-popup-bg.open { display:flex; }
#ext-popup {
  background:#fff;color:#222;border-radius:24px 24px 0 0;
  width:100%;max-height:90dvh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
.ext-drag { width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;display:block; }
.ext-foto { width:100%;height:200px;object-fit:cover;display:block;background:#f0f0f0; }
.ext-foto-ph { width:100%;height:200px;background:linear-gradient(135deg,#fff3e0,#ffe0b2);display:flex;align-items:center;justify-content:center;font-size:72px; }
.ext-body { padding:16px 18px 36px;position:relative; }
.ext-close { position:absolute;top:-42px;right:14px;width:32px;height:32px;background:rgba(0,0,0,.5);border:none;border-radius:50%;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.ext-pill { display:inline-flex;align-items:center;gap:5px;background:#fff3e0;color:#e65100;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px; }
.ext-nombre { font-size:22px;font-weight:800;color:#111;line-height:1.2;margin-bottom:4px; }
.ext-ubicacion { font-size:12px;color:#888;margin-bottom:16px; }
.ext-actions { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px; }
.ext-btn { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:16px 10px;border-radius:16px;border:none;cursor:pointer;font-size:12px;font-weight:700;color:#fff;font-family:'Syne',sans-serif; }
.ext-btn-icon { font-size:24px;line-height:1; }
.ext-btn-llegar { background:#1a73e8; }
.ext-btn-wpp { background:#25D366; }
.ext-btn-link { display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#f5f6fa;color:#1a73e8;border-radius:14px;font-size:14px;font-weight:700;text-decoration:none;border:1.5px solid #e0e7ff; }

/* FAB LISTA */
.fab-list {
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:1100;background:var(--accent);color:#fff;border:none;
  padding:13px 24px;border-radius:50px;font-size:14px;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  box-shadow:0 6px 22px rgba(26,115,232,.5);
  display:none;white-space:nowrap;
}

/* EMPTY */
.empty { text-align:center;padding:50px 20px;color:var(--muted);font-size:14px; }
.empty .big { font-size:40px;margin-bottom:10px; }

/* PIN MARKER */
.pin-ext { background:transparent!important;border:none!important; }

/* PIN ADD TEMPORAL */
.pin-add-temp { background:transparent!important;border:none!important; }
</style>
</head>
<body>

<div id="header">
  <div class="h-top">
    <div class="h-logo">🗺️</div>
    <div>
      <div class="h-title">Zonas Easylink</div>
      <div class="h-sub">tiendas externas</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="setModo('gps')">📍 Mi ubicación</button>
    <button class="tab inactive" onclick="setModo('estado')">🏙️ Por estado</button>
  </div>

  <!-- BOTÓN AGREGAR TIENDA EN MAPA -->
  <button id="btn-add-mode" onclick="toggleAddMode()">
    ➕ Agregar tienda en este mapa
  </button>
</div>

<!-- PANEL GPS -->
<div id="panel-gps">
  <div class="gps-row">
    <button class="gps-btn" onclick="usarGPS()">
      <span>📍</span> Detectar mi zona
    </button>
    <select class="radio-select" id="radio-km" onchange="aplicarRadio()">
      <option value="5">5 km</option>
      <option value="10">10 km</option>
      <option value="20" selected>20 km</option>
      <option value="50">50 km</option>
      <option value="100">100 km</option>
    </select>
  </div>
  <div class="gps-status" id="gps-status"></div>
</div>

<!-- PANEL ESTADO -->
<div id="panel-estado">
  <div class="estado-grid" id="estado-grid"></div>
</div>

<!-- CONTENEDOR MAPA (position:relative para el banner overlay) -->
<div id="map-wrap">
  <!-- BANNER ADD MODE (flota sobre el mapa) -->
  <div id="add-banner">
    📍 Toca el punto exacto del mapa donde está la tienda
    <button id="btn-cancel-add" onclick="toggleAddMode()">✕ Cancelar</button>
  </div>

  <div id="map"></div>

  <!-- FAB dentro del map-wrap para position:absolute correcto -->
  <button class="fab-list" id="fab-lista" onclick="abrirSheet()">
    🏪 Ver tiendas (<span id="fab-count">0</span>)
  </button>
</div>

<!-- SHEET LISTA -->
<div id="sheet-bg" onclick="if(event.target===this)cerrarSheet()">
  <div id="sheet">
    <span class="sheet-drag"></span>
    <div class="sheet-head">
      <div>
        <div class="sheet-title">Tiendas externas</div>
        <div class="sheet-count" id="sheet-count">0 encontradas</div>
      </div>
      <button class="sheet-close" onclick="cerrarSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<!-- POPUP DETALLE -->
<div id="ext-popup-bg" onclick="if(event.target===this)cerrarExtPopup()">
  <div id="ext-popup">
    <span class="ext-drag"></span>
    <div id="ext-foto-wrap"></div>
    <div class="ext-body">
      <button class="ext-close" onclick="cerrarExtPopup()">✕</button>
      <div class="ext-pill">🏪 Tienda externa</div>
      <div class="ext-nombre" id="ext-nombre"></div>
      <div class="ext-ubicacion" id="ext-ubicacion"></div>
      <div id="ext-actions-wrap"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════════ */
const BACKEND         = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';
const BACKEND_MAESTRO = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';

// ── URL del Admin de Tiendas Externas (primer HTML) ──
// Ajusta esta ruta a donde tengas hosteado el tiendas-admin.html
const ADMIN_URL = 'tiendas-admin.html';

let ALL_STORES = [], map, userLat = 20.5881, userLng = -100.3899;
let RADIO_KM = 20, modoActual = 'gps', estadoActivo = null;
let storesFiltradas = [], markers = [];

/* ── MISMA FUNCIÓN DEL DIRECTORIO ── */
function fixImgUrl(u){
  if(!u)return'';
  if(u.startsWith('data:'))return u;
  var m=u.match(/[?&]id=([\w-]+)/);
  if(m)return'https://lh3.googleusercontent.com/d/'+m[1];
  var m2=u.match(/\/d\/([\w-]+)/);
  if(m2)return'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}

function haversineKm(la1,ln1,la2,ln2){
  var R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── ESTADOS MÉXICO ── */
const ESTADOS = [
  {nombre:'Aguascalientes',lat:21.88,lng:-102.28},{nombre:'Baja California',lat:30.84,lng:-115.28},
  {nombre:'Baja C. Sur',lat:25.21,lng:-111.68},{nombre:'Campeche',lat:19.83,lng:-90.53},
  {nombre:'Chiapas',lat:16.75,lng:-93.11},{nombre:'Chihuahua',lat:28.63,lng:-106.08},
  {nombre:'CDMX',lat:19.43,lng:-99.13},{nombre:'Coahuila',lat:27.05,lng:-101.70},
  {nombre:'Colima',lat:19.24,lng:-103.72},{nombre:'Durango',lat:24.02,lng:-104.65},
  {nombre:'Guanajuato',lat:21.01,lng:-101.26},{nombre:'Guerrero',lat:17.55,lng:-99.50},
  {nombre:'Hidalgo',lat:20.09,lng:-98.76},{nombre:'Jalisco',lat:20.67,lng:-103.33},
  {nombre:'Estado de México',lat:19.29,lng:-99.65},{nombre:'Michoacán',lat:19.70,lng:-101.18},
  {nombre:'Morelos',lat:18.68,lng:-99.10},{nombre:'Nayarit',lat:21.50,lng:-104.89},
  {nombre:'Nuevo León',lat:25.59,lng:-99.99},{nombre:'Oaxaca',lat:17.07,lng:-96.72},
  {nombre:'Puebla',lat:19.04,lng:-98.20},{nombre:'Querétaro',lat:20.59,lng:-100.39},
  {nombre:'Quintana Roo',lat:19.18,lng:-88.47},{nombre:'San Luis Potosí',lat:22.14,lng:-100.97},
  {nombre:'Sinaloa',lat:24.80,lng:-107.39},{nombre:'Sonora',lat:29.07,lng:-110.96},
  {nombre:'Tabasco',lat:17.98,lng:-92.92},{nombre:'Tamaulipas',lat:23.73,lng:-99.14},
  {nombre:'Tlaxcala',lat:19.31,lng:-98.24},{nombre:'Veracruz',lat:19.17,lng:-96.13},
  {nombre:'Yucatán',lat:20.96,lng:-89.62},{nombre:'Zacatecas',lat:22.77,lng:-102.57},
];

/* ── INIT ── */
window.addEventListener('load', async () => {
  initMap();
  await cargarTiendas();
  renderEstados();
  usarGPS();
});

function initMap() {
  map = L.map('map', {zoomControl:false}).setView([23.6, -102.5], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
}

async function cargarTiendas() {
  try {
    const [r1, r2] = await Promise.allSettled([
      fetch(BACKEND + '?action=stores.directory&t=' + Date.now()),
      fetch(BACKEND_MAESTRO + '?action=stores.directory&t=' + Date.now())
    ]);
    let sl=[], se=[];
    if(r1.status==='fulfilled'){const d=await r1.value.json();sl=(d.stores||[]).filter(s=>!s.isExternal);}
    if(r2.status==='fulfilled'){const d=await r2.value.json();se=(d.stores||[]).filter(s=>s.isExternal===true);}
    ALL_STORES = [...sl, ...se].map(s=>{
      s.config = typeof s.config==='string' ? JSON.parse(s.config) : (s.config||{});
      return s;
    });
  } catch(e) { console.warn('Error cargando tiendas:', e); }
}

/* ── MODOS ── */
function setModo(modo) {
  modoActual = modo;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.className = 'tab ' + (i===(modo==='gps'?0:1) ? 'active' : 'inactive');
  });
  document.getElementById('panel-gps').style.display   = modo==='gps'    ? '' : 'none';
  document.getElementById('panel-estado').style.display = modo==='estado' ? '' : 'none';
  if(modo==='estado' && estadoActivo) filtrarPorEstado(estadoActivo);
  if(modo==='gps') aplicarRadio();
}

/* ── GPS ── */
function usarGPS() {
  const status = document.getElementById('gps-status');
  status.style.display = 'block';
  status.style.color   = '#1a73e8';
  status.textContent   = '⏳ Obteniendo ubicación...';

  if(!navigator.geolocation){
    status.textContent = '❌ GPS no disponible';
    status.style.color = 'red';
    filtrarPorGPS();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      status.style.color = '#16a34a';
      status.textContent = `✅ ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
      setTimeout(() => status.style.display='none', 3000);
      filtrarPorGPS();
      map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });
      L.circleMarker([userLat,userLng],{radius:9,color:'#16a34a',fillColor:'#fff',weight:3,fillOpacity:1})
        .addTo(map).bindTooltip('Tú',{permanent:true,direction:'top'});
      map.setView([userLat,userLng], 13, {animate:true});
    },
    () => {
      status.textContent = '📍 Usando Querétaro por defecto';
      status.style.color = '#888';
      setTimeout(() => status.style.display='none', 3000);
      filtrarPorGPS();
    },
    {enableHighAccuracy:true, timeout:8000}
  );
}

function aplicarRadio() {
  RADIO_KM = parseInt(document.getElementById('radio-km').value);
  if(modoActual === 'gps') filtrarPorGPS();
}

function filtrarPorGPS() {
  storesFiltradas = ALL_STORES.filter(s => {
    if(!s.isExternal) return false;
    const cfg = s.config||{};
    const lat = parseFloat(cfg.locationLat);
    const lng = parseFloat(cfg.locationLng);
    return !isNaN(lat) && !isNaN(lng) && haversineKm(userLat,userLng,lat,lng) <= RADIO_KM;
  });
  storesFiltradas.sort((a,b) => {
    const ca=a.config||{}, cb=b.config||{};
    return haversineKm(userLat,userLng,parseFloat(ca.locationLat),parseFloat(ca.locationLng))
         - haversineKm(userLat,userLng,parseFloat(cb.locationLat),parseFloat(cb.locationLng));
  });
  renderMarcadores();
  actualizarFAB();
}

/* ── ESTADOS ── */
function renderEstados() {
  const grid = document.getElementById('estado-grid');
  grid.innerHTML = ESTADOS.map(e =>
    `<div class="estado-chip" onclick="filtrarPorEstado('${e.nombre}')">${e.nombre}</div>`
  ).join('');
}

function filtrarPorEstado(nombre) {
  estadoActivo = nombre;
  document.querySelectorAll('.estado-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === nombre);
  });
  const estado = ESTADOS.find(e => e.nombre === nombre);
  if(estado) map.setView([estado.lat, estado.lng], 9, {animate:true});
  storesFiltradas = ALL_STORES.filter(s => {
    if(!s.isExternal) return false;
    const cfg = s.config||{};
    const campos = [cfg.estado||'',cfg.state||'',cfg.localidad||'',cfg.city||'',cfg.colonia||'',cfg.directoryCity||''].join(' ').toLowerCase();
    const busca = nombre.toLowerCase();
    return campos.includes(busca.split(' ')[0]) ||
           (estado && haversineKm(estado.lat,estado.lng,parseFloat(cfg.locationLat||0),parseFloat(cfg.locationLng||0)) < 200);
  });
  storesFiltradas.sort((a,b) => {
    const ca=a.config||{}, cb=b.config||{};
    const la=parseFloat(ca.locationLat||estado.lat), lna=parseFloat(ca.locationLng||estado.lng);
    const lb=parseFloat(cb.locationLat||estado.lat), lnb=parseFloat(cb.locationLng||estado.lng);
    return haversineKm(estado.lat,estado.lng,la,lna) - haversineKm(estado.lat,estado.lng,lb,lnb);
  });
  renderMarcadores();
  actualizarFAB();
}

/* ── MARCADORES ── */
function renderMarcadores() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  storesFiltradas.forEach(s => {
    const cfg = s.config||{};
    const lat = parseFloat(cfg.locationLat);
    const lng = parseFloat(cfg.locationLng);
    if(isNaN(lat)||isNaN(lng)) return;
    const logoUrl = fixImgUrl(cfg.foto||cfg.photo||cfg.fotoUrl||cfg.image||cfg.logo||cfg.logoUrl||'');
    const nombre = s.nombre_tienda||s.name||'Tienda';
    const tipo = cfg.tipoNegocio||cfg.businessType||cfg.tipo||'';
    const pinHTML = logoUrl
      ? `<img src="${logoUrl}" style="width:52px;height:52px;border-radius:50%;border:4px solid #fff3e0;object-fit:cover;box-shadow:0 3px 10px rgba(0,0,0,.3);" onerror="this.outerHTML='<div style=width:52px;height:52px;background:#fff3e0;color:#e65100;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);>🏪</div>'">`
      : `<div style="width:52px;height:52px;background:#fff3e0;color:#e65100;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);">🏪</div>`;
    const icon = L.divIcon({html:pinHTML, className:'pin-ext', iconSize:[56,56], iconAnchor:[28,56]});
    const dist = modoActual==='gps' ? haversineKm(userLat,userLng,lat,lng).toFixed(1)+' km' : '';
    const marker = L.marker([lat,lng],{icon})
      .addTo(map)
      .bindTooltip(`<div style="font-family:Syne,sans-serif;text-align:center;line-height:1.3;">
        <div style="font-weight:700;font-size:11px;color:#111;">${nombre}</div>
        <div style="font-size:9px;color:#e65100;">${tipo||'Externa'}</div>
        ${dist?`<div style="font-size:9px;color:#16a34a;">📍 ${dist}</div>`:''}
      </div>`, {direction:'top',offset:[0,-36],permanent:true,opacity:1,className:'pin-label'})
      .on('click', () => {
        // Si está en modo agregar, ignorar clics en marcadores existentes
        if(addMode) return;
        abrirExtPopup(s);
      });
    markers.push(marker);
  });
  if(markers.length > 0) {
    const group = L.featureGroup(markers);
    if(modoActual==='gps'){
      const b = group.getBounds().extend([userLat,userLng]);
      map.fitBounds(b, {padding:[55,55], maxZoom:15, animate:true});
    } else {
      map.fitBounds(group.getBounds(), {padding:[55,55], maxZoom:13, animate:true});
    }
  }
}

/* ── FAB ── */
function actualizarFAB() {
  const n = storesFiltradas.length;
  document.getElementById('fab-count').textContent = n;
  document.getElementById('fab-lista').style.display = n > 0 ? 'block' : 'none';
}

/* ═══════════════════════════════════════════════
   AGREGAR TIENDA EN MAPA
   ═══════════════════════════════════════════════ */
let addMode    = false;
let addMarker  = null;

function toggleAddMode() {
  addMode = !addMode;
  const btn    = document.getElementById('btn-add-mode');
  const banner = document.getElementById('add-banner');

  if (addMode) {
    // Activar modo
    btn.classList.add('add-active');
    btn.textContent = '❌ Cancelar modo agregar';
    banner.classList.add('show');
    map.getContainer().style.cursor = 'crosshair';

    // Limpiar pin temporal previo y cerrar popup si quedó abierto
    if (addMarker) { addMarker.closePopup(); map.removeLayer(addMarker); addMarker = null; }

    // Quitar listener previo (por si quedó huérfano de un once no disparado)
    // y registrar uno nuevo limpio
    map.off('click', onMapAddClick);
    map.once('click', onMapAddClick);
  } else {
    // Desactivar modo — remover listener aunque once no haya disparado
    map.off('click', onMapAddClick);
    btn.classList.remove('add-active');
    btn.textContent = '➕ Agregar tienda en este mapa';
    banner.classList.remove('show');
    map.getContainer().style.cursor = '';
    if (addMarker) { addMarker.closePopup(); map.removeLayer(addMarker); addMarker = null; }
  }
}

function onMapAddClick(e) {
  // Salir del modo (cursor normal, banner oculto)
  const btn    = document.getElementById('btn-add-mode');
  const banner = document.getElementById('add-banner');
  addMode = false;
  btn.classList.remove('add-active');
  btn.textContent = '➕ Agregar tienda en este mapa';
  banner.classList.remove('show');
  map.getContainer().style.cursor = '';

  const lat = e.latlng.lat.toFixed(6);
  const lng = e.latlng.lng.toFixed(6);

  // Pin temporal naranja
  if (addMarker) map.removeLayer(addMarker);
  const pinTempHTML = `
    <div style="
      width:36px;height:36px;
      background:linear-gradient(135deg,#ff6900,#e65c00);
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:3px solid #fff;
      box-shadow:0 3px 10px rgba(230,92,0,.5);
      display:flex;align-items:center;justify-content:center;
    ">
      <span style="transform:rotate(45deg);font-size:14px;">➕</span>
    </div>`;
  addMarker = L.marker([parseFloat(lat), parseFloat(lng)], {
    icon: L.divIcon({html: pinTempHTML, className:'pin-add-temp', iconSize:[36,36], iconAnchor:[10,36]})
  }).addTo(map);

  // Popup de confirmación
  addMarker.bindPopup(`
    <div style="font-family:'Syne',sans-serif;text-align:center;padding:4px 2px;min-width:180px;">
      <div style="font-size:13px;font-weight:800;color:#111;margin-bottom:4px;">Nueva tienda aquí</div>
      <div style="font-size:11px;color:#888;font-family:'DM Mono',monospace;margin-bottom:12px;">
        ${lat}<br>${lng}
      </div>
      <button onclick="irAlAdmin(${lat},${lng})"
        style="width:100%;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;border:none;
        padding:11px 0;border-radius:10px;font-weight:700;cursor:pointer;
        font-family:'Syne',sans-serif;font-size:13px;margin-bottom:6px;">
        ➕ Registrar tienda aquí
      </button>
      <button onclick="cancelarPinTemp()"
        style="width:100%;background:#f5f6fa;color:#888;border:1px solid #e8eaf0;
        padding:8px 0;border-radius:10px;font-weight:600;cursor:pointer;
        font-family:'Syne',sans-serif;font-size:12px;">
        Cancelar
      </button>
    </div>
  `, {maxWidth:220, closeButton:false}).openPopup();
}

function cancelarPinTemp() {
  if (addMarker) { addMarker.closePopup(); map.removeLayer(addMarker); addMarker = null; }
}

function irAlAdmin(lat, lng) {
  // Redirige al admin con las coords como parámetros URL
  const url = ADMIN_URL + '?lat=' + lat + '&lng=' + lng;
  window.open(url, '_blank');
}

/* ── SHEET LISTA ── */
function abrirSheet() {
  const body = document.getElementById('sheet-body');
  document.getElementById('sheet-count').textContent = storesFiltradas.length + ' encontradas';
  if(!storesFiltradas.length){
    body.innerHTML = '<div class="empty"><div class="big">🔍</div>Sin tiendas en esta zona</div>';
  } else {
    body.innerHTML = storesFiltradas.map(s => {
      const cfg = s.config||{};
      const nombre = s.nombre_tienda||s.name||'Tienda';
      const tipo = cfg.tipoNegocio||cfg.businessType||cfg.tipo||'Tienda externa';
      const lat = parseFloat(cfg.locationLat), lng = parseFloat(cfg.locationLng);
      const dist = (!isNaN(lat) && modoActual==='gps') ? haversineKm(userLat,userLng,lat,lng).toFixed(1)+' km' : '';
      const fotoUrl = fixImgUrl(cfg.foto||cfg.photo||cfg.fotoUrl||cfg.image||cfg.logo||cfg.logoUrl||'');
      const tel = String(s.telefono||cfg.telefono||'').replace(/\D/g,'');
      const showWpp = String(cfg.whatsapp||'').toUpperCase()==='TRUE' && tel;
      const showLlegar = String(cfg.llegar||'').toUpperCase()==='TRUE' && !isNaN(lat);
      const colonia = cfg.colonia||'';
      const localidad = cfg.localidad||cfg.city||'';
      const loc = [colonia,localidad].filter(Boolean).join(', ');
      const sid = s.storeId;
      return `<div class="store-card" onclick="abrirExtPopupById('${sid}')">
        <div class="store-thumb">${fotoUrl
          ? `<img src="${fotoUrl}" onerror="this.parentNode.textContent='🏪'">`
          : '🏪'}</div>
        <div class="store-info">
          <div class="store-name">${nombre}</div>
          <div class="store-tipo">${tipo}</div>
          ${dist ? `<div class="store-dist">📍 ${dist}</div>` : ''}
          ${loc  ? `<div class="store-loc">📌 ${loc}</div>` : ''}
        </div>
        <div class="store-actions">
          ${showWpp     ? `<button class="btn-sm btn-wpp" onclick="event.stopPropagation();wppTienda('${tel}')">💬</button>` : ''}
          ${showLlegar  ? `<button class="btn-sm btn-map" onclick="event.stopPropagation();irTienda(${lat},${lng})">🗺️</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('sheet-bg').classList.add('open');
}
function cerrarSheet() { document.getElementById('sheet-bg').classList.remove('open'); }

/* ── POPUP DETALLE ── */
function abrirExtPopupById(sid) {
  const s = ALL_STORES.find(x => x.storeId === sid);
  if(s) abrirExtPopup(s);
}

function abrirExtPopup(s) {
  cerrarSheet();
  const cfg = s.config||{};
  const nombre = s.nombre_tienda||s.name||'Tienda';
  const tipo = cfg.tipoNegocio||cfg.businessType||cfg.tipo||'Tienda externa';
  const lat = parseFloat(cfg.locationLat), lng = parseFloat(cfg.locationLng);
  const dist = (!isNaN(lat) && modoActual==='gps') ? haversineKm(userLat,userLng,lat,lng).toFixed(1)+' km' : '';
  const fotoUrl = fixImgUrl(cfg.foto||cfg.photo||cfg.fotoUrl||cfg.image||cfg.logo||cfg.logoUrl||'');
  const tel = String(s.telefono||cfg.telefono||'').replace(/\D/g,'');
  const showWpp    = String(cfg.whatsapp||'').toUpperCase()==='TRUE' && tel;
  const showLlegar = String(cfg.llegar||'').toUpperCase()==='TRUE' && !isNaN(lat);
  const extLink    = cfg.linkNegocio||cfg.link_negocio||cfg.link||cfg.url||s.link_negocio||'';
  const colonia    = cfg.colonia||'';
  const localidad  = cfg.localidad||cfg.city||'';

  document.getElementById('ext-foto-wrap').innerHTML = fotoUrl
    ? `<img class="ext-foto" src="${fotoUrl}" onerror="this.outerHTML='<div class=ext-foto-ph>🏪</div>'">`
    : `<div class="ext-foto-ph">🏪</div>`;

  document.getElementById('ext-nombre').textContent = nombre;
  document.getElementById('ext-ubicacion').innerHTML =
    `📍 ${[colonia,localidad].filter(Boolean).join(', ')||'Querétaro'}${dist?' · '+dist:''}`;

  let btns = '<div class="ext-actions">';
  if(showLlegar && !isNaN(lat) && !isNaN(lng)){
    btns += `<a class="ext-btn ext-btn-llegar" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank">
      <span class="ext-btn-icon">🗺️</span>Cómo llegar</a>`;
  }
  if(showWpp){
    const msg = encodeURIComponent('¡Hola! Vi tu negocio en el directorio Easylink y quiero más información 🛍️');
    btns += `<a class="ext-btn ext-btn-wpp" href="https://wa.me/52${tel}?text=${msg}" target="_blank">
      <span class="ext-btn-icon">💬</span>WhatsApp</a>`;
  }
  btns += '</div>';
  if(extLink){
    btns += `<a class="ext-btn-link" href="${extLink}" target="_blank">🔗 Visitar tienda completa</a>`;
  }
  document.getElementById('ext-actions-wrap').innerHTML = btns;
  document.getElementById('ext-popup-bg').classList.add('open');
}
function cerrarExtPopup() { document.getElementById('ext-popup-bg').classList.remove('open'); }

function wppTienda(tel) {
  const msg = encodeURIComponent('¡Hola! Vi tu negocio en el directorio Easylink 🛍️');
  window.open('https://wa.me/52'+tel+'?text='+msg,'_blank');
}
function irTienda(lat,lng) {
  window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng,'_blank');
}
</script>
