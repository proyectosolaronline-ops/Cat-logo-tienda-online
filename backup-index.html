<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — LandingKit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0f1117;--surface:#181c25;--surface2:#1e2330;--border:#2a2f3e;
    --accent:#00d98b;--accent-dim:#00d98b22;--accent-dark:#009960;
    --text:#e8ecf0;--muted:#6b7280;--danger:#f87171;--warn:#fbbf24;--info:#60a5fa;
    --radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(0,217,139,.07) 0%,transparent 60%),
               radial-gradient(ellipse 50% 40% at 90% 90%,rgba(96,165,250,.05) 0%,transparent 60%)}

  /* HEADER */
  header{position:relative;z-index:2;padding:32px 24px 0;max-width:1200px;margin:0 auto}
  .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:28px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center}
  .brand-icon svg{width:17px;height:17px}
  .brand-name{font-size:17px;font-weight:600}
  .header-meta{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:99px}
  .hero{margin-bottom:28px}
  .hero h1{font-size:clamp(22px,4vw,36px);font-weight:600;letter-spacing:-.5px;line-height:1.15;margin-bottom:8px}
  .hero h1 span{color:var(--accent)}
  .hero p{font-size:14px;color:var(--muted);max-width:480px}

  /* CONTROLES */
  .controls-wrap{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:0 24px 20px}
  .controls{display:flex;gap:10px;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:180px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;width:15px;height:15px}
  input[type=search]{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
  input[type=search]:focus{border-color:var(--accent)}
  input[type=search]::placeholder{color:var(--muted)}
  select.filter{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;cursor:pointer}
  select.filter:focus{border-color:var(--accent)}
  select.filter option{background:var(--surface2)}
  .count-label{font-size:12px;color:var(--muted);margin-top:12px}

  /* GRID */
  .grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr;gap:14px;max-width:1200px;margin:0 auto;padding:0 24px 48px}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card-banner{height:88px;background:var(--surface2);position:relative;overflow:hidden;flex-shrink:0}
  .card-banner img{width:100%;height:100%;object-fit:cover;display:block}
  .card-banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .card-banner-placeholder svg{width:36px;height:36px;opacity:.1}
  .card-logo-wrap{position:absolute;bottom:-18px;left:16px}
  .card-logo{width:44px;height:44px;border-radius:10px;background:var(--surface);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent)}
  .card-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .card-body{padding:26px 16px 12px;flex:1;display:flex;flex-direction:column;gap:6px}
  .card-name{font-size:15px;font-weight:600}
  .card-desc{font-size:12px;color:var(--muted);line-height:1.55;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500}
  .tag.location{background:var(--surface2);color:var(--muted)}
  .tag.mayorista{background:#a78bfa22;color:#a78bfa}
  .card-footer{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;justify-content:space-between}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;font-family:var(--font);text-decoration:none;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}.btn.primary:hover{background:var(--accent-dark);color:#000}
  .btn.wa{background:#25d366;color:#fff;border-color:#25d366}.btn.wa:hover{background:#1db954;color:#fff}

  /* ESTADOS */
  .state{text-align:center;padding:64px 24px;color:var(--muted);grid-column:1/-1}
  .state svg{width:48px;height:48px;margin:0 auto 16px;display:block;opacity:.2}
  .state h2{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
  .state p{font-size:13px}
  .spinner-wrap{grid-column:1/-1;display:flex;justify-content:center;padding:60px}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-height:90vh;overflow-y:auto}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
  .modal-logo{width:48px;height:48px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent);overflow:hidden;flex-shrink:0}
  .modal-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .modal-body{padding:20px}
  .modal-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:18px}
  .modal-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
  .modal-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;min-width:80px;padding-top:2px}
  .modal-value{font-size:13px;font-weight:500}
  .modal-footer{display:flex;gap:10px;flex-wrap:wrap;padding:14px 20px;border-top:1px solid var(--border)}
  .modal-close{margin-left:auto;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0}
  .modal-close:hover{color:var(--text)}

  /* CONFIG BANNER */
  .cfg-banner{background:var(--surface);border:1px solid var(--warn);border-radius:8px;padding:12px 16px;margin:0 24px 16px;font-size:12px;color:var(--warn);max-width:1152px;margin-left:auto;margin-right:auto;position:relative;z-index:2;display:none}
  .cfg-banner.show{display:block}

  /* TOAST */
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;z-index:9999;display:none;max-width:90vw;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  #toast.success{border-left:3px solid var(--accent)}

  @media(min-width:580px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(min-width:900px){
    .grid{grid-template-columns:repeat(3,1fr)}
    .modal{border-radius:14px;width:92%;max-width:520px;align-self:center}
    .overlay{align-items:center}
    #toast{left:auto;right:24px;transform:none}
  }
  @media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="brand-name">LandingKit</span>
    </div>
    <span class="header-meta" id="header-count">Cargando...</span>
  </div>
  <div class="hero">
    <h1>Directorio de <span>tiendas</span></h1>
    <p>Negocios que operan con LandingKit. Explora su catálogo o contáctalos directamente.</p>
  </div>
</header>

<div class="cfg-banner" id="cfg-banner">
  ⚠️ Configura <strong>BACKEND</strong> y <strong>STORE_BASE</strong> al inicio del script, o pásalos como parámetros en la URL.
</div>

<div class="controls-wrap">
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="q" placeholder="Buscar tienda, descripción, ciudad..." oninput="applyFilters()">
    </div>
    <select class="filter" id="f-type" onchange="applyFilters()">
      <option value="">Todos los tipos</option>
      <option value="mayorista">Mayoristas</option>
      <option value="regular">Regular</option>
    </select>
    <select class="filter" id="f-sort" onchange="applyFilters()">
      <option value="name">A → Z</option>
      <option value="mayorista">Mayoristas primero</option>
    </select>
  </div>
  <div class="count-label" id="count-label"></div>
</div>

<div class="grid" id="grid">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  CONFIGURACIÓN — edita estos dos valores             ║
// ╚══════════════════════════════════════════════════════╝
var BACKEND    = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
// ╚══════════════════════════════════════════════════════╝

var ALL_STORES = [];

window.addEventListener('load', function() {
  // Override desde URL params
  var p = new URLSearchParams(location.search);
  if (p.get('backend'))    BACKEND    = p.get('backend');
  if (p.get('store_base')) STORE_BASE = p.get('store_base');

  if (!BACKEND) {
    document.getElementById('cfg-banner').classList.add('show');
    renderEmpty('Configura BACKEND al inicio del script.');
    return;
  }
  loadStores();
});

// ── FETCH ─────────────────────────────────────────────────────
async function loadStores() {
  try {
    var res  = await fetch(BACKEND + '?action=stores.directory');
    var text = await res.text();
    var data;
    try { data = JSON.parse(text); }
    catch(e) { throw new Error('El backend no devolvió JSON válido.'); }
    if (!data.ok) throw new Error(data.error || 'Error en el directorio');
    ALL_STORES = data.stores || [];
    applyFilters();
    var n = ALL_STORES.length;
    document.getElementById('header-count').textContent = n + ' tienda' + (n!==1?'s':'') + ' registrada' + (n!==1?'s':'');
  } catch(e) {
    renderEmpty(e.message);
    document.getElementById('header-count').textContent = 'Sin conexión';
  }
}

// ── FILTROS ───────────────────────────────────────────────────
function applyFilters() {
  var q     = document.getElementById('q').value.toLowerCase().trim();
  var ftype = document.getElementById('f-type').value;
  var fsort = document.getElementById('f-sort').value;

  var vis = ALL_STORES.filter(function(s) {
    var cfg  = s.config || {};
    var type = cfg.businessType || 'regular';
    var hay  = (s.name||'').toLowerCase() + ' ' + (cfg.description||'').toLowerCase() + ' ' + (cfg.storeLocation||'').toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (ftype === 'mayorista' && type !== 'mayorista') return false;
    if (ftype === 'regular'   && type === 'mayorista') return false;
    return true;
  });

  if (fsort === 'mayorista') {
    vis.sort(function(a,b){
      var am = (a.config||{}).businessType==='mayorista'?-1:1;
      var bm = (b.config||{}).businessType==='mayorista'?-1:1;
      return am-bm || (a.name||'').localeCompare(b.name||'');
    });
  } else {
    vis.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  }

  document.getElementById('count-label').textContent =
    vis.length === ALL_STORES.length
      ? vis.length + ' tienda' + (vis.length!==1?'s':'') + ' en el directorio'
      : vis.length + ' resultado' + (vis.length!==1?'s':'') + ' de ' + ALL_STORES.length;

  renderGrid(vis);
}

// ── RENDER CARDS ──────────────────────────────────────────────
function renderGrid(list) {
  var g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = '<div class="state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>' +
      '<h2>Sin resultados</h2><p>Prueba con otros filtros.</p></div>';
    return;
  }

  g.innerHTML = list.map(function(s) {
    var cfg  = s.config || {};
    var ini  = (s.name||'?')[0].toUpperCase();
    var isM  = cfg.businessType === 'mayorista';
    var loc  = cfg.storeLocation || '';
    var desc = cfg.description || '';
    var wa   = cfg.whatsapp || '';
    var hasBanner = !!cfg.bannerUrl;
    var hasLogo   = !!(cfg.logo || cfg.logoUrl);
    var url  = STORE_BASE ? STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(s.storeId) : '';

    return '<div class="card" onclick="openModal(\'' + s.storeId + '\')">' +

      // Banner
      '<div class="card-banner">' +
        (hasBanner
          ? '<img src="' + esc(cfg.bannerUrl) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
          : '<div class="card-banner-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>') +
        '<div class="card-logo-wrap">' +
          '<div class="card-logo">' +
            (hasLogo ? '<img src="' + esc(cfg.logo||cfg.logoUrl) + '" alt="" loading="lazy" onerror="this.parentElement.textContent=\'' + ini + '\'">' : ini) +
          '</div>' +
        '</div>' +
      '</div>' +

      // Body
      '<div class="card-body">' +
        '<div class="card-name">' + esc(s.name) + '</div>' +
        '<div class="card-desc">' + (desc ? esc(desc) : '<span style="color:var(--muted)">Ver catálogo →</span>') + '</div>' +
        '<div class="card-tags">' +
          (loc ? '<span class="tag location"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>' + esc(loc) + '</span>' : '') +
          (isM ? '<span class="tag mayorista">★ Mayorista</span>' : '') +
        '</div>' +
      '</div>' +

      // Footer
      '<div class="card-footer" onclick="event.stopPropagation()">' +
        (wa
          ? '<a href="https://wa.me/' + wa.replace(/\D/g,'') + '" target="_blank" class="btn wa">' +
            waIcon() + 'WhatsApp</a>'
          : '<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">' + s.storeId.slice(-10) + '</span>') +
        (url
          ? '<a href="' + url + '" target="_blank" class="btn primary">Ver tienda →</a>'
          : '<button class="btn primary" onclick="openModal(\'' + s.storeId + '\')">Ver info →</button>') +
      '</div>' +

    '</div>';
  }).join('');
}

function renderEmpty(msg) {
  document.getElementById('grid').innerHTML =
    '<div class="state">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    '<h2>No se pudo cargar</h2><p>' + esc(msg) + '</p></div>';
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(storeId) {
  var s   = ALL_STORES.find(function(x){ return x.storeId===storeId; });
  if (!s) return;
  var cfg  = s.config || {};
  var ini  = (s.name||'?')[0].toUpperCase();
  var isM  = cfg.businessType === 'mayorista';
  var wa   = cfg.whatsapp || '';
  var hasLogo = !!(cfg.logo || cfg.logoUrl);
  var url  = STORE_BASE ? STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(storeId) : '';

  document.getElementById('modal-header').innerHTML =
    '<div class="modal-logo">' +
      (hasLogo ? '<img src="' + esc(cfg.logo||cfg.logoUrl) + '" alt="" onerror="this.parentElement.textContent=\'' + ini + '\'">' : ini) +
    '</div>' +
    '<div style="flex:1">' +
      '<div style="font-size:16px;font-weight:600">' + esc(s.name) + '</div>' +
      '<div style="font-size:12px;color:var(--muted)">' + (isM?'★ Mayorista · ':'') + esc(cfg.storeLocation||'Sin ubicación') + '</div>' +
    '</div>' +
    '<button class="modal-close" onclick="closeModal()">×</button>';

  var body = '';
  if (cfg.description) body += '<div class="modal-desc">' + esc(cfg.description) + '</div>';

  body +=
    '<div class="modal-row"><span class="modal-label">Tipo</span><span class="modal-value">' +
      (isM ? '<span style="color:#a78bfa">★ Mayorista</span>' : 'Público general') +
    '</span></div>';

  if (cfg.storeLocation)
    body += '<div class="modal-row"><span class="modal-label">Ubicación</span><span class="modal-value">' + esc(cfg.storeLocation) + '</span></div>';

  if (wa)
    body += '<div class="modal-row"><span class="modal-label">WhatsApp</span><span class="modal-value">' + esc(wa) + '</span></div>';

  document.getElementById('modal-body').innerHTML   = body;
  document.getElementById('modal-footer').innerHTML =
    (wa ? '<a href="https://wa.me/' + wa.replace(/\D/g,'') + '" target="_blank" class="btn wa">' + waIcon() + 'Contactar</a>' : '') +
    (url ? '<a href="' + url + '" target="_blank" class="btn primary">Visitar tienda →</a>' : '') +
    '<button class="btn" onclick="closeModal()" style="margin-left:auto">Cerrar</button>';

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────
function waIcon() {
  return '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = type||'success'; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(function(){ el.style.display='none'; }, 3000);
}
</script>
</body>
</html>
