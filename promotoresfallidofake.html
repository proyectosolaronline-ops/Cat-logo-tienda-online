<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mi Tienda - Panel del Dueño</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #075E54, #128C7E);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #075E54, #128C7E);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .card-header h1 { font-size: 1.5rem; }
        .card-body { padding: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #128C7E;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #128C7E; color: white; }
        .btn-primary:hover { background: #075E54; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: #6c757d; color: white; margin-top: 10px; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            gap: 12px;
            flex-wrap: wrap;
        }
        .info-label {
            width: 120px;
            font-weight: 700;
            color: #374151;
        }
        .info-value { flex: 1; color: #1f2937; word-break: break-word; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        .code-box {
            background: #fef3c7;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .code-number {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 6px;
            font-family: monospace;
            background: white;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            margin-top: 10px;
        }
        hr { margin: 20px 0; border: none; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';

    let currentStore = null;
    let currentEmail = '';
    let currentCode  = '';
    let ownerToken   = null;

    function safeStr(v) { return (v === null || v === undefined) ? '' : String(v); }
    function esc(s) {
        return safeStr(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    function isTrue(v) { return v === true || safeStr(v).toUpperCase() === 'TRUE'; }

    async function callAPI(action, data = {}) {
        try {
            const qs = new URLSearchParams({ action, ...data }).toString();
            const r  = await fetch(`${API_URL}?${qs}`, { method: 'GET', headers: { 'Accept': 'application/json' } });
            return await r.json();
        } catch(e) { return { ok: false, error: e.message }; }
    }

    function showMessage(id, msg, type = 'error') {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${msg}</div>`;
        setTimeout(() => { if (document.getElementById(id)) el.innerHTML = ''; }, 4000);
    }

    // ── PANTALLA 1: LOGIN ──
    function renderLogin() {
        return `
        <div class="card">
            <div class="card-header">
                <h1>🔐 Mi Tienda</h1>
                <p>Ingresa tu correo registrado</p>
            </div>
            <div class="card-body">
                <div id="msg"></div>
                <div class="form-group">
                    <label>📧 Correo electrónico</label>
                    <input type="email" id="emailInput" placeholder="tutienda@ejemplo.com">
                </div>
                <button class="btn btn-primary" id="sendCodeBtn">📨 Enviar código</button>
            </div>
        </div>`;
    }

    // ── PANTALLA 2: CÓDIGO ──
    function renderCodeStep(email) {
        return `
        <div class="card">
            <div class="card-header">
                <h1>🔑 Verificar código</h1>
                <p>Se envió un código a <strong>${esc(email)}</strong></p>
            </div>
            <div class="card-body">
                <div id="msg"></div>
                <div class="form-group">
                    <label>📲 Código de 8 caracteres</label>
                    <input type="text" id="codeInput" maxlength="8" placeholder="Ej: 3K7B9X2M"
                        style="text-transform:uppercase;text-align:center;font-size:1.3rem;letter-spacing:4px;">
                </div>
                <button class="btn btn-primary" id="verifyBtn">✅ Verificar acceso</button>
                <button class="btn btn-secondary" id="backBtn">← Volver</button>
            </div>
        </div>`;
    }

    // ── PANTALLA 3: DASHBOARD ──
    function renderDashboard(s) {
        const isActive = safeStr(s.status).toLowerCase() === 'activo';
        const ubicacion = [s.ubicate, s.colonia, s.localidad, s.estado].filter(x => x && x !== '').join(', ');

        return `
        <div class="card">
            <div class="card-header">
                <h1>📋 ${esc(s.nombre_tienda)}</h1>
                <p>Bienvenido, ${esc(s.nombre_cliente || s.nombre_tienda)}</p>
            </div>
            <div class="card-body">
                <div id="msg"></div>

                <div class="code-box">
                    <div>🔑 Tu código de acceso</div>
                    <div class="code-number">${esc(currentCode)}</div>
                    <small>Guarda este código para futuros accesos</small>
                </div>

                <h3 style="margin:15px 0;">📌 Estado actual</h3>
                <div class="info-row">
                    <div class="info-label">Estado:</div>
                    <div class="info-value">
                        <span class="status-badge ${isActive ? 'status-active' : 'status-suspended'}">
                            ${isActive ? '✅ ACTIVO' : '⛔ SUSPENDIDO'}
                        </span>
                    </div>
                </div>

                <h3 style="margin:20px 0 10px;">🔄 Cambiar estado</h3>
                <div class="form-group">
                    <select id="statusSelect">
                        <option value="activo"     ${isActive  ? 'selected' : ''}>✅ Activo</option>
                        <option value="suspendido" ${!isActive ? 'selected' : ''}>⛔ Suspendido</option>
                    </select>
                </div>
                <button class="btn ${isActive ? 'btn-danger' : 'btn-success'}" id="saveStatusBtn">
                    ${isActive ? '⛔ Suspender tienda' : '✅ Activar tienda'}
                </button>

                <hr>

                <h3 style="margin:20px 0 15px;">🏪 Mis datos (solo lectura)</h3>
                <div class="info-row"><div class="info-label">ID:</div><div class="info-value">${esc(s.storeid)}</div></div>
                <div class="info-row"><div class="info-label">Nombre tienda:</div><div class="info-value"><strong>${esc(s.nombre_tienda)}</strong></div></div>
                ${s.nombre_cliente ? `<div class="info-row"><div class="info-label">Cliente:</div><div class="info-value">${esc(s.nombre_cliente)}</div></div>` : ''}
                <div class="info-row"><div class="info-label">Teléfono:</div><div class="info-value">${esc(s.telefono)}</div></div>
                <div class="info-row"><div class="info-label">Correo:</div><div class="info-value">${esc(s.correo)}</div></div>
                <div class="info-row"><div class="info-label">Giro:</div><div class="info-value">${esc(s.tipo_negocio || 'General')}</div></div>
                ${ubicacion ? `<div class="info-row"><div class="info-label">Ubicación:</div><div class="info-value">${esc(ubicacion)}</div></div>` : ''}
                <div class="info-row"><div class="info-label">Horario:</div><div class="info-value">${esc(s.horariopromotor || '08:00-18:00')}</div></div>
                <div class="info-row"><div class="info-label">Servicio móvil:</div><div class="info-value">${isTrue(s.movil) ? '✅ Activado' : '❌ Desactivado'}</div></div>

                <hr>
                <button class="btn btn-secondary" id="logoutBtn">🚪 Cerrar sesión</button>
            </div>
        </div>`;
    }

    // ── FLUJO ──
    async function sendCode() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email || !email.includes('@')) { showMessage('msg', 'Ingresa un correo válido', 'error'); return; }
        showMessage('msg', 'Enviando código...', 'success');
        const result = await callAPI('enviarCodigoPromotor_login', { correo: email });
        if (result && result.ok) {
            currentEmail = email;
            currentCode  = '';
            document.getElementById('app').innerHTML = renderCodeStep(currentEmail);
            attachCodeEvents();
            showMessage('msg', `✅ Código enviado a ${email}. Revisa tu bandeja.`, 'success');
        } else {
            showMessage('msg', result?.error || 'Correo no registrado como promotor móvil', 'error');
        }
    }

    async function verifyAccess() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code || code.length !== 8) { showMessage('msg', 'Ingresa el código de 8 caracteres', 'error'); return; }
        showMessage('msg', 'Verificando...', 'success');
        const result = await callAPI('verificarCodigoPromotor', { correo: currentEmail, codigo: code });
        if (result && result.ok && result.token) {
            ownerToken  = result.token;
            currentCode = code;
            const storeResult = await callAPI('promotor.perfil', { correo: currentEmail });
            if (storeResult && storeResult.ok && storeResult.tienda) {
                currentStore = storeResult.tienda;
                document.getElementById('app').innerHTML = renderDashboard(currentStore);
                attachDashboardEvents();
            } else {
                showMessage('msg', 'Error al cargar datos de la tienda', 'error');
            }
        } else {
            showMessage('msg', result?.error || 'Código incorrecto', 'error');
        }
    }

    async function saveStatus() {
        const newStatus = document.getElementById('statusSelect').value;
        if (!ownerToken || !currentStore) return;
        showMessage('msg', 'Guardando...', 'success');
        const sid    = currentStore.storeid || currentStore.storeId;
        const result = await callAPI('external.store.status', { storeId: sid, status: newStatus, token: ownerToken });
        if (result && result.ok) {
            currentStore.status = newStatus;
            document.getElementById('app').innerHTML = renderDashboard(currentStore);
            attachDashboardEvents();
            showMessage('msg', `✅ Estado actualizado a: ${newStatus === 'activo' ? 'ACTIVO' : 'SUSPENDIDO'}`, 'success');
        } else {
            showMessage('msg', result?.error || 'Error al guardar', 'error');
        }
    }

    function logout() {
        currentStore = null; ownerToken = null; currentEmail = ''; currentCode = '';
        document.getElementById('app').innerHTML = renderLogin();
        attachLoginEvents();
    }

    function attachLoginEvents() {
        document.getElementById('sendCodeBtn')?.addEventListener('click', sendCode);
        document.getElementById('emailInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') sendCode(); });
    }
    function attachCodeEvents() {
        document.getElementById('verifyBtn')?.addEventListener('click', verifyAccess);
        document.getElementById('backBtn')?.addEventListener('click', () => { document.getElementById('app').innerHTML = renderLogin(); attachLoginEvents(); });
        document.getElementById('codeInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') verifyAccess(); });
    }
    function attachDashboardEvents() {
        document.getElementById('saveStatusBtn')?.addEventListener('click', saveStatus);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }

    document.getElementById('app').innerHTML = renderLogin();
    attachLoginEvents();
</script>
</body>
</html>
