<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:48px 20px 56px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")}
.header-logo{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.header-logo svg{width:28px;height:28px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(6px)}
.header h1{font-family:var(--font-d);font-size:clamp(24px,5vw,42px);font-weight:800;line-height:1.1;margin-bottom:12px;letter-spacing:-.02em}
.header h1 span{color:#ffd54f}
.header p{font-size:15px;color:rgba(255,255,255,.8);max-width:500px;margin:0 auto;line-height:1.6}

/* SEARCH */
.search-wrap{max-width:520px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:2}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border);transition:border-color .2s}
.search-box:focus-within{border-color:var(--primary)}
.search-box input{flex:1;padding:14px 16px;border:none;outline:none;font-size:14px;font-family:var(--font-b);color:var(--text)}
.search-box input::placeholder{color:var(--muted)}
.search-btn{padding:12px 16px;background:none;border:none;cursor:pointer;color:var(--muted)}
.search-btn svg{width:18px;height:18px}
.search-source-tag{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:99px;font-size:11px;color:rgba(255,255,255,.9);backdrop-filter:blur(4px)}
.search-source-tag svg{width:12px;height:12px}

/* FILTROS */
.filters-wrap{padding:24px 16px 8px;max-width:960px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 16px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip.geo-chip{border-color:#34a853;color:#34a853}
.chip.geo-chip.on{background:#34a853;border-color:#34a853;color:#fff}
.chip.geo-chip .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.geo-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-left:4px}

/* SECCIÓN CERCANAS */
.section-near{max-width:960px;margin:0 auto;padding:8px 16px 0}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-label .dot-green{width:8px;height:8px;border-radius:50%;background:#34a853}
.near-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.near-scroll::-webkit-scrollbar{display:none}
.near-card{background:var(--surface);border:1.5px solid #34a85333;border-radius:var(--r-xl);overflow:hidden;flex-shrink:0;width:200px;cursor:pointer;transition:all .2s;position:relative}
.near-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#34a853}
.near-badge{position:absolute;top:8px;right:8px;background:#34a853;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}
.near-banner{height:70px;background:var(--primary);background-size:cover;background-position:center}
.near-logo{width:36px;height:36px;border-radius:9px;border:2px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.12);position:absolute;top:52px;left:12px}
.near-logo img{width:100%;height:100%;object-fit:cover}
.near-body{padding:22px 12px 12px}
.near-name{font-family:var(--font-d);font-size:13px;font-weight:700;margin-bottom:2px}
.near-dist{font-size:11px;color:#34a853;font-weight:600}

/* GRID PRINCIPAL */
.dir-wrap{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.store-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column}
.store-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.store-banner{height:90px;background:var(--primary);background-size:cover;background-position:center;position:relative;flex-shrink:0}
.store-logo{width:52px;height:52px;border-radius:12px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.15);position:absolute;bottom:-22px;left:16px;flex-shrink:0}
.store-logo img{width:100%;height:100%;object-fit:cover}
.store-body{padding:30px 16px 16px;flex:1;display:flex;flex-direction:column}
.store-name{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text)}
.store-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1;margin-bottom:12px}
.store-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.store-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.store-tag.mayorista{background:#f3e8ff;color:#7c3aed}
.store-tag.dist{background:#e6f4ea;color:#34a853}
.store-foot{display:flex;gap:8px}
.btn-visit{flex:1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-visit:hover{background:var(--primary-dark)}
.btn-qr{width:40px;height:40px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-qr:hover{border-color:var(--primary);background:var(--primary-light)}
.btn-qr svg{width:18px;height:18px;color:var(--muted)}

/* HIGHLIGHT búsqueda */
.hl{background:#fff176;border-radius:3px;padding:0 2px}

/* POPUP */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.popup-bg.on{display:flex}
.popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.popup-banner{height:120px;background:var(--primary);background-size:cover;background-position:center;border-radius:var(--r-xl) var(--r-xl) 0 0;position:relative}
.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(0,0,0,.35);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-logo{width:64px;height:64px;border-radius:14px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.15);position:absolute;bottom:-28px;left:20px}
.popup-logo img{width:100%;height:100%;object-fit:cover}
.popup-body{padding:40px 20px 24px}
.popup-name{font-family:var(--font-d);font-size:22px;font-weight:800;margin-bottom:6px}
.popup-location{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:4px}
.popup-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px}
.popup-qr{background:var(--bg);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px}
.popup-qr-label{font-size:11px;color:var(--muted);font-weight:500}
.popup-actions{display:flex;gap:10px}
.btn-cta{flex:1;padding:13px;background:var(--cta);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-cta:hover{background:var(--cta-dark)}
.btn-wa{padding:13px 16px;background:#25d366;color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-wa:hover{background:#1db954}
.btn-wa svg{width:20px;height:20px}

/* QR modal */
.qr-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.qr-modal-bg.on{display:flex}
.qr-box{background:#fff;border-radius:var(--r-xl);padding:28px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.qr-box h3{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:6px}
.qr-box p{font-size:11px;color:var(--muted);margin-bottom:16px}
.qr-close{margin-top:16px;padding:9px 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4}
.empty h3{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.count-badge{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.count-badge strong{color:var(--text)}

/* TOAST geo */
.geo-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;border-radius:var(--r-lg);padding:12px 20px;font-size:13px;display:flex;align-items:center;gap:8px;z-index:500;box-shadow:var(--shadow-lg);transition:opacity .3s;pointer-events:none}
.geo-toast.hide{opacity:0}
.geo-toast svg{width:16px;height:16px;flex-shrink:0}

@media(max-width:480px){
  .dir-grid{grid-template-columns:1fr 1fr}
  .store-card{font-size:13px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
  <div class="header-badge">🌐 Directorio de tiendas</div>
  <h1>Todo en un solo lugar —<br><span>productos y servicios</span></h1>
  <p id="header-sub">disponibles a tu necesidad</p>
</div>

<div class="search-wrap">
  <div id="google-source-tag" style="display:none;justify-content:center;margin-bottom:8px">
    <span class="search-source-tag">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Búsqueda desde Google: "<span id="google-query-label"></span>"
    </span>
  </div>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar tienda, producto o servicio..." oninput="filterDir()">
    <button class="search-btn" onclick="filterDir()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</div>

<div class="filters-wrap" id="filters-wrap">
  <div class="chip on" onclick="setFilter('',this)">Todas</div>
  <div class="chip" onclick="setFilter('mayorista',this)">★ Mayoristas</div>
  <div class="chip geo-chip" id="chip-cerca" onclick="toggleGeoFilter()" title="Mostrar tiendas a menos de 3 km">
    <span class="dot"></span> Cerca de mí
  </div>
  <span class="geo-status" id="geo-status"></span>
</div>

<!-- Sección tiendas cercanas -->
<div class="section-near" id="section-near" style="display:none">
  <div class="section-label">
    <span class="dot-green"></span> Tiendas cerca de ti — radio 3 km
  </div>
  <div class="near-scroll" id="near-scroll"></div>
</div>

<div class="dir-wrap">
  <div class="count-badge" id="count-badge"></div>
  <div class="dir-grid" id="dir-grid">
    <div class="spinner"></div>
  </div>
</div>

<!-- POPUP detalle -->
<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
  <div class="popup" id="popup">
    <div class="popup-banner" id="popup-banner">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div class="popup-logo" id="popup-logo"></div>
    </div>
    <div class="popup-body">
      <div class="popup-name" id="popup-name"></div>
      <div class="popup-location" id="popup-location"></div>
      <div class="popup-desc" id="popup-desc"></div>
      <div class="popup-qr">
        <div id="popup-qr-code"></div>
        <div class="popup-qr-label">Escanea para visitar la tienda</div>
      </div>
      <div class="popup-actions">
        <a class="btn-cta" id="popup-visit-btn" href="#" target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Visitar tienda
        </a>
        <button class="btn-wa" id="popup-wa-btn" style="display:none" onclick="openWA()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- QR modal rápido -->
<div class="qr-modal-bg" id="qr-modal-bg" onclick="if(event.target===this)closeQR()">
  <div class="qr-box">
    <h3 id="qr-store-name"></h3>
    <p>Escanea para visitar la tienda</p>
    <div id="qr-code-small"></div>
    <button class="qr-close" onclick="closeQR()">Cerrar</button>
  </div>
</div>

<!-- Toast geolocalización -->
<div class="geo-toast hide" id="geo-toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="geo-toast-msg"></span>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ══════════════════════════════════════════════════════════════
var BACKEND    = (new URLSearchParams(location.search).get('backend'))
               || localStorage.getItem('ld_backend')
               || 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = (new URLSearchParams(location.search).get('storeBase'))
               || localStorage.getItem('ld_store_base')
               || '';

var ALL_STORES    = [];
var GEOCACHE      = {};       // storeLocation → {lat,lng}
var USER_COORDS   = null;     // {lat, lng} del usuario
var GEO_FILTER    = false;    // ¿mostrar solo cercanas?
var activeFilter  = '';
var currentWA     = '';
var GOOGLE_QUERY  = '';       // texto detectado desde Google
var GEO_RADIUS_KM = 3;

// ══════════════════════════════════════════════════════════════
//  1. DETECCIÓN DE BÚSQUEDA DESDE GOOGLE
// ══════════════════════════════════════════════════════════════
function detectGoogleSearch() {
  var ref = document.referrer || '';
  var isGoogle = /google\./i.test(ref);

  // También funciona si viene en el parámetro ?q= (enlace directo desde Google)
  var urlQ = new URLSearchParams(location.search).get('q') || '';

  var query = '';

  if (isGoogle) {
    // Extraer término de búsqueda del referrer
    try {
      var refUrl  = new URL(ref);
      query = refUrl.searchParams.get('q') || refUrl.searchParams.get('query') || '';
    } catch(e) {}
  }

  if (!query && urlQ) query = urlQ;

  if (query) {
    GOOGLE_QUERY = decodeURIComponent(query).replace(/\+/g, ' ').trim();
    // Mostrar tag de origen Google
    document.getElementById('google-query-label').textContent = GOOGLE_QUERY;
    document.getElementById('google-source-tag').style.display = 'flex';
    // Pre-llenar el buscador
    document.getElementById('search-input').value = GOOGLE_QUERY;
    // Actualizar subtítulo
    document.getElementById('header-sub').textContent =
      'Resultados para "' + GOOGLE_QUERY + '"';
  }
}

// ══════════════════════════════════════════════════════════════
//  2. GEOLOCALIZACIÓN DEL USUARIO
// ══════════════════════════════════════════════════════════════
function requestUserLocation() {
  if (!navigator.geolocation) {
    setGeoStatus('No disponible en este navegador');
    return;
  }
  setGeoStatus('Obteniendo ubicación...');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      USER_COORDS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      setGeoStatus('Ubicación obtenida ✓');
      geocodeAllStores().then(function() {
        renderNearbySection();
        if (GEO_FILTER) filterDir();
      });
    },
    function(err) {
      var msgs = {1:'Permiso denegado', 2:'Ubicación no disponible', 3:'Tiempo de espera agotado'};
      setGeoStatus(msgs[err.code] || 'Error de ubicación');
      showGeoToast('No se pudo obtener tu ubicación: ' + (msgs[err.code] || 'Error'));
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

function setGeoStatus(msg) {
  document.getElementById('geo-status').textContent = msg;
}

function showGeoToast(msg) {
  var el = document.getElementById('geo-toast');
  document.getElementById('geo-toast-msg').textContent = msg;
  el.classList.remove('hide');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.add('hide'); }, 3500);
}

// ══════════════════════════════════════════════════════════════
//  3. GEOCODIFICACIÓN (Nominatim — sin API key)
//     Convierte texto de ubicación en coordenadas
// ══════════════════════════════════════════════════════════════
function geocodeLocation(locationText) {
  if (!locationText || locationText.trim() === '') return Promise.resolve(null);
  if (GEOCACHE[locationText]) return Promise.resolve(GEOCACHE[locationText]);

  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q='
            + encodeURIComponent(locationText);

  return fetch(url, { headers: { 'Accept-Language': 'es' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.length > 0) {
        var coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        GEOCACHE[locationText] = coords;
        return coords;
      }
      return null;
    })
    .catch(function() { return null; });
}

// Geocodificar todas las tiendas con ubicación (en serie, respetando rate limit de Nominatim)
function geocodeAllStores() {
  var stores = ALL_STORES.filter(function(s) {
    return (s.config || {}).storeLocation && !(s._coords);
  });

  // Encadenar en serie con delay de 300ms entre cada una
  return stores.reduce(function(chain, store) {
    return chain.then(function() {
      return new Promise(function(resolve) { setTimeout(resolve, 300); })
        .then(function() {
          return geocodeLocation(store.config.storeLocation);
        })
        .then(function(coords) {
          store._coords = coords;
        });
    });
  }, Promise.resolve());
}

// ══════════════════════════════════════════════════════════════
//  4. CÁLCULO DE DISTANCIA (Haversine)
// ══════════════════════════════════════════════════════════════
function haversineKm(lat1, lng1, lat2, lng2) {
  var R  = 6371;
  var dL = (lat2 - lat1) * Math.PI / 180;
  var dG = (lng2 - lng1) * Math.PI / 180;
  var a  = Math.sin(dL/2) * Math.sin(dL/2)
         + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
           * Math.sin(dG/2) * Math.sin(dG/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getStoreDist(store) {
  if (!USER_COORDS || !store._coords) return null;
  return haversineKm(USER_COORDS.lat, USER_COORDS.lng,
                     store._coords.lat, store._coords.lng);
}

function fmtDist(km) {
  if (km < 1) return Math.round(km * 1000) + ' m';
  return km.toFixed(1) + ' km';
}

// ══════════════════════════════════════════════════════════════
//  5. CARGA INICIAL
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', function() {
  detectGoogleSearch();
  requestUserLocation();
  loadStores();
});

async function loadStores() {
  try {
    var r    = await fetch(BACKEND + '?action=stores.directory');
    var text = await r.text();
    var d;
    try { d = JSON.parse(text); } catch(e) { throw new Error('Error de servidor'); }
    if (!d.ok && !d.stores) throw new Error(d.error || 'Error al cargar directorio');

    ALL_STORES = (d.stores || []).map(function(s) {
      if (typeof s.config === 'string') {
        try { s.config = JSON.parse(s.config); } catch(e) { s.config = {}; }
      } else { s.config = s.config || {}; }
      return s;
    }).filter(function(s) {
      return s.config.inDirectory === true && s.status === 'active';
    });

    filterDir();

    // Si ya tenemos coords del usuario, geocodificar ahora
    if (USER_COORDS) {
      geocodeAllStores().then(function() {
        renderNearbySection();
        filterDir();
      });
    }
  } catch(e) {
    document.getElementById('dir-grid').innerHTML =
      '<div class="empty"><div class="empty-ico">😕</div>' +
      '<h3>Error al cargar</h3><p>' + esc(e.message) + '</p></div>';
  }
}

// ══════════════════════════════════════════════════════════════
//  6. SECCIÓN "CERCA DE TI"
// ══════════════════════════════════════════════════════════════
function renderNearbySection() {
  if (!USER_COORDS) return;
  var nearby = ALL_STORES
    .map(function(s) { return { store: s, dist: getStoreDist(s) }; })
    .filter(function(x) { return x.dist !== null && x.dist <= GEO_RADIUS_KM; })
    .sort(function(a, b) { return a.dist - b.dist; });

  var section = document.getElementById('section-near');
  if (!nearby.length) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  var scroll = document.getElementById('near-scroll');
  scroll.innerHTML = nearby.map(function(x) {
    var s   = x.store;
    var cfg = s.config || {};
    var ini = (s.name||'?')[0].toUpperCase();
    var logoSrc   = fixImgUrl(cfg.logo || cfg.logoUrl || '');
    var bannerSrc = fixImgUrl(cfg.bannerUrl || '');
    var url = buildStoreUrl(s.storeId);
    return '<div class="near-card" onclick="' + (url ? 'window.open(\'' + url + '\',\'_blank\')' : 'openPopup(\'' + s.storeId + '\')') + '">' +
      '<div class="near-banner" style="' + (bannerSrc ? 'background-image:url(' + bannerSrc + ')' : '') + '"></div>' +
      '<div class="near-logo">' + (logoSrc ? '<img src="' + esc(logoSrc) + '" onerror="this.parentNode.textContent=\'' + ini + '\'">' : ini) + '</div>' +
      '<span class="near-badge">' + fmtDist(x.dist) + '</span>' +
      '<div class="near-body">' +
        '<div class="near-name">' + esc(s.name) + '</div>' +
        '<div class="near-dist">📍 ' + fmtDist(x.dist) + ' de distancia</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════════════
//  7. FILTROS Y RENDER
// ══════════════════════════════════════════════════════════════
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip:not(.geo-chip)').forEach(function(c) { c.classList.remove('on'); });
  el.classList.add('on');
  filterDir();
}

function toggleGeoFilter() {
  if (!USER_COORDS) {
    showGeoToast('Esperando tu ubicación...');
    return;
  }
  GEO_FILTER = !GEO_FILTER;
  document.getElementById('chip-cerca').classList.toggle('on', GEO_FILTER);
  filterDir();
}

function filterDir() {
  var q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  var list = ALL_STORES.filter(function(s) {
    var cfg  = s.config || {};
    var hay  = (s.name||'').toLowerCase() + ' ' + (cfg.description||'').toLowerCase()
             + ' ' + (cfg.storeLocation||'').toLowerCase() + ' ' + (cfg.whatsapp||'');
    var matchQ = !q || hay.includes(q);
    var matchF = !activeFilter || (activeFilter === 'mayorista' && cfg.businessType === 'mayorista');
    var matchG = !GEO_FILTER   || (getStoreDist(s) !== null && getStoreDist(s) <= GEO_RADIUS_KM);
    return matchQ && matchF && matchG;
  });

  // Ordenar: si hay filtro geo, por distancia; si hay búsqueda, relevancia; si no, alfabético
  if (GEO_FILTER && USER_COORDS) {
    list.sort(function(a,b) { return (getStoreDist(a)||999) - (getStoreDist(b)||999); });
  } else {
    list.sort(function(a,b) { return (a.name||'').localeCompare(b.name||''); });
  }

  var badge = document.getElementById('count-badge');
  var parts = [];
  parts.push('<strong>' + list.length + '</strong> tienda' + (list.length!==1?'s':'') + ' disponible' + (list.length!==1?'s':''));
  if (q) parts.push('· búsqueda: <strong>"' + esc(q) + '"</strong>');
  if (GEO_FILTER) parts.push('· radio ' + GEO_RADIUS_KM + ' km');
  badge.innerHTML = parts.join(' ');

  renderDir(list, q);
}

function renderDir(stores, q) {
  var g = document.getElementById('dir-grid');
  if (!stores || !stores.length) {
    g.innerHTML = '<div class="empty"><div class="empty-ico">🏪</div>' +
      '<h3>Sin resultados</h3><p>Prueba con otros filtros o términos de búsqueda.</p></div>';
    return;
  }

  g.innerHTML = stores.map(function(s) {
    var cfg        = s.config || {};
    var ini        = (s.name||'?')[0].toUpperCase();
    var logoSrc    = fixImgUrl(cfg.logo || cfg.logoUrl || '');
    var bannerSrc  = fixImgUrl(cfg.bannerUrl || '');
    var esMayorista= cfg.businessType === 'mayorista';
    var url        = buildStoreUrl(s.storeId);
    var dist       = getStoreDist(s);
    var distLabel  = (dist !== null && dist <= 10) ? fmtDist(dist) : null;

    // Resaltar términos de búsqueda
    var nameHtml = q ? hlText(esc(s.name), q) : esc(s.name);
    var descText = cfg.description || 'Visita nuestra tienda';
    var descHtml = q ? hlText(esc(descText.slice(0,80)), q) : esc(descText.slice(0,80));

    return '<div class="store-card" onclick="openPopup(\'' + s.storeId + '\')">' +
      '<div class="store-banner" style="' + (bannerSrc?'background-image:url('+bannerSrc+');background-size:cover;background-position:center':'background:var(--primary)') + '">' +
        '<div class="store-logo">' + (logoSrc?'<img src="'+esc(logoSrc)+'" onerror="this.parentNode.textContent=\''+ini+'\'">':ini) + '</div>' +
      '</div>' +
      '<div class="store-body">' +
        '<div class="store-name">' + nameHtml + '</div>' +
        '<div class="store-desc">' + descHtml + '</div>' +
        '<div class="store-tags">' +
          (cfg.storeLocation ? '<span class="store-tag">📍 ' + esc(cfg.storeLocation) + '</span>' : '') +
          (esMayorista ? '<span class="store-tag mayorista">★ Mayorista</span>' : '') +
          (distLabel   ? '<span class="store-tag dist">📌 ' + distLabel + '</span>' : '') +
        '</div>' +
        '<div class="store-foot">' +
          (url ? '<a class="btn-visit" href="'+esc(url)+'" target="_blank" onclick="event.stopPropagation()">Ver tienda →</a>'
               : '<button class="btn-visit" onclick="event.stopPropagation();openPopup(\''+s.storeId+'\')">Ver info →</button>') +
          '<div class="btn-qr" onclick="event.stopPropagation();openQR(\''+s.storeId+'\')" title="Código QR">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 20h3M20 17v3"/></svg>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Resaltar coincidencias de búsqueda en texto
function hlText(text, q) {
  if (!q) return text;
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark class="hl">$1</mark>');
}

// ══════════════════════════════════════════════════════════════
//  8. POPUP DETALLE
// ══════════════════════════════════════════════════════════════
function openPopup(storeId) {
  var s = ALL_STORES.find(function(x) { return x.storeId === storeId; });
  if (!s) return;
  var cfg       = s.config || {};
  var logoSrc   = fixImgUrl(cfg.logo || cfg.logoUrl || '');
  var bannerSrc = fixImgUrl(cfg.bannerUrl || '');
  var ini       = (s.name||'?')[0].toUpperCase();
  var url       = buildStoreUrl(storeId);
  var dist      = getStoreDist(s);
  currentWA     = cfg.whatsapp || '';

  document.getElementById('popup-banner').style.background = bannerSrc
    ? 'url('+bannerSrc+') center/cover no-repeat' : 'var(--primary)';
  document.getElementById('popup-logo').innerHTML = logoSrc
    ? '<img src="'+esc(logoSrc)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent=\''+ini+'\'">'
    : ini;
  document.getElementById('popup-name').textContent  = s.name || '';
  document.getElementById('popup-location').innerHTML =
    (cfg.storeLocation ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + esc(cfg.storeLocation) : '') +
    (dist !== null ? ' · <strong style="color:#34a853">' + fmtDist(dist) + ' de ti</strong>' : '');
  document.getElementById('popup-desc').textContent =
    cfg.description || 'Visita nuestra tienda y descubre todos nuestros productos y servicios.';
  document.getElementById('popup-visit-btn').href = url || '#';
  document.getElementById('popup-wa-btn').style.display = currentWA ? 'flex' : 'none';

  var qrEl = document.getElementById('popup-qr-code');
  qrEl.innerHTML = '';
  if (url) {
    try { new QRCode(qrEl, { text:url, width:140, height:140, colorDark:'#1a1a2e', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.H }); } catch(e){}
  }
  document.getElementById('popup-bg').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('popup-bg').classList.remove('on');
  document.body.style.overflow = '';
}
function openWA() { if(currentWA) window.open('https://wa.me/'+currentWA.replace(/\D/g,''),'_blank'); }

function openQR(storeId) {
  var s   = ALL_STORES.find(function(x){ return x.storeId===storeId; });
  if (!s) return;
  var url = buildStoreUrl(storeId) || location.href;
  document.getElementById('qr-store-name').textContent = s.name||'';
  var el = document.getElementById('qr-code-small');
  el.innerHTML = '';
  try { new QRCode(el, { text:url, width:180, height:180, colorDark:'#1a1a2e', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.H }); } catch(e){}
  document.getElementById('qr-modal-bg').classList.add('on');
}
function closeQR() { document.getElementById('qr-modal-bg').classList.remove('on'); }

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function buildStoreUrl(storeId) {
  if (!STORE_BASE || !BACKEND) return '';
  return STORE_BASE.replace(/\/$/, '') + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(storeId);
}

function fixImgUrl(url) {
  if (!url) return '';
  var m = url.match(/[?&]id=([\w-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  var m2 = url.match(/\/d\/([\w-]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  return url;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
