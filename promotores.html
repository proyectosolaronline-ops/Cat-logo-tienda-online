<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mi Tienda - Panel del Dueño</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #075E54, #128C7E);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #075E54, #128C7E);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .card-header h1 { font-size: 1.5rem; }
        .card-body { padding: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #128C7E;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #128C7E; color: white; }
        .btn-primary:hover { background: #075E54; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: #6c757d; color: white; margin-top: 10px; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .info-message {
            background: #dbeafe;
            color: #1e40af;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            gap: 12px;
            flex-wrap: wrap;
        }
        .info-label {
            width: 120px;
            font-weight: 700;
            color: #374151;
        }
        .info-value { flex: 1; color: #1f2937; word-break: break-word; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        .code-box {
            background: #fef3c7;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .code-number {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 6px;
            font-family: monospace;
            background: white;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            margin-top: 10px;
        }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #128C7E;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        hr { margin: 20px 0; border: none; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ============================================================
    // TU API
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
    
    // Estado
    let currentStore = null;
    let currentEmail = '';
    let currentCode = '';
    // ========================================
// DEBUG COMPLETO - Abre F12 para ver
// ========================================
const DEBUG = true;

function logDebug(msg, data) {
    if (DEBUG) {
        if (data) {
            console.log(`🔍 [DEBUG] ${msg}`, data);
        } else {
            console.log(`🔍 [DEBUG] ${msg}`);
        }
    }
}

// Modifica tu función callAPI original para que loguee
const originalCallAPI = callAPI;
window.callAPI = async function(action, data = {}) {
    logDebug(`Llamando API: ${action}`, data);
    try {
        const url = `${API_URL}?action=${action}&${new URLSearchParams(data).toString()}`;
        logDebug(`URL: ${url}`);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });
        
        const result = await response.json();
        logDebug(`Respuesta de ${action}:`, result);
        
        return result;
    } catch (error) {
        logDebug(`Error en ${action}:`, error.message);
        return { ok: false, error: error.message };
    }
};

// Modifica getStoreByEmail con más logs
async function getStoreByEmail(email) {
    logDebug(`Buscando tienda por email: ${email}`);
    
    const result = await callAPI('stores.directory');
    logDebug('Resultado stores.directory:', result);
    
    if (result.ok && result.stores) {
        logDebug(`Total de tiendas encontradas: ${result.stores.length}`);
        
        const emailLower = email.toLowerCase().trim();
        logDebug(`Email a buscar (lowercase): ${emailLower}`);
        
        // Mostrar todos los correos disponibles
        const allEmails = result.stores.map(s => {
            const config = s.config || {};
            return config.correo || 'SIN CORREO';
        });
        logDebug('Correos disponibles en el directorio:', allEmails);
        
        const store = result.stores.find(s => {
            const config = s.config || {};
            const storeEmail = (config.correo || '').toLowerCase().trim();
            const matches = storeEmail === emailLower;
            if (matches) logDebug(`✅ MATCH encontrado: ${storeEmail}`);
            return matches;
        });
        
        if (store) {
            logDebug('Tienda encontrada:', store);
            return { ok: true, store: store };
        } else {
            logDebug('❌ No se encontró match con ningún correo');
        }
    } else {
        logDebug('❌ stores.directory no respondió correctamente:', result);
    }
    
    return { ok: false, error: 'Correo no registrado en el directorio' };
}

// Modifica sendCode para loguear
const originalSendCode = sendCode;
window.sendCode = async function() {
    logDebug('=== INICIO PROCESO DE LOGIN ===');
    const email = document.getElementById('emailInput').value.trim();
    logDebug(`Email ingresado: ${email}`);
    
    if (!email || !email.includes('@')) {
        logDebug('❌ Email inválido');
        showMessage('msg', 'Correo inválido', 'error');
        return;
    }
    
    logDebug('📧 Verificando email en el directorio...');
    const storeResult = await getStoreByEmail(email);
    
    if (storeResult.ok) {
        logDebug('✅ Email VERIFICADO correctamente');
        currentStore = storeResult.store;
        currentEmail = email;
        
        logDebug('📨 Solicitando código de acceso...');
        const codeResult = await requestCode(email);
        
        if (codeResult.ok) {
            logDebug('✅ Código enviado exitosamente');
            currentAccessCode = generarCodigo();
            document.getElementById('app').innerHTML = renderCodeStep(currentEmail);
            attachCodeEvents();
            showMessage('msg', `✅ Código enviado a ${email}`, 'success');
        } else {
            logDebug('❌ Error al enviar código:', codeResult.error);
            showMessage('msg', codeResult.error || 'Error al enviar código', 'error');
        }
    } else {
        logDebug('❌ Email NO registrado:', storeResult.error);
        showMessage('msg', storeResult.error, 'error');
    }
    logDebug('=== FIN PROCESO DE LOGIN ===');
};
    // ============================================================
    // UTILIDADES
    // ============================================================
    function safeString(v) {
        if (v === null || v === undefined) return '';
        return String(v);
    }
    
    function escapeHtml(str) {
        return safeString(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function isTrue(v) {
        if (v === true || v === false) return v;
        return safeString(v).toLowerCase() === 'true' || safeString(v) === '1';
    }
    
    async function callAPI(action, data = {}) {
        try {
            const response = await fetch(`${API_URL}?action=${action}&${new URLSearchParams(data).toString()}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            return await response.json();
        } catch (error) {
            return { ok: false, error: error.message };
        }
    }
    
    // ============================================================
    // LLAMADAS A LA API
    // ============================================================
    async function requestCode(email) {
        return await callAPI('owner.request.code', { email: email });
    }
    
    async function verifyCode(email, code) {
        return await callAPI('owner.verify.code', { email: email, code: code });
    }
    
    async function getStoreInfo(storeId, token) {
        return await callAPI('store.info', { storeId: storeId, token: token });
    }
    
    async function updateStoreStatus(storeId, status, token) {
        return await callAPI('external.store.status', { storeId: storeId, status: status, token: token });
    }

// Agrega esta función para recargar datos desde el servidor
async function recargarDatos() {
    const storeResult = await getStoreInfo(storeId, ownerToken);
    if (storeResult && storeResult.ok && storeResult.store) {
        currentStore = storeResult.store;
    }
}




    
    // ============================================================
    // GENERAR CÓDIGO LOCAL (solo para mostrar)
    // ============================================================
    function generarCodigoLocal() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 8; i++) {
            code += chars[Math.floor(Math.random() * chars.length)];
        }
        return code;
    }
    
    // ============================================================
    // RENDERIZADO
    // ============================================================
    
    // Pantalla 1: Ingresar correo
    function renderLogin() {
        return `
            <div class="card">
                <div class="card-header">
                    <h1>🔐 Mi Tienda</h1>
                    <p>Ingresa tu correo registrado</p>
                </div>
                <div class="card-body">
                    <div id="msg"></div>
                    <div class="form-group">
                        <label>📧 Correo electrónico</label>
                        <input type="email" id="emailInput" placeholder="tutienda@ejemplo.com">
                    </div>
                    <button class="btn btn-primary" id="sendCodeBtn">📨 Enviar código</button>
                </div>
            </div>
        `;
    }
    
    // Pantalla 2: Ingresar código
    function renderCodeStep(email) {
        return `
            <div class="card">
                <div class="card-header">
                    <h1>🔑 Verificar código</h1>
                    <p>Se envió un código a <strong>${escapeHtml(email)}</strong></p>
                </div>
                <div class="card-body">
                    <div id="msg"></div>
                    <div class="form-group">
                        <label>📲 Código de 8 caracteres</label>
                        <input type="text" id="codeInput" maxlength="8" placeholder="Ej: 3K7B9X2M" style="text-transform:uppercase; text-align:center; font-size:1.3rem; letter-spacing:4px;">
                    </div>
                    <button class="btn btn-primary" id="verifyBtn">✅ Verificar acceso</button>
                    <button class="btn btn-secondary" id="backBtn">← Volver</button>
                </div>
            </div>
        `;
    }
    
    // Pantalla 3: Dashboard con datos + solo cambiar status
    function renderDashboard(store) {
        const isActive = store.status === 'activo';
        const ubicacionCompleta = [store.ubicate, store.colonia, store.localidad, store.estado].filter(s => s && s !== '').join(', ');
        
        return `
            <div class="card">
                <div class="card-header">
                    <h1>📋 ${escapeHtml(store.nombre_tienda)}</h1>
                    <p>Bienvenido, ${escapeHtml(store.nombre_cliente || store.nombre_tienda)}</p>
                </div>
                <div class="card-body">
                    <div id="msg"></div>
                    
                    <div class="code-box">
                        <div>🔑 Tu código de acceso</div>
                        <div class="code-number">${escapeHtml(currentCode)}</div>
                        <small>Guarda este código para futuros accesos</small>
                    </div>
                    
                    <h3 style="margin: 15px 0;">📌 Estado actual</h3>
                    <div class="info-row">
                        <div class="info-label">Estado:</div>
                        <div class="info-value">
                            <span class="status-badge ${isActive ? 'status-active' : 'status-suspended'}">
                                ${isActive ? '✅ ACTIVO' : '⛔ SUSPENDIDO'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>🔄 Cambiar estado</label>
                        <select id="statusSelect">
                            <option value="activo" ${isActive ? 'selected' : ''}>✅ Activo</option>
                            <option value="suspendido" ${!isActive ? 'selected' : ''}>⛔ Suspendido</option>
                        </select>
                    </div>
                    <button class="btn ${isActive ? 'btn-danger' : 'btn-success'}" id="saveStatusBtn">
                        ${isActive ? '⛔ Suspender tienda' : '✅ Activar tienda'}
                    </button>
                    
                    <hr>
                    
                    <h3 style="margin: 20px 0 15px;">🏪 Mis datos (solo lectura)</h3>
                    
                    <div class="info-row"><div class="info-label">ID:</div><div class="info-value">${escapeHtml(store.storeId)}</div></div>
                    <div class="info-row"><div class="info-label">Nombre tienda:</div><div class="info-value"><strong>${escapeHtml(store.nombre_tienda)}</strong></div></div>
                    ${store.nombre_cliente ? `<div class="info-row"><div class="info-label">Cliente:</div><div class="info-value">${escapeHtml(store.nombre_cliente)}</div></div>` : ''}
                    <div class="info-row"><div class="info-label">Teléfono:</div><div class="info-value">${escapeHtml(store.telefono)}</div></div>
                    <div class="info-row"><div class="info-label">Correo:</div><div class="info-value"><strong>${escapeHtml(store.correo)}</strong></div></div>
                    <div class="info-row"><div class="info-label">Giro:</div><div class="info-value">${escapeHtml(store.tipo_negocio || 'General')}</div></div>
                    ${ubicacionCompleta ? `<div class="info-row"><div class="info-label">Ubicación:</div><div class="info-value">${escapeHtml(ubicacionCompleta)}</div></div>` : ''}
                    <div class="info-row"><div class="info-label">Horario:</div><div class="info-value">${escapeHtml(store.horariopromotor || '08:00-18:00')}</div></div>
                    <div class="info-row"><div class="info-label">Servicio móvil:</div><div class="info-value">${isTrue(store.movil) ? '✅ Activado' : '❌ Desactivado'}</div></div>
                    
                    <hr>
                    <button class="btn btn-secondary" id="logoutBtn">🚪 Cerrar sesión</button>
                </div>
            </div>
        `;
    }
    
    function showMessage(containerId, message, type = 'error') {
        const container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${message}</div>`;
            setTimeout(() => {
                if (document.getElementById(containerId)) container.innerHTML = '';
            }, 4000);
        }
    }
    
    // ============================================================
    // FLUJO
    // ============================================================
    let ownerToken = null;
    let storeId = null;
    
    async function sendCode() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email || !email.includes('@')) {
            showMessage('msg', 'Ingresa un correo válido', 'error');
            return;
        }
        
        showMessage('msg', 'Enviando código...', 'success');
        
        const result = await requestCode(email);
        
        if (result && result.ok) {
            currentEmail = email;
            currentCode = generarCodigoLocal();
            document.getElementById('app').innerHTML = renderCodeStep(currentEmail);
            attachCodeEvents();
            showMessage('msg', `✅ Código enviado a ${email}. Revisa tu bandeja.`, 'success');
        } else {
            showMessage('msg', result?.error || 'Error: correo no registrado', 'error');
        }
    }
    
    async function verifyAccess() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code || code.length !== 8) {
            showMessage('msg', 'Ingresa el código de 8 caracteres', 'error');
            return;
        }
        
        showMessage('msg', 'Verificando...', 'success');
        
        const result = await verifyCode(currentEmail, code);
        
        if (result && result.ok && result.token) {
            ownerToken = result.token;
            storeId = result.storeId;
            
            const storeResult = await getStoreInfo(storeId, ownerToken);
            
            if (storeResult && storeResult.ok && storeResult.store) {
                currentStore = storeResult.store;
                document.getElementById('app').innerHTML = renderDashboard(currentStore);
                attachDashboardEvents();
            } else {
                showMessage('msg', 'Error al cargar datos', 'error');
            }
        } else {
            showMessage('msg', result?.error || 'Código incorrecto', 'error');
        }
    }
    // Agrega esta función para recargar datos desde el servidor
async function recargarDatos() {
    const storeResult = await getStoreInfo(storeId, ownerToken);
    if (storeResult && storeResult.ok && storeResult.store) {
        currentStore = storeResult.store;
    }
}

// Modifica saveStatus() - después de guardar, recarga los datos
async function saveStatus() {
    const select = document.getElementById('statusSelect');
    const newStatus = select.value;
    
    if (!currentStore || !ownerToken) return;
    
    showMessage('msg', 'Guardando...', 'success');
    
    const result = await updateStoreStatus(currentStore.storeId, newStatus, ownerToken);
    
    if (result && result.ok) {
        // ✅ FORZAR RECARGA DE DATOS DESDE EL SERVIDOR
        await recargarDatos();
        
        // ✅ VOLVER A RENDERIZAR CON DATOS FRESCOS
        document.getElementById('app').innerHTML = renderDashboard(currentStore);
        attachDashboardEvents();
        showMessage('msg', `✅ Estado actualizado a: ${currentStore.status === 'activo' ? 'ACTIVO' : 'SUSPENDIDO'}`, 'success');
    } else {
        showMessage('msg', result?.error || 'Error al guardar', 'error');
    }
}
    function logout() {
        currentStore = null;
        ownerToken = null;
        storeId = null;
        currentEmail = '';
        currentCode = '';
        document.getElementById('app').innerHTML = renderLogin();
        attachLoginEvents();
    }
    
    function attachLoginEvents() {
        document.getElementById('sendCodeBtn')?.addEventListener('click', sendCode);
        document.getElementById('emailInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCode();
        });
    }
    
    function attachCodeEvents() {
        document.getElementById('verifyBtn')?.addEventListener('click', verifyAccess);
        document.getElementById('backBtn')?.addEventListener('click', () => {
            document.getElementById('app').innerHTML = renderLogin();
            attachLoginEvents();
        });
        document.getElementById('codeInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAccess();
        });
    }
    
    function attachDashboardEvents() {
        document.getElementById('saveStatusBtn')?.addEventListener('click', saveStatus);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }
    
    // Iniciar
    document.getElementById('app').innerHTML = renderLogin();
    attachLoginEvents();
</script>
</body>
</html>
