<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Promotor — Easylink</title>
<style>
  :root {
    --verde: #00c97a;
    --verde-dark: #00a362;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a2e;
    --text2: #6b7280;
    --border: #e5e7eb;
    --danger: #ef4444;
    --success: #10b981;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:var(--bg); min-height:100vh; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg,#064e3b,#065f46,#047857);
    padding:24px;
  }
  .login-box {
    background:white; border-radius:24px; padding:40px 32px;
    width:100%; max-width:400px;
    box-shadow:0 24px 48px rgba(0,0,0,0.18);
  }
  .login-logo {
    text-align:center; margin-bottom:32px;
  }
  .login-logo .icon {
    width:64px; height:64px; background:linear-gradient(135deg,#00c97a,#047857);
    border-radius:18px; display:inline-flex; align-items:center; justify-content:center;
    font-size:28px; margin-bottom:12px;
  }
  .login-logo h1 { font-size:1.4rem; color:var(--text); }
  .login-logo p  { font-size:0.85rem; color:var(--text2); margin-top:4px; }

  .field { margin-bottom:20px; }
  .field label { display:block; font-size:0.8rem; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
  .field input, .field select {
    width:100%; padding:13px 16px; border:1.5px solid var(--border);
    border-radius:12px; font-size:1rem; color:var(--text);
    transition:border-color .2s;
  }
  .field input:focus, .field select:focus { outline:none; border-color:var(--verde); }

  .btn {
    width:100%; padding:14px; border:none; border-radius:12px;
    font-size:1rem; font-weight:700; cursor:pointer; transition:.2s;
  }
  .btn-green  { background:linear-gradient(135deg,#00c97a,#047857); color:white; }
  .btn-green:hover { opacity:.9; }
  .btn-red    { background:var(--danger); color:white; }
  .btn-red:hover { background:#dc2626; }
  .btn-teal   { background:var(--success); color:white; }
  .btn-teal:hover { background:#059669; }
  .btn-gray   { background:#e5e7eb; color:var(--text2); margin-top:10px; }
  .btn-gray:hover { background:#d1d5db; }

  .otp-input {
    text-transform:uppercase; text-align:center;
    font-size:1.8rem; letter-spacing:10px; font-family:monospace;
    font-weight:700;
  }

  .flash {
    padding:12px 16px; border-radius:10px; font-size:0.85rem;
    margin-bottom:16px; display:none;
  }
  .flash.err  { background:#fee2e2; color:#b91c1c; display:block; }
  .flash.ok   { background:#d1fae5; color:#065f46; display:block; }

  /* ── PANEL ── */
  .panel-wrap { min-height:100vh; background:var(--bg); }

  .topbar {
    background:linear-gradient(135deg,#064e3b,#065f46);
    color:white; padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-brand { display:flex; align-items:center; gap:10px; }
  .topbar-brand .icon { font-size:22px; }
  .topbar-brand h2 { font-size:1.1rem; }
  .topbar-brand p  { font-size:0.75rem; opacity:.8; }
  .btn-logout {
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
    color:white; padding:8px 16px; border-radius:8px;
    font-size:0.8rem; font-weight:600; cursor:pointer;
  }
  .btn-logout:hover { background:rgba(255,255,255,.25); }

  .panel-body { padding:24px; max-width:700px; margin:0 auto; }

  /* status pill */
  .status-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:30px; font-size:0.8rem; font-weight:700;
  }
  .pill-activo     { background:#d1fae5; color:#065f46; }
  .pill-suspendido { background:#fee2e2; color:#b91c1c; }

  /* hero card */
  .hero-card {
    background:linear-gradient(135deg,#064e3b,#065f46,#047857);
    border-radius:20px; padding:24px; color:white; margin-bottom:20px;
    display:flex; align-items:center; gap:20px;
  }
  .hero-photo {
    width:72px; height:72px; border-radius:16px; overflow:hidden;
    background:rgba(255,255,255,.2); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:28px;
  }
  .hero-photo img { width:100%; height:100%; object-fit:cover; }
  .hero-info h2  { font-size:1.2rem; font-weight:700; }
  .hero-info p   { font-size:0.85rem; opacity:.85; margin-top:4px; }
  .hero-info .badges { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
  .badge {
    padding:4px 10px; border-radius:20px; font-size:0.72rem; font-weight:600;
    background:rgba(255,255,255,.2); color:white;
  }

  /* section card */
  .section-card {
    background:white; border-radius:16px; padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:16px;
  }
  .section-card h3 {
    font-size:0.75rem; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:.07em; margin-bottom:16px;
  }
  .data-row {
    display:flex; gap:12px; padding:10px 0;
    border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .data-row:last-child { border-bottom:none; }
  .data-label { width:120px; font-size:0.8rem; font-weight:600; color:var(--text2); flex-shrink:0; }
  .data-val   { flex:1; font-size:0.9rem; color:var(--text); word-break:break-word; }

  /* status control */
  .status-control {
    background:white; border-radius:16px; padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:16px;
  }
  .status-control h3 {
    font-size:0.75rem; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:.07em; margin-bottom:12px;
  }
  .status-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .status-row span { font-size:0.9rem; color:var(--text2); }

  @media(max-width:500px){
    .hero-card { flex-direction:column; text-align:center; }
    .hero-info .badges { justify-content:center; }
    .login-box { padding:28px 20px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';

let EMAIL = '', TOKEN = '', STORE = {};

function v(x){ return (x===null||x===undefined||x==='null'||x==='FALSE'||x===false)?'':String(x).trim(); }
function esc(x){ return v(x).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function bool(x){ return x===true||String(x).toUpperCase()==='TRUE'; }

async function api(action, data={}){
  try{
    const r = await fetch(API+'?'+new URLSearchParams({action,...data}));
    return await r.json();
  }catch(e){ return {ok:false,error:e.message}; }
}

function flash(id,txt,type){
  const el=document.getElementById(id);
  if(!el)return;
  el.className='flash '+(type||'err');
  el.textContent=txt;
  setTimeout(()=>{ if(el)el.className='flash'; },5000);
}

/* ══ PANTALLA LOGIN ══ */
function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="icon">🛵</div>
        <h1>Panel Promotor</h1>
        <p>Easylink — Acceso con correo registrado</p>
      </div>
      <div id="flash1" class="flash"></div>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="emailIn" placeholder="tu@correo.com">
      </div>
      <button class="btn btn-green" id="btnSend">Enviar código de acceso</button>
    </div>
  </div>`;
  document.getElementById('btnSend').onclick = doSend;
  document.getElementById('emailIn').onkeypress = e=>{ if(e.key==='Enter') doSend(); };
}

/* ══ PANTALLA OTP ══ */
function renderOTP(email){
  document.getElementById('app').innerHTML=`
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="icon">🔑</div>
        <h1>Código de acceso</h1>
        <p>Enviado a <strong>${esc(email)}</strong></p>
      </div>
      <div id="flash2" class="flash"></div>
      <div class="field">
        <label>Ingresa el código de 8 caracteres</label>
        <input class="otp-input" type="text" id="codeIn" maxlength="8" placeholder="••••••••">
      </div>
      <button class="btn btn-green" id="btnVerify">Verificar acceso</button>
      <button class="btn btn-gray" id="btnBack">← Cambiar correo</button>
    </div>
  </div>`;
  document.getElementById('btnVerify').onclick = doVerify;
  document.getElementById('btnBack').onclick   = renderLogin;
  document.getElementById('codeIn').onkeypress = e=>{ if(e.key==='Enter') doVerify(); };
  document.getElementById('codeIn').focus();
}

/* ══ PANTALLA PANEL ══ */
function renderPanel(){
  const t = STORE;
  const isActivo = v(t.status).toLowerCase()==='activo';
  const foto     = v(t.foto);
  const ubicacion= [v(t.colonia),v(t.localidad),v(t.estado)].filter(Boolean).join(', ');

  document.getElementById('app').innerHTML=`
  <div class="panel-wrap">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="icon">🛵</div>
        <div>
          <h2>Panel Promotor</h2>
          <p>${esc(EMAIL)}</p>
        </div>
      </div>
      <button class="btn-logout" id="btnOut">Cerrar sesión</button>
    </div>

    <div class="panel-body">

      <!-- HERO -->
      <div class="hero-card">
        <div class="hero-photo">
          ${foto ? `<img src="${esc(foto)}" alt="foto" onerror="this.parentElement.innerHTML='🏪'">` : '🏪'}
        </div>
        <div class="hero-info">
          <h2>${esc(t.nombre_tienda)}</h2>
          <p>${esc(t.nombre_cliente)}</p>
          <div class="badges">
            <span class="badge">${esc(t.tipo_negocio)||'General'}</span>
            ${bool(t.movil)?'<span class="badge">🛵 Móvil</span>':''}
            <span class="badge">${esc(t.horariopromotor)||'08:00-18:00'}</span>
          </div>
        </div>
      </div>

      <!-- CONTROL DE STATUS -->
      <div class="status-control">
        <h3>Estado de mi tienda</h3>
        <div class="status-row">
          <span>Estado actual:</span>
          <span class="status-pill ${isActivo?'pill-activo':'pill-suspendido'}">
            ${isActivo?'✅ Activo':'⛔ Suspendido'}
          </span>
        </div>
        <div id="flashStatus" class="flash"></div>
        <div class="field">
          <select id="selStatus">
            <option value="activo"     ${isActivo ?'selected':''}>✅ Activo</option>
            <option value="suspendido" ${!isActivo?'selected':''}>⛔ Suspendido</option>
          </select>
        </div>
        <button class="btn ${isActivo?'btn-red':'btn-teal'}" id="btnStatus">
          ${isActivo?'⛔ Suspender mi tienda':'✅ Activar mi tienda'}
        </button>
      </div>

      <!-- DATOS -->
      <div class="section-card">
        <h3>Mis datos</h3>
        <div class="data-row"><div class="data-label">ID</div><div class="data-val">${esc(t.storeId)}</div></div>
        <div class="data-row"><div class="data-label">Tienda</div><div class="data-val"><strong>${esc(t.nombre_tienda)}</strong></div></div>
        <div class="data-row"><div class="data-label">Cliente</div><div class="data-val">${esc(t.nombre_cliente)}</div></div>
        <div class="data-row"><div class="data-label">Teléfono</div><div class="data-val">${esc(t.telefono)}</div></div>
        <div class="data-row"><div class="data-label">Correo</div><div class="data-val">${esc(t.correo)}</div></div>
        <div class="data-row"><div class="data-label">Giro</div><div class="data-val">${esc(t.tipo_negocio)||'General'}</div></div>
        ${ubicacion?`<div class="data-row"><div class="data-label">Ubicación</div><div class="data-val">${esc(ubicacion)}</div></div>`:''}
        <div class="data-row"><div class="data-label">Horario</div><div class="data-val">${esc(t.horariopromotor)||'08:00-18:00'}</div></div>
        <div class="data-row"><div class="data-label">Servicio móvil</div><div class="data-val">${bool(t.movil)?'✅ Activo':'❌ No'}</div></div>
        ${v(t.ubicate)?`<div class="data-row"><div class="data-label">Ubicate</div><div class="data-val"><a href="${esc(t.ubicate)}" target="_blank">📍 Ver en mapa</a></div></div>`:''}
      </div>

    </div>
  </div>`;

  document.getElementById('btnOut').onclick    = ()=>{ EMAIL='';TOKEN='';STORE={}; renderLogin(); };
  document.getElementById('btnStatus').onclick = doStatus;
}

/* ══ ACCIONES ══ */
async function doSend(){
  const email = document.getElementById('emailIn').value.trim();
  if(!email||!email.includes('@')){ flash('flash1','Ingresa un correo válido'); return; }
  flash('flash1','Enviando código...','ok');
  const r = await api('enviarCodigoPromotor_login',{ correo: email });
  if(r&&r.ok){
    EMAIL = email;
    renderOTP(email);
    flash('flash2','✅ Código enviado, revisa tu bandeja','ok');
  } else {
    flash('flash1', r?.error||'Correo no registrado como promotor móvil activo');
  }
}

async function doVerify(){
  const code = document.getElementById('codeIn').value.trim().toUpperCase();
  if(!code||code.length!==8){ flash('flash2','Ingresa los 8 caracteres del código'); return; }
  flash('flash2','Verificando...','ok');
  const r = await api('verificarCodigoPromotor',{ correo: EMAIL, codigo: code });
  if(r&&r.ok&&r.token){
    TOKEN = r.token;
    // Cargar datos reales del sheet external_stores
    const perfil = await api('promotor.perfil',{ correo: EMAIL });
    if(perfil&&perfil.ok&&perfil.tienda){
      STORE = perfil.tienda;
      renderPanel();
    } else {
      flash('flash2', perfil?.error||'Error cargando datos');
    }
  } else {
    flash('flash2', r?.error||'Código incorrecto o expirado');
  }
}

async function doStatus(){
  const newStatus = document.getElementById('selStatus').value;
  flash('flashStatus','Guardando...','ok');
  const sid = v(STORE.storeId)||v(STORE.storeid);
  const r = await api('external.store.status',{ storeId: sid, status: newStatus, token: TOKEN });
  if(r&&r.ok){
    STORE.status = newStatus;
    renderPanel();
    flash('flashStatus','✅ Estado actualizado a '+newStatus.toUpperCase(),'ok');
  } else {
    flash('flashStatus', r?.error||'Error al guardar');
  }
}

/* INIT */
renderLogin();
</script>
</body>
</html>
