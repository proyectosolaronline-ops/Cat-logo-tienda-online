<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📋 Panel del Dueño - Mi Tienda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .login-card, .dashboard-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #075E54 0%, #128C7E 100%);
            color: white;
            padding: 28px 24px;
            text-align: center;
        }
        .card-header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        .card-body { padding: 28px 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #128C7E;
            box-shadow: 0 0 0 3px rgba(18,140,126,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #128C7E, #075E54);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #10b981; color: white; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .info-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            gap: 12px;
        }
        .info-label {
            width: 120px;
            font-weight: 700;
            color: #374151;
            flex-shrink: 0;
        }
        .info-value { flex: 1; color: #1f2937; word-break: break-word; }
        .access-code-box {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .access-code {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #92400e;
            font-family: monospace;
            background: white;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 50px;
            margin-top: 10px;
        }
        .copy-btn {
            background: #92400e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            margin-top: 12px;
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        .button-group { display: flex; gap: 12px; margin-top: 20px; }
        .button-group .btn { flex: 1; }
        .logout-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 16px;
            width: 100%;
        }
        .logout-btn:hover { color: #dc2626; }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #128C7E;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        hr { margin: 20px 0; border: none; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loading"><div class="spinner"></div>Cargando...</div>
</div>

<script>
    // ============================================================
    // TU API - USANDO ENDPOINTS PÚBLICOS QUE DEBES AGREGAR
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
    
    let currentStore = null;
    let currentAccessCode = null;
    
    function safeString(v) {
        if (v === null || v === undefined) return '';
        return String(v);
    }
    
    function escapeHtml(str) {
        const s = safeString(str);
        return s.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function isTrue(v) {
        if (v === true || v === false) return v;
        return safeString(v).toLowerCase() === 'true' || safeString(v) === '1';
    }
    
    function generateAccessCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }
    
    // ============================================================
    // LLAMADAS A LOS NUEVOS ENDPOINTS PÚBLICOS
    // ============================================================
    
    async function getStoreByEmail(email) {
        try {
            const response = await fetch(`${API_URL}?action=owner.getStoreByEmail&email=${encodeURIComponent(email)}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            const data = await response.json();
            return data;
        } catch (error) {
            return { ok: false, error: error.message };
        }
    }
    
    async function updateStoreStatus(email, status) {
        try {
            const response = await fetch(`${API_URL}?action=owner.updateStoreStatus`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'owner.updateStoreStatus',
                    email: email,
                    status: status
                })
            });
            const data = await response.json();
            return data;
        } catch (error) {
            return { ok: false, error: error.message };
        }
    }
    
    // ============================================================
    // LOGIN REAL
    // ============================================================
    async function loginWithEmail(email) {
        if (!email || !email.includes('@')) {
            return { success: false, error: 'Ingresa un correo electrónico válido' };
        }
        
        const result = await getStoreByEmail(email);
        
        if (!result.ok) {
            return { success: false, error: result.error || 'No se encontró la tienda' };
        }
        
        const store = result.store;
        
        if (store.status === 'suspendido') {
            return { success: false, error: '❌ Tu tienda está suspendida. Contacta al administrador.' };
        }
        
        const accessCode = generateAccessCode();
        
        return {
            success: true,
            store: store,
            accessCode: accessCode
        };
    }
    
    // ============================================================
    // RENDERIZADO
    // ============================================================
    
    function renderLogin() {
        return `
            <div class="login-card">
                <div class="card-header">
                    <h1>🔐 Mi Tienda</h1>
                    <p>Accede con el correo registrado en el directorio</p>
                </div>
                <div class="card-body">
                    <div id="loginMessage"></div>
                    <div class="form-group">
                        <label>📧 Correo electrónico registrado</label>
                        <input type="email" id="loginEmail" placeholder="tutienda@ejemplo.com" autocomplete="email">
                    </div>
                    <button class="btn btn-primary" id="loginBtn">🔍 Ingresar →</button>
                    <p style="text-align: center; margin-top: 20px; font-size: 0.7rem; color: #888;">
                        El sistema verificará tu correo en el directorio de tiendas
                    </p>
                </div>
            </div>
        `;
    }
    
    function renderDashboard(store, accessCode) {
        const isActive = store.status === 'activo';
        const ubicacionCompleta = [store.ubicate, store.colonia, store.localidad, store.estado].filter(s => s && s !== '').join(', ');
        
        return `
            <div class="dashboard-card">
                <div class="card-header">
                    <h1>📋 Panel de Control</h1>
                    <p>Bienvenido, <strong>${escapeHtml(store.nombre_cliente || store.nombre_tienda)}</strong></p>
                </div>
                <div class="card-body">
                    <div id="dashboardMessage"></div>
                    
                    <div class="access-code-box">
                        <div style="font-size: 0.85rem;">🔑 Tu Código de Acceso</div>
                        <div class="access-code" id="accessCodeDisplay">${escapeHtml(accessCode)}</div>
                        <button class="copy-btn" onclick="copyAccessCode()">📋 Copiar código</button>
                        <p style="font-size: 0.7rem; margin-top: 10px;">Guarda este código para futuras referencias</p>
                    </div>
                    
                    <div class="info-box">
                        <div class="info-row">
                            <div class="info-label">📌 Estado:</div>
                            <div class="info-value">
                                <span class="status-badge ${isActive ? 'status-active' : 'status-suspended'}">
                                    ${isActive ? '✅ ACTIVO' : '⛔ SUSPENDIDO'}
                                </span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">📅 Registro:</div>
                            <div class="info-value">${escapeHtml((store.createdAt || '').split('T')[0] || 'No disponible')}</div>
                        </div>
                    </div>
                    
                    <h3 style="margin: 20px 0 15px 0;">🏪 Mis datos</h3>
                    
                    <div class="info-row">
                        <div class="info-label">🏷️ Tienda:</div>
                        <div class="info-value"><strong>${escapeHtml(store.nombre_tienda)}</strong></div>
                    </div>
                    
                    ${store.nombre_cliente ? `
                    <div class="info-row">
                        <div class="info-label">👤 Cliente:</div>
                        <div class="info-value">${escapeHtml(store.nombre_cliente)}</div>
                    </div>
                    ` : ''}
                    
                    <div class="info-row">
                        <div class="info-label">📞 Teléfono:</div>
                        <div class="info-value">${escapeHtml(store.telefono)}</div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label">📧 Correo:</div>
                        <div class="info-value"><strong style="background:#fef3c7; padding:2px 8px; border-radius:12px;">${escapeHtml(store.correo)}</strong></div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label">📂 Giro:</div>
                        <div class="info-value">${escapeHtml(store.tipo_negocio)}</div>
                    </div>
                    
                    ${ubicacionCompleta ? `
                    <div class="info-row">
                        <div class="info-label">📍 Ubicación:</div>
                        <div class="info-value">${escapeHtml(ubicacionCompleta)}</div>
                    </div>
                    ` : ''}
                    
                    <div class="info-row">
                        <div class="info-label">🕐 Horario:</div>
                        <div class="info-value">${escapeHtml(store.horariopromotor || '08:00-18:00')}</div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label">🛵 Servicio Móvil:</div>
                        <div class="info-value">${isTrue(store.movil) ? '✅ Activado' : '❌ Desactivado'}</div>
                    </div>
                    
                    <hr>
                    
                    <div class="button-group">
                        <button class="btn ${isActive ? 'btn-danger' : 'btn-success'}" id="toggleStatusBtn">
                            ${isActive ? '⛔ Suspender mi tienda' : '✅ Activar mi tienda'}
                        </button>
                    </div>
                    
                    <button class="logout-btn" id="logoutBtn">🚪 Cerrar sesión</button>
                </div>
            </div>
        `;
    }
    
    function showMessage(containerId, message, isError = true) {
        const container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = `<div class="${isError ? 'error-message' : 'success-message'}">${message}</div>`;
            setTimeout(() => {
                if (document.getElementById(containerId)) document.getElementById(containerId).innerHTML = '';
            }, 4000);
        }
    }
    
    window.copyAccessCode = function() {
        const codeEl = document.getElementById('accessCodeDisplay');
        if (codeEl) {
            navigator.clipboard.writeText(codeEl.innerText);
            showMessage('dashboardMessage', '✅ Código copiado', false);
        }
    };
    
    async function toggleStatus() {
        const newStatus = currentStore.status === 'activo' ? 'suspendido' : 'activo';
        const result = await updateStoreStatus(currentStore.correo, newStatus);
        
        if (result.ok) {
            currentStore.status = newStatus;
            const app = document.getElementById('app');
            app.innerHTML = renderDashboard(currentStore, currentAccessCode);
            attachDashboardEvents();
            showMessage('dashboardMessage', `✅ Estado actualizado a: ${newStatus === 'activo' ? 'ACTIVO' : 'SUSPENDIDO'}`, false);
        } else {
            showMessage('dashboardMessage', result.error || 'Error al actualizar', true);
        }
    }
    
    function attachDashboardEvents() {
        const toggleBtn = document.getElementById('toggleStatusBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        if (toggleBtn) toggleBtn.addEventListener('click', toggleStatus);
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                currentStore = null;
                document.getElementById('app').innerHTML = renderLogin();
                attachLoginEvents();
            });
        }
    }
    
    function attachLoginEvents() {
        const loginBtn = document.getElementById('loginBtn');
        const loginEmail = document.getElementById('loginEmail');
        
        loginBtn.addEventListener('click', async () => {
            const result = await loginWithEmail(loginEmail.value);
            if (result.success) {
                currentStore = result.store;
                currentAccessCode = result.accessCode;
                document.getElementById('app').innerHTML = renderDashboard(currentStore, currentAccessCode);
                attachDashboardEvents();
            } else {
                showMessage('loginMessage', result.error, true);
            }
        });
        
        loginEmail.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    }
    
    function init() {
        document.getElementById('app').innerHTML = renderLogin();
        attachLoginEvents();
    }
    
    init();
</script>
</body>
</html>
