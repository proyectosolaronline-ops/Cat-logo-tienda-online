<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Promotor — Easylink</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#1a73e8;--wpp:#25D366;--danger:#ef4444;--ok:#16a34a;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f5f6fa;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .panel{background:#fff;border-radius:20px;padding:28px 24px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);}
        .panel h2{font-family:'Outfit',sans-serif;font-size:1.3rem;color:#111;text-align:center;margin-bottom:4px;}
        .panel .sub{font-size:.8rem;color:#888;text-align:center;margin-bottom:20px;}
        .inp{width:100%;padding:13px;border:2px solid #ddd;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;margin-bottom:10px;text-align:center;}
        .inp:focus{outline:none;border-color:var(--primary);}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px;}
        .btn-primary{background:var(--primary);color:#fff;}
        .btn-wpp{background:var(--wpp);color:#fff;}
        .btn-danger{background:var(--danger);color:#fff;}
        .btn-ok{background:var(--ok);color:#fff;}
        .btn-outline{background:#fff;color:#888;border:1.5px solid #ddd;}
        .info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:.9rem;}
        .info-row span:first-child{color:#888;}
        .info-row span:last-child{font-weight:600;color:#111;}
        .badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:700;}
        .badge-ok{background:#e8f5e9;color:#16a34a;}
        .badge-danger{background:#fee2e2;color:#ef4444;}
        .hidden{display:none;}
        .centered{text-align:center;}
        .msg{font-size:.78rem;padding:8px 12px;border-radius:8px;margin-bottom:12px;text-align:center;}
        .msg-ok{background:#e8f5e9;color:#16a34a;}
        .msg-err{background:#fee2e2;color:#ef4444;}
    </style>
</head>
<body>
<div class="panel" id="panel">

    <!-- STEP 1: LOGIN -->
    <div id="step-login">
        <h2>🛵 Panel Promotor</h2>
        <div class="sub">Ingresa tu WhatsApp registrado</div>
        <input class="inp" type="tel" id="login-tel" placeholder="4421234567" maxlength="10">
        <button class="btn btn-primary" onclick="enviarCodigo()">📧 Solicitar código de acceso</button>
        <div id="login-msg"></div>
    </div>

    <!-- STEP 2: VERIFICAR CÓDIGO -->
    <div id="step-code" class="hidden">
        <h2>🔐 Verificar código</h2>
        <div class="sub">Código enviado a tu correo</div>
        <input class="inp" type="text" id="code-input" placeholder="000000" maxlength="6" style="letter-spacing:6px;font-size:22px;">
        <div class="sub" id="code-msg-sub" style="margin-top:6px;"></div>
        <button class="btn btn-primary" onclick="verificarCodigo()">✅ Ingresar</button>
        <button class="btn btn-outline" onclick="volverLogin()">← Volver</button>
        <div id="code-msg"></div>
    </div>

    <!-- STEP 3: PANEL PRINCIPAL -->
    <div id="step-panel" class="hidden">
        <h2>🛵 Mi Panel</h2>
        <div class="sub" id="panel-nombre"></div>
        <div class="info-row"><span>📱 WhatsApp</span><span id="info-tel"></span></div>
        <div class="info-row"><span>🏷️ Tipo</span><span id="info-tipo"></span></div>
        <div class="info-row"><span>📍 Ubicación</span><span id="info-ubi"></span></div>
        <div class="info-row"><span>📌 Estado actual</span><span id="info-status"></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;">
            <button class="btn btn-ok" id="btn-activar" onclick="cambiarStatus('activo')">✅ Activar</button>
            <button class="btn btn-danger" id="btn-suspender" onclick="cambiarStatus('suspendido')">⏸️ Suspender</button>
        </div>
        <div id="panel-msg" style="margin-top:12px;"></div>
        <button class="btn btn-outline" style="margin-top:16px;" onclick="cerrarSesion()">🚪 Salir</button>
    </div>

</div>

<script>
var BACKEND_MAESTRO = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
var codigoActual = '';
var promotorEncontrado = null;

function msg(id, texto, tipo) {
    var el = document.getElementById(id);
    el.textContent = texto;
    el.className = 'msg msg-' + tipo;
    el.style.display = texto ? 'block' : 'none';
}

async function enviarCodigo() {
    var tel = document.getElementById('login-tel').value.replace(/\D/g, '');
    if (tel.length < 10) { msg('login-msg', 'Ingresa 10 dígitos', 'err'); return; }
    
    msg('login-msg', '⏳ Buscando...', 'ok');
    
    try {
        var resp = await fetch(BACKEND_MAESTRO + '?action=stores.directory');
        var data = await resp.json();
        var stores = (data.stores || []).filter(function(s) {
            return s.isExternal === true;
        });
        
        var promotor = stores.find(function(s) {
            var cfg = s.config || {};
            var t = String(cfg.telefono || '').replace(/\D/g, '');
            return t === tel;
        });
        
        if (!promotor) {
            msg('login-msg', '❌ WhatsApp no registrado', 'err');
            return;
        }
        
        promotorEncontrado = promotor;
        codigoActual = Math.floor(100000 + Math.random() * 900000).toString();
        
        var cfg = promotor.config || {};
        var correo = cfg.correo || '';
        
        if (!correo) {
            msg('login-msg', '❌ No hay correo registrado', 'err');
            return;
        }
        
        await fetch(BACKEND_MAESTRO, {
            method: 'POST',
            headers: {'Content-Type': 'text/plain;charset=utf-8'},
            body: JSON.stringify({
                action: 'enviarCodigoPromotor',
                data: {
                    correo: correo,
                    codigo: codigoActual,
                    nombre: promotor.nombre_tienda || promotor.name || 'Promotor'
                }
            })
        });
        
        msg('login-msg', '', 'ok');
        document.getElementById('step-login').classList.add('hidden');
        document.getElementById('step-code').classList.remove('hidden');
        document.getElementById('code-input').value = '';
        document.getElementById('code-msg-sub').textContent = 'Revisa tu correo: ' + correo;
        
    } catch(e) {
        msg('login-msg', '❌ Error de conexión', 'err');
    }
}

function verificarCodigo() {
    var code = document.getElementById('code-input').value.trim();
    if (code !== codigoActual) {
        msg('code-msg', '❌ Código incorrecto', 'err');
        return;
    }
    
    var p = promotorEncontrado;
    var cfg = p.config || {};
    
    document.getElementById('panel-nombre').textContent = p.nombre_tienda || p.name || 'Promotor';
    document.getElementById('info-tel').textContent = cfg.telefono || '';
    document.getElementById('info-tipo').textContent = cfg.tipoNegocio || cfg.tipo || '';
    document.getElementById('info-ubi').textContent = cfg.ubicate || cfg.colonia || 'No definida';
    
    actualizarStatusUI(p.status || 'activo');
    
    document.getElementById('step-code').classList.add('hidden');
    document.getElementById('step-panel').classList.remove('hidden');
}

function actualizarStatusUI(status) {
    var el = document.getElementById('info-status');
    var btnA = document.getElementById('btn-activar');
    var btnS = document.getElementById('btn-suspender');
    
    if (status === 'suspendido') {
        el.innerHTML = '<span class="badge badge-danger">⏸️ Suspendido</span>';
        btnA.style.opacity = '1';
        btnS.style.opacity = '.4';
    } else {
        el.innerHTML = '<span class="badge badge-ok">✅ Activo</span>';
        btnA.style.opacity = '.4';
        btnS.style.opacity = '1';
    }
}

async function cambiarStatus(nuevoStatus) {
    var p = promotorEncontrado;
    var storeId = p.storeId;
    if (!storeId) {
        msg('panel-msg', '❌ Error: ID no encontrado', 'err');
        return;
    }
    
    msg('panel-msg', '⏳ Actualizando...', 'ok');
    
    try {
        var resp = await fetch(BACKEND_MAESTRO, {
            method: 'POST',
            headers: {'Content-Type': 'text/plain;charset=utf-8'},
            body: JSON.stringify({
                action: 'external.store.status',
                storeId: storeId,
                status: nuevoStatus
            })
        });
        
        var data = await resp.json();
        
        if (data.ok) {
            promotorEncontrado.status = nuevoStatus;
            actualizarStatusUI(nuevoStatus);
            msg('panel-msg', nuevoStatus === 'activo' ? '✅ Visible en el mapa' : '⏸️ Oculto del mapa', 'ok');
        } else {
            msg('panel-msg', '❌ Error al actualizar', 'err');
        }
    } catch(e) {
        msg('panel-msg', '❌ Error de conexión', 'err');
    }
}

function volverLogin() {
    document.getElementById('step-code').classList.add('hidden');
    document.getElementById('step-login').classList.remove('hidden');
    codigoActual = '';
    promotorEncontrado = null;
}

function cerrarSesion() {
    promotorEncontrado = null;
    codigoActual = '';
    document.getElementById('step-panel').classList.add('hidden');
    document.getElementById('step-login').classList.remove('hidden');
    document.getElementById('login-tel').value = '';
}
</script>
</body>
</html>
