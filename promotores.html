<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #075E54, #128C7E);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #075E54, #128C7E);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .card-body { padding: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #128C7E; color: white; }
        .btn-primary:hover { background: #075E54; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: #6c757d; color: white; margin-top: 10px; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 16px; margin-bottom: 20px; }
        .success-message { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 16px; margin-bottom: 20px; }
        .info-message { background: #dbeafe; color: #1e40af; padding: 12px; border-radius: 16px; margin-bottom: 20px; }
        .info-row { display: flex; padding: 12px 0; border-bottom: 1px solid #e5e7eb; gap: 12px; flex-wrap: wrap; }
        .info-label { width: 120px; font-weight: 700; color: #374151; }
        .info-value { flex: 1; color: #1f2937; word-break: break-word; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        .code-box { background: #fef3c7; border-radius: 20px; padding: 20px; text-align: center; margin: 20px 0; }
        .code-number { font-size: 2rem; font-weight: bold; letter-spacing: 6px; font-family: monospace; background: white; display: inline-block; padding: 10px 24px; border-radius: 50px; margin-top: 10px; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top: 3px solid #128C7E; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        hr { margin: 20px 0; border: none; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
    
    let currentStore = null;
    let currentEmail = '';
    let ownerToken = null;
    ////////////////////////////////////

// ========================================
// DEBUG COMPLETO - Abre F12 para ver
// ========================================
const DEBUG = true;

function logDebug(msg, data) {
    if (DEBUG) {
        if (data) {
            console.log(`🔍 [DEBUG] ${msg}`, data);
        } else {
            console.log(`🔍 [DEBUG] ${msg}`);
        }
    }
}

// Modifica tu función callAPI original para que loguee
const originalCallAPI = callAPI;
window.callAPI = async function(action, data = {}) {
    logDebug(`Llamando API: ${action}`, data);
    try {
        const url = `${API_URL}?action=${action}&${new URLSearchParams(data).toString()}`;
        logDebug(`URL: ${url}`);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });
        
        const result = await response.json();
        logDebug(`Respuesta de ${action}:`, result);
        
        return result;
    } catch (error) {
        logDebug(`Error en ${action}:`, error.message);
        return { ok: false, error: error.message };
    }
};

// Modifica getStoreByEmail con más logs
async function getStoreByEmail(email) {
    logDebug(`Buscando tienda por email: ${email}`);
    
    const result = await callAPI('stores.directory');
    logDebug('Resultado stores.directory:', result);
    
    if (result.ok && result.stores) {
        logDebug(`Total de tiendas encontradas: ${result.stores.length}`);
        
        const emailLower = email.toLowerCase().trim();
        logDebug(`Email a buscar (lowercase): ${emailLower}`);
        
        // Mostrar todos los correos disponibles
        const allEmails = result.stores.map(s => {
            const config = s.config || {};
            return config.correo || 'SIN CORREO';
        });
        logDebug('Correos disponibles en el directorio:', allEmails);
        
        const store = result.stores.find(s => {
            const config = s.config || {};
            const storeEmail = (config.correo || '').toLowerCase().trim();
            const matches = storeEmail === emailLower;
            if (matches) logDebug(`✅ MATCH encontrado: ${storeEmail}`);
            return matches;
        });
        
        if (store) {
            logDebug('Tienda encontrada:', store);
            return { ok: true, store: store };
        } else {
            logDebug('❌ No se encontró match con ningún correo');
        }
    } else {
        logDebug('❌ stores.directory no respondió correctamente:', result);
    }
    
    return { ok: false, error: 'Correo no registrado en el directorio' };
}

// Modifica sendCode para loguear
const originalSendCode = sendCode;
window.sendCode = async function() {
    logDebug('=== INICIO PROCESO DE LOGIN ===');
    const email = document.getElementById('emailInput').value.trim();
    logDebug(`Email ingresado: ${email}`);
    
    if (!email || !email.includes('@')) {
        logDebug('❌ Email inválido');
        showMessage('msg', 'Correo inválido', 'error');
        return;
    }
    
    logDebug('📧 Verificando email en el directorio...');
    const storeResult = await getStoreByEmail(email);
    
    if (storeResult.ok) {
        logDebug('✅ Email VERIFICADO correctamente');
        currentStore = storeResult.store;
        currentEmail = email;
        
        logDebug('📨 Solicitando código de acceso...');
        const codeResult = await requestCode(email);
        
        if (codeResult.ok) {
            logDebug('✅ Código enviado exitosamente');
            currentAccessCode = generarCodigo();
            document.getElementById('app').innerHTML = renderCodeStep(currentEmail);
            attachCodeEvents();
            showMessage('msg', `✅ Código enviado a ${email}`, 'success');
        } else {
            logDebug('❌ Error al enviar código:', codeResult.error);
            showMessage('msg', codeResult.error || 'Error al enviar código', 'error');
        }
    } else {
        logDebug('❌ Email NO registrado:', storeResult.error);
        showMessage('msg', storeResult.error, 'error');
    }
    logDebug('=== FIN PROCESO DE LOGIN ===');
};


    
    ////////////////////////////////////
    function safeString(v) { return (v === null || v === undefined) ? '' : String(v); }
    function escapeHtml(str) { return safeString(str).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
    
    async function callAPI(action, data = {}) {
        try {
            const response = await fetch(`${API_URL}?action=${action}&${new URLSearchParams(data).toString()}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            return await response.json();
        } catch (error) {
            return { ok: false, error: error.message };
        }
    }
    
    // Usa stores.directory - el mismo que funciona en tu otro HTML
    async function getStoreByEmail(email) {
        const result = await callAPI('stores.directory');
        if (result.ok && result.stores) {
            const emailLower = email.toLowerCase().trim();
            const store = result.stores.find(s => {
                const cfg = s.config || {};
                const storeEmail = safeString(cfg.correo).toLowerCase().trim();
                return storeEmail === emailLower;
            });
            if (store) return { ok: true, store: store };
        }
        return { ok: false, error: 'Correo no registrado' };
    }
    
    async function requestCode(email) {
        return await callAPI('owner.request.code', { email: email });
    }
    
    async function verifyCode(email, code) {
        return await callAPI('owner.verify.code', { email: email, code: code });
    }
    
    async function updateStatus(storeId, status, token) {
        return await callAPI('external.store.status', { storeId: storeId, status: status, token: token });
    }
    
    function generarCodigo() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }
    
    function renderLogin() {
        return `
            <div class="card">
                <div class="card-header"><h1>🔐 Mi Tienda</h1><p>Ingresa tu correo registrado</p></div>
                <div class="card-body">
                    <div id="msg"></div>
                    <div class="form-group"><label>📧 Correo electrónico</label><input type="email" id="emailInput" placeholder="tutienda@ejemplo.com"></div>
                    <button class="btn btn-primary" id="sendCodeBtn">📨 Enviar código</button>
                </div>
            </div>
        `;
    }
    
    function renderCodeStep(email) {
        return `
            <div class="card">
                <div class="card-header"><h1>🔑 Verificar código</h1><p>Código enviado a <strong>${escapeHtml(email)}</strong></p></div>
                <div class="card-body">
                    <div id="msg"></div>
                    <div class="form-group"><label>📲 Código de 8 caracteres</label><input type="text" id="codeInput" maxlength="8" placeholder="Ej: 3K7B9X2M" style="text-transform:uppercase; text-align:center; font-size:1.3rem; letter-spacing:4px;"></div>
                    <button class="btn btn-primary" id="verifyBtn">✅ Verificar acceso</button>
                    <button class="btn btn-secondary" id="backBtn">← Volver</button>
                </div>
            </div>
        `;
    }
    
    function renderDashboard(store, accessCode) {
        const cfg = store.config || {};
        const isActive = store.status === 'active';
        const ubicacion = [cfg.ubicate, cfg.colonia, cfg.localidad, cfg.estado].filter(s => s && s !== '').join(', ');
        
        return `
            <div class="card">
                <div class="card-header"><h1>📋 ${escapeHtml(cfg.nombre_tienda || store.name)}</h1><p>Bienvenido</p></div>
                <div class="card-body">
                    <div id="msg"></div>
                    <div class="code-box"><div>🔑 Tu código de acceso</div><div class="code-number">${escapeHtml(accessCode)}</div><small>Guarda este código</small></div>
                    
                    <div class="info-row"><div class="info-label">Estado:</div><div class="info-value"><span class="status-badge ${isActive ? 'status-active' : 'status-suspended'}">${isActive ? '✅ ACTIVO' : '⛔ SUSPENDIDO'}</span></div></div>
                    
                    <div class="form-group"><label>🔄 Cambiar estado</label>
                        <select id="statusSelect">
                            <option value="active" ${isActive ? 'selected' : ''}>✅ Activo</option>
                            <option value="suspendido" ${!isActive ? 'selected' : ''}>⛔ Suspendido</option>
                        </select>
                    </div>
                    <button class="btn ${isActive ? 'btn-danger' : 'btn-success'}" id="saveStatusBtn">${isActive ? '⛔ Suspender tienda' : '✅ Activar tienda'}</button>
                    
                    <hr>
                    <h3 style="margin:20px 0 15px">🏪 Mis datos (reales desde el sheet)</h3>
                    <div class="info-row"><div class="info-label">Nombre tienda:</div><div class="info-value"><strong>${escapeHtml(cfg.nombre_tienda || store.name)}</strong></div></div>
                    <div class="info-row"><div class="info-label">Cliente:</div><div class="info-value">${escapeHtml(cfg.nombre_cliente || cfg.nombreCliente || '')}</div></div>
                    <div class="info-row"><div class="info-label">Teléfono:</div><div class="info-value">${escapeHtml(cfg.telefono || '')}</div></div>
                    <div class="info-row"><div class="info-label">Correo:</div><div class="info-value"><strong>${escapeHtml(cfg.correo || '')}</strong></div></div>
                    <div class="info-row"><div class="info-label">Giro:</div><div class="info-value">${escapeHtml(cfg.tipoNegocio || cfg.businessType || 'General')}</div></div>
                    ${ubicacion ? `<div class="info-row"><div class="info-label">Ubicación:</div><div class="info-value">${escapeHtml(ubicacion)}</div></div>` : ''}
                    <div class="info-row"><div class="info-label">Horario:</div><div class="info-value">${escapeHtml(cfg.horariopromotor || '08:00-18:00')}</div></div>
                    <div class="info-row"><div class="info-label">Servicio móvil:</div><div class="info-value">${cfg.Movil === true || cfg.Movil === 'TRUE' ? '✅ Activado' : '❌ Desactivado'}</div></div>
                    <div class="info-row"><div class="info-label">WhatsApp:</div><div class="info-value">${cfg.whatsapp === true || cfg.whatsapp === 'TRUE' ? '✅ Habilitado' : '❌ No'}</div></div>
                    
                    <hr>
                    <button class="btn btn-secondary" id="logoutBtn">🚪 Cerrar sesión</button>
                </div>
            </div>
        `;
    }
    
    function showMessage(id, msg, type) {
        const el = document.getElementById(id);
        if (el) {
            el.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${msg}</div>`;
            setTimeout(() => { if (document.getElementById(id)) el.innerHTML = ''; }, 4000);
        }
    }
    
    let currentAccessCode = '';
    
    async function sendCode() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email || !email.includes('@')) { showMessage('msg', 'Correo inválido', 'error'); return; }
        
        const storeResult = await getStoreByEmail(email);
        if (!storeResult.ok) { showMessage('msg', storeResult.error, 'error'); return; }
        
        currentStore = storeResult.store;
        currentEmail = email;
        
        const codeResult = await requestCode(email);
        if (codeResult.ok) {
            currentAccessCode = generarCodigo();
            document.getElementById('app').innerHTML = renderCodeStep(currentEmail);
            attachCodeEvents();
            showMessage('msg', `✅ Código enviado a ${email}`, 'success');
        } else {
            showMessage('msg', codeResult.error || 'Error al enviar código', 'error');
        }
    }
    
    async function verifyAccess() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code || code.length !== 8) { showMessage('msg', 'Código de 8 caracteres', 'error'); return; }
        
        const result = await verifyCode(currentEmail, code);
        if (result.ok && result.token) {
            ownerToken = result.token;
            document.getElementById('app').innerHTML = renderDashboard(currentStore, currentAccessCode);
            attachDashboardEvents();
        } else {
            showMessage('msg', result.error || 'Código incorrecto', 'error');
        }
    }
    
    async function saveStatus() {
        const newStatus = document.getElementById('statusSelect').value;
        const result = await updateStatus(currentStore.storeId, newStatus, ownerToken);
        
        if (result.ok) {
            // Recargar datos desde stores.directory para obtener el estado actualizado
            const refreshResult = await getStoreByEmail(currentEmail);
            if (refreshResult.ok) currentStore = refreshResult.store;
            
            document.getElementById('app').innerHTML = renderDashboard(currentStore, currentAccessCode);
            attachDashboardEvents();
            showMessage('msg', `✅ Estado actualizado a: ${newStatus === 'active' ? 'ACTIVO' : 'SUSPENDIDO'}`, 'success');
        } else {
            showMessage('msg', result.error || 'Error al guardar', 'error');
        }
    }
    
    function logout() {
        currentStore = null;
        ownerToken = null;
        document.getElementById('app').innerHTML = renderLogin();
        attachLoginEvents();
    }
    
    function attachLoginEvents() {
        document.getElementById('sendCodeBtn')?.addEventListener('click', sendCode);
        document.getElementById('emailInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendCode(); });
    }
    
    function attachCodeEvents() {
        document.getElementById('verifyBtn')?.addEventListener('click', verifyAccess);
        document.getElementById('backBtn')?.addEventListener('click', () => {
            document.getElementById('app').innerHTML = renderLogin();
            attachLoginEvents();
        });
        document.getElementById('codeInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyAccess(); });
    }
    
    function attachDashboardEvents() {
        document.getElementById('saveStatusBtn')?.addEventListener('click', saveStatus);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }
    
    document.getElementById('app').innerHTML = renderLogin();
    attachLoginEvents();
</script>
</body>
</html>
