<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Productos, Servicios y Ubicaciones</title>
<meta name="description" id="meta-desc" content="Directorio de tiendas locales. Encuentra productos y servicios cerca de ti.">
<meta name="keywords" id="meta-keywords" content="tiendas, productos, servicios, directorio">
<meta property="og:title" content="Directorio de Tiendas">
<meta property="og:description" id="og-desc" content="Encuentra tiendas con productos y servicios cerca de ti.">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:36px 20px 48px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")}
.header-logo{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.header-logo svg{width:28px;height:28px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(6px)}
.header-loc-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;position:relative;z-index:1}
.header-locs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;position:relative;z-index:1;padding:0 16px}
.loc-txt{font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .15s;position:relative}
.loc-txt::after{content:'·';margin-left:6px;color:rgba(255,255,255,.3)}
.loc-txt:last-child::after{content:''}
.loc-txt:hover{color:#fff;background:rgba(255,255,255,.1)}
.loc-txt.active{color:#fff;font-weight:700;text-decoration:underline;text-underline-offset:3px}

/* ── SECCIÓN MAPA + CARDS CERCANAS ── */
.mapa-section{max-width:960px;margin:0 auto;padding:24px 16px 0;display:none}
.mapa-section.show{display:block}
.mapa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.mapa-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.mapa-title span{width:18px;height:18px;background:#e8f5e9;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px}
.mapa-toggle{font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-light);border:none;border-radius:99px;padding:5px 14px;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.mapa-toggle:hover{background:var(--primary);color:#fff}
#leaflet-map{height:280px;border-radius:var(--r-lg);border:1.5px solid var(--border);overflow:hidden;display:none;margin-bottom:12px}
#leaflet-map.show{display:block}

/* Cards deslizables de tiendas cercanas */
.near-cards-wrap{overflow-x:auto;padding-bottom:10px;scrollbar-width:none;-ms-overflow-style:none}
.near-cards-wrap::-webkit-scrollbar{display:none}
.near-cards-track{display:flex;gap:10px;width:max-content}
.near-card{width:200px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .2s;flex-shrink:0}
.near-card:hover,.near-card.highlighted{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.near-card.highlighted{border-color:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,.25)}
.near-card-banner{height:70px;background:var(--primary);background-size:cover;background-position:center;position:relative}
.near-card-logo{width:36px;height:36px;border-radius:8px;border:2px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);position:absolute;bottom:-14px;left:10px}
.near-card-logo img{width:100%;height:100%;object-fit:cover}
.near-card-body{padding:18px 10px 12px}
.near-card-name{font-family:var(--font-d);font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.near-card-dist{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:3px}
.near-card-kw{font-size:9px;color:var(--primary);background:var(--primary-light);padding:2px 7px;border-radius:99px;display:inline-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.near-card-btn{margin-top:8px;width:100%;padding:7px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.near-card-btn:hover{background:var(--primary-dark)}
.mapa-divider{height:1px;background:var(--border);margin:16px 0 0}

/* SEARCH */
.search-wrap{max-width:600px;margin:20px auto 0;padding:0 16px;position:relative;z-index:2}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border)}
.search-box input{flex:1;padding:13px 16px;border:none;outline:none;font-size:14px;font-family:var(--font-b);color:var(--text)}
.search-box input::placeholder{color:var(--muted)}
.search-btn{padding:11px 16px;background:none;border:none;cursor:pointer;color:var(--muted)}
.search-btn svg{width:18px;height:18px}

/* FILTERS */
.filters-section{max-width:960px;margin:0 auto;padding:24px 16px 0}
.filter-section-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.filter-section-label span{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-style:normal}
/* Filtros tipo texto */
.ftxt{font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:6px;transition:all .15s;white-space:nowrap}
.ftxt::after{content:'·';margin-left:6px;color:rgba(0,0,0,.2)}
.ftxt:last-child::after{content:''}
.ftxt:hover{color:var(--primary);background:var(--primary-light)}
.ftxt.active-ftxt{color:var(--primary);font-weight:700;text-decoration:underline;text-underline-offset:3px}
.filter-chain-1{background:var(--primary-light);border-radius:5px}
.chips-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.chip.on-cat{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip:hover:not(.on-cat){border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.active-filters{max-width:960px;margin:0 auto;padding:0 16px 8px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
.active-filters.show{display:flex}
.af-label{font-size:11px;color:var(--muted);font-weight:500}
.af-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);border:1px solid var(--primary)}
.af-tag.loc{background:#fff3e0;color:#e65100;border-color:#e65100}
.af-tag button{background:none;border:none;cursor:pointer;color:inherit;font-size:13px;line-height:1;padding:0;opacity:.7}
.clear-all{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--font-b)}
.clear-all:hover{color:var(--primary)}

/* PROMO CAROUSEL */
.promo-section{max-width:960px;margin:0 auto;padding:24px 16px 0}
.promo-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.promo-label span{width:18px;height:18px;background:#fff3e0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px}
.promo-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.promo-scroll::-webkit-scrollbar{height:3px}
.promo-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.promo-card{flex-shrink:0;width:130px;border-radius:var(--r-lg);overflow:hidden;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .2s;scroll-snap-align:start;position:relative}
.promo-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--cta)}
.promo-img{width:130px;height:130px;object-fit:cover;display:block;background:var(--bg)}
.promo-img-placeholder{width:130px;height:130px;background:linear-gradient(135deg,var(--primary-light),#e8f0fe);display:flex;align-items:center;justify-content:center;font-size:36px}
.promo-info{padding:8px}
.promo-name{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.promo-store{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.promo-badge{position:absolute;top:6px;left:6px;background:var(--cta);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}

/* GRID */
.dir-wrap{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.store-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column}
.store-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.store-banner{height:90px;background:var(--primary);background-size:cover;background-position:center;position:relative;flex-shrink:0}
.store-logo{width:52px;height:52px;border-radius:12px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.15);position:absolute;bottom:-22px;left:16px;flex-shrink:0}
.store-logo img{width:100%;height:100%;object-fit:cover}
.store-body{padding:30px 16px 16px;flex:1;display:flex;flex-direction:column}
.store-name{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text)}
.store-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1;margin-bottom:10px}
.store-keywords{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.store-kw-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--primary-light);color:var(--primary);cursor:pointer;transition:all .12s}
.store-kw-tag:hover{background:var(--primary);color:#fff}
.store-loc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#fff3e0;color:#e65100;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px}
.store-loc-tag:hover{background:#e65100;color:#fff}
.store-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.store-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.store-tag.mayorista{background:#f3e8ff;color:#7c3aed}
.store-foot{display:flex;gap:8px}
.btn-visit{flex:1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-visit:hover{background:var(--primary-dark)}
.btn-qr{width:40px;height:40px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-qr:hover{border-color:var(--primary);background:var(--primary-light)}
.btn-qr svg{width:18px;height:18px;color:var(--muted)}

/* POPUPS */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.popup-bg.on{display:flex}
.popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.popup-banner{height:120px;background:var(--primary);background-size:cover;background-position:center;border-radius:var(--r-xl) var(--r-xl) 0 0;position:relative}
.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(0,0,0,.35);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-logo{width:64px;height:64px;border-radius:14px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.15);position:absolute;bottom:-28px;left:20px}
.popup-logo img{width:100%;height:100%;object-fit:cover}
.popup-body{padding:40px 20px 24px}
.popup-name{font-family:var(--font-d);font-size:22px;font-weight:800;margin-bottom:6px}
.popup-location{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.popup-keywords{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.popup-kw{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.popup-kw.loc{background:#fff3e0;color:#e65100}
.popup-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px}
.popup-qr{background:var(--bg);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px}
.popup-qr-label{font-size:11px;color:var(--muted);font-weight:500}
.popup-actions{display:flex;gap:10px}
.btn-cta{flex:1;padding:13px;background:var(--cta);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-cta:hover{background:var(--cta-dark)}
.btn-wa{padding:13px 16px;background:#25d366;color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-wa:hover{background:#1db954}
.btn-wa svg{width:20px;height:20px}
.qr-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.qr-modal-bg.on{display:flex}
.qr-box{background:#fff;border-radius:var(--r-xl);padding:28px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.qr-box h3{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:6px}
.qr-box p{font-size:11px;color:var(--muted);margin-bottom:16px}
.qr-close{margin-top:16px;padding:9px 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b)}

/* PROMO POPUP */
.promo-popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:350;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.promo-popup-bg.on{display:flex}
.promo-popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:360px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.promo-popup-img{width:100%;height:200px;object-fit:cover;display:block}
.promo-popup-img-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--primary-light),#e8f0fe);display:flex;align-items:center;justify-content:center;font-size:64px}
.promo-popup-body{padding:20px}
.promo-popup-badge{display:inline-block;background:var(--cta);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:10px}
.promo-popup-name{font-family:var(--font-d);font-size:20px;font-weight:800;margin-bottom:4px}
.promo-popup-store{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:5px}
.promo-popup-desc{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:18px}
.promo-popup-actions{display:flex;gap:10px}
.promo-popup-close{position:absolute;top:10px;right:10px;width:28px;height:28px;background:rgba(0,0,0,.4);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* EMPTY / LOADING */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-ico{font-size:52px;margin-bottom:16px;opacity:.4}
.empty h3{font-family:var(--font-d);font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.count-badge{font-size:12px;color:var(--muted);margin-bottom:16px}

/* Leaflet custom icon */
.lk-marker{width:32px;height:32px;background:var(--primary);border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.35)}
.lk-marker-user{width:16px;height:16px;background:#16a34a;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)}

@media(max-width:480px){
  .dir-grid{grid-template-columns:1fr 1fr}
  .loc-txt{font-size:12px}
  #leaflet-map.show{height:220px}
}
</style>
</head>
<body>

<script id="schema-ld" type="application/ld+json">{"@context":"https://schema.org","@type":"ItemList","name":"Directorio de Tiendas","numberOfItems":0,"itemListElement":[]}</script>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
  <div class="header-badge">🌐 Directorio de tiendas, cerca de ti!!!</div>
  <p class="header-loc-title" id="header-loc-title" style="display:none">📍 ¿Dónde estás?</p>
  <div class="header-locs" id="header-locs"></div>
</div>

<!-- MAPA + CARDS CERCANAS -->
<!-- SEARCH — arriba de todo -->
<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar tienda, producto o servicio..." oninput="filterDir()">
    <button class="search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</div>

<!-- CADENA 1 — filtros tipo texto debajo del buscador -->
<div style="max-width:960px;margin:0 auto;padding:12px 16px 0">
  <div id="chips-cat" style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">
    <span class="ftxt active-ftxt" onclick="setCatFilter('',this)">Todos</span>
    <span class="ftxt" onclick="setCatFilter('mayorista',this)" style="color:#7c3aed">★ Mayoristas</span>
  </div>
</div>

<script>
var params     = new URLSearchParams(location.search);
var BACKEND    = params.get('backend') || localStorage.getItem('ld_backend') || 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = params.get('storeBase') || 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
var ALL_STORES = [], activeCat = '', activeLoc = '', currentWA = '';
var _userLat = null, _userLng = null, _userLoc = '';
var _leafletMap = null, _mapaVisible = false;
var _leafletMarkers = {};
var RADIO_KM = 30;

// ── HELPERS ───────────────────────────────────────────────────
function fixImgUrl(u) {
  if (!u) return '';
  var m = u.match(/[?&]id=([\w-]+)/); if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  var m2 = u.match(/\/d\/([\w-]+)/);  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  return u;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function buildStoreUrl(id) { return STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(id); }
function parseKeywords(raw) { return raw ? raw.split(',').map(function(k){return k.trim();}).filter(Boolean) : []; }
function parseLocation(raw, cfg) {
  if (cfg && cfg.directoryCity) return cfg.directoryCity;
  if (!raw) return '';
  return raw.split(',')[0].trim();
}
function haversineKm(la1,ln1,la2,ln2) {
  var R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── CARGA PRINCIPAL ───────────────────────────────────────────
window.addEventListener('load', async function() {
  if (!BACKEND) { document.getElementById('dir-grid').innerHTML='<div class="empty"><div class="empty-ico">⚙️</div><h3>Configuración requerida</h3></div>'; return; }
  try {
    var r = await fetch(BACKEND + '?action=stores.directory');
    var d = JSON.parse(await r.text());
    var stores = (d.stores||[]).map(function(s){
      s.config = (typeof s.config==='string') ? JSON.parse(s.config) : (s.config||{});
      return s;
    });
    ALL_STORES = stores;
    buildLocHeader(stores);
    buildCatFilters(stores);
    renderDir([]); // vacío por defecto — busca o filtra para ver tiendas
    updateSEO(stores);
    detectUserLocation(stores);
  } catch(e) {
    document.getElementById('dir-grid').innerHTML = '<div class="empty"><div class="empty-ico">😕</div><h3>Error al cargar</h3><p>' + esc(e.message) + '</p></div>';
  }
});

// ── DETECCIÓN DE UBICACIÓN DEL USUARIO ───────────────────────
async function detectUserLocation(stores) {
  // Intentar GPS
  if (navigator.geolocation) {
    try {
      var pos = await new Promise(function(res,rej) {
        navigator.geolocation.getCurrentPosition(res, rej, { timeout:8000, enableHighAccuracy:false });
      });
      _userLat = pos.coords.latitude;
      _userLng = pos.coords.longitude;
    } catch(e) {}
  }
  // Fallback: ?lat= ?lng= en URL
  if (_userLat === null) {
    var urlLat = parseFloat(params.get('lat')||'');
    var urlLng = parseFloat(params.get('lng')||'');
    if (!isNaN(urlLat) && !isNaN(urlLng)) { _userLat = urlLat; _userLng = urlLng; }
  }
  if (_userLat === null) return;

  // Obtener nombre de localidad del usuario
  try {
    var nr = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+_userLat+'&lon='+_userLng+'&zoom=12&addressdetails=1', {headers:{'Accept-Language':'es'}});
    var nd = await nr.json();
    var a  = nd.address || {};
    _userLoc = a.city||a.town||a.village||a.suburb||a.neighbourhood||a.county||a.state_district||'';
  } catch(e) {}

  // Tiendas dentro del radio
  var cercanas = stores.filter(function(s) {
    var cfg = s.config||{};
    var lat = parseFloat(cfg.locationLat), lng = parseFloat(cfg.locationLng);
    return !isNaN(lat) && !isNaN(lng) && haversineKm(_userLat,_userLng,lat,lng) <= RADIO_KM;
  });

  // Ordenar por distancia
  cercanas.sort(function(a,b) {
    var ca=a.config||{}, cb=b.config||{};
    return haversineKm(_userLat,_userLng,parseFloat(ca.locationLat),parseFloat(ca.locationLng))
         - haversineKm(_userLat,_userLng,parseFloat(cb.locationLat),parseFloat(cb.locationLng));
  });

  if (!cercanas.length) return;

  // Mostrar sección mapa
  document.getElementById('mapa-section').classList.add('show');

  // Construir cards deslizables
  buildNearCards(cercanas);

  // Inicializar mapa Leaflet (oculto por defecto)
  initLeafletMap(cercanas);

  // Promos filtradas por localidad del usuario
  buildPromoCarouselLocal(stores, _userLoc);
}

// ── RENDER UNIFICADO EN NEAR-CARDS ───────────────────────────
function renderNearCards(stores, titulo) {
  var track = document.getElementById('near-cards-track');
  var badge = document.getElementById('count-badge');
  var titleEl = document.getElementById('mapa-title-txt');
  if (titleEl && titulo) titleEl.textContent = titulo;

  if (!stores.length) {
    track.innerHTML = '<div class="empty" style="padding:40px 20px;color:var(--muted);text-align:center;width:80vw"><div style="font-size:36px;margin-bottom:8px">🏪</div><div style="font-size:14px;font-weight:600">Sin resultados</div><div style="font-size:12px;margin-top:4px">Prueba con otro filtro</div></div>';
    if (badge) badge.textContent = '';
    return;
  }

  if (badge) badge.textContent = stores.length + ' tienda' + (stores.length!==1?'s':'') + ' disponible' + (stores.length!==1?'s':'');

  track.innerHTML = stores.map(function(s) {
    var cfg       = s.config||{};
    var ini       = (s.name||'?')[0].toUpperCase();
    var logoSrc   = fixImgUrl(cfg.logo||cfg.logoUrl||'');
    var bannerSrc = fixImgUrl(cfg.bannerUrl||'');
    var kws       = parseKeywords(cfg.keywords).slice(0,2).join(', ');
    var dist      = (_userLat!==null && !isNaN(parseFloat(cfg.locationLat)))
      ? haversineKm(_userLat,_userLng,parseFloat(cfg.locationLat),parseFloat(cfg.locationLng)).toFixed(1)+' km' : '';
    var locC = parseLocation(cfg.storeLocation, cfg);
    return '<div class="near-card" id="nc-'+s.storeId+'" onclick="openPopup(\''+s.storeId+'\')">' +
      '<div class="near-card-banner" style="'+(bannerSrc?'background-image:url('+bannerSrc+')':'background:var(--primary)')+'">'+
        '<div class="near-card-logo">'+(logoSrc?'<img src="'+esc(logoSrc)+'" onerror="this.parentNode.textContent=\''+ini+'\'">':ini)+'</div>'+
      '</div>' +
      '<div class="near-card-body">' +
        '<div class="near-card-name">'+esc(s.name)+'</div>' +
        (dist?'<div class="near-card-dist">📍 '+dist+'</div>':'') +
        (kws?'<div class="near-card-kw">'+esc(kws)+'</div>':'') +
        (locC&&!dist?'<div class="near-card-dist" style="color:var(--muted)">📍 '+esc(locC)+'</div>':'') +
        '<button class="near-card-btn" onclick="event.stopPropagation();window.open(\''+buildStoreUrl(s.storeId)+'\',\'_blank\')">Ver tienda →</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── CARDS DESLIZABLES DE TIENDAS CERCANAS ────────────────────
function buildNearCards(stores) {
  window._NEAR_STORES = stores; // guardar para restaurar al limpiar filtros
  renderNearCards(stores, 'Tiendas cerca de ti');
}

// ── MAPA LEAFLET ──────────────────────────────────────────────
function initLeafletMap(cercanas) {
  // Se inicializa diferido para no bloquear el render
  window._NEAR_STORES_MAP = cercanas;
}

function toggleMapa() {
  _mapaVisible = !_mapaVisible;
  var mapEl  = document.getElementById('leaflet-map');
  var toggle = document.getElementById('mapa-toggle');
  mapEl.classList.toggle('show', _mapaVisible);
  toggle.textContent = _mapaVisible ? 'Ocultar mapa' : 'Ver en mapa';

  if (_mapaVisible && !_leafletMap) {
    // Primera vez que se abre el mapa — inicializar
    var cercanas = window._NEAR_STORES_MAP || [];
    var centerLat = _userLat;
    var centerLng = _userLng;
    if (!centerLat && cercanas.length) {
      centerLat = parseFloat(cercanas[0].config.locationLat);
      centerLng = parseFloat(cercanas[0].config.locationLng);
    }

    _leafletMap = L.map('leaflet-map').setView([centerLat||20.5881, centerLng||-100.3889], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom:19
    }).addTo(_leafletMap);

    // Marcador del usuario
    if (_userLat) {
      var userIcon = L.divIcon({
        html:'<div class="lk-marker-user"></div>',
        iconSize:[16,16], iconAnchor:[8,8], className:''
      });
      L.marker([_userLat,_userLng],{icon:userIcon}).addTo(_leafletMap)
        .bindPopup('<b>Tu ubicación</b>').openPopup();
    }

    // Marcadores de tiendas
    cercanas.forEach(function(s) {
      var cfg = s.config||{};
      var lat = parseFloat(cfg.locationLat), lng = parseFloat(cfg.locationLng);
      if (isNaN(lat)||isNaN(lng)) return;

      var ini  = (s.name||'?')[0].toUpperCase();
      var kws  = parseKeywords(cfg.keywords).slice(0,2).join(', ');
      var url  = buildStoreUrl(s.storeId);
      var dist = _userLat ? haversineKm(_userLat,_userLng,lat,lng).toFixed(1)+' km' : '';

      var storeIcon = L.divIcon({
        html:'<div class="lk-marker" title="'+esc(s.name)+'"></div>',
        iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-32], className:''
      });

      var popup = L.popup({maxWidth:240}).setContent(
        '<div style="font-family:Inter,sans-serif;min-width:180px">' +
        '<div style="font-weight:700;font-size:14px;margin-bottom:4px">'+esc(s.name)+'</div>' +
        (dist?'<div style="font-size:11px;color:#717185;margin-bottom:4px">📍 '+dist+'</div>':'') +
        (kws?'<div style="font-size:11px;color:#1a73e8;margin-bottom:8px">'+esc(kws)+'</div>':'') +
        '<div style="display:flex;gap:6px">' +
          '<button onclick="openPopup(\''+s.storeId+'\')" style="flex:1;padding:7px;background:#1a73e8;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer">Ver detalle</button>' +
          '<a href="'+url+'" target="_blank" style="flex:1;padding:7px;background:#ff6900;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none">Ir a tienda</a>' +
        '</div>' +
        '</div>'
      );

      var marker = L.marker([lat,lng],{icon:storeIcon}).addTo(_leafletMap).bindPopup(popup);
      marker.on('click', function() { scrollToNearCard(s.storeId); });
      _leafletMarkers[s.storeId] = marker;
    });

    // Ajustar vista para incluir todos
    if (cercanas.length > 1) {
      var bounds = L.latLngBounds(cercanas
        .filter(function(s){ return !isNaN(parseFloat(s.config.locationLat)); })
        .map(function(s){ return [parseFloat(s.config.locationLat),parseFloat(s.config.locationLng)]; })
      );
      if (_userLat) bounds.extend([_userLat,_userLng]);
      _leafletMap.fitBounds(bounds, {padding:[30,30]});
    }
  } else if (_mapaVisible && _leafletMap) {
    setTimeout(function(){ _leafletMap.invalidateSize(); }, 100);
  }
}

function highlightMarker(storeId) {
  var m = _leafletMarkers[storeId];
  if (m) m.openPopup();
}
function unhighlightMarker(storeId) {
  // No cerramos el popup para mejor UX
}
function scrollToNearCard(storeId) {
  var card = document.getElementById('nc-'+storeId);
  if (!card) return;
  card.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  card.classList.add('highlighted');
  setTimeout(function(){ card.classList.remove('highlighted'); }, 2000);
}

// ── PROMOS FILTRADAS POR LOCALIDAD DEL USUARIO ───────────────
function buildPromoCarouselLocal(stores, userLoc) {
  // Filtrar tiendas de la misma localidad del usuario
  var promos = [];
  stores.forEach(function(s) {
    var cfg    = s.config||{};
    var storeLoc = parseLocation(cfg.storeLocation, cfg).toLowerCase();
    var userLocN = (userLoc||'').toLowerCase();
    // Incluir promo si: tiene promo Y (misma localidad O está a menos de RADIO_KM)
    var mismaCiudad = userLocN && storeLoc && storeLoc.includes(userLocN);
    var cercana = _userLat && !isNaN(parseFloat(cfg.locationLat)) &&
                  haversineKm(_userLat,_userLng,parseFloat(cfg.locationLat),parseFloat(cfg.locationLng)) <= RADIO_KM;
    if ((mismaCiudad || cercana) && (cfg.promoImage || cfg.promoTitle)) {
      promos.push({
        storeId:   s.storeId,
        storeName: s.name,
        title:     cfg.promoTitle || s.name,
        desc:      cfg.promoDesc  || cfg.description || '',
        img:       fixImgUrl(cfg.promoImage||''),
        storeUrl:  buildStoreUrl(s.storeId)
      });
    }
  });

  var section = document.getElementById('promo-section');
  var scroll  = document.getElementById('promo-scroll');

  if (!promos.length) {
    // Si no hay promos locales, mostrar todas
    var todasPromos = [];
    stores.forEach(function(s) {
      var cfg = s.config||{};
      if (cfg.promoImage || cfg.promoTitle) {
        todasPromos.push({ storeId:s.storeId, storeName:s.name, title:cfg.promoTitle||s.name,
          desc:cfg.promoDesc||cfg.description||'', img:fixImgUrl(cfg.promoImage||''), storeUrl:buildStoreUrl(s.storeId) });
      }
    });
    if (!todasPromos.length) { section.style.display='none'; return; }
    promos = todasPromos;
  }

  window._PROMOS = promos;
  section.style.display = '';
  scroll.innerHTML = promos.map(function(p,i) {
    var imgH = p.img
      ? '<img class="promo-img" src="'+esc(p.img)+'" onerror="this.parentNode.innerHTML=\'<div class=promo-img-placeholder>🛍️</div>\'">'
      : '<div class="promo-img-placeholder">🛍️</div>';
    return '<div class="promo-card" onclick="openPromoPopup('+i+')">' +
      '<div class="promo-badge">🔥 Promo</div>' + imgH +
      '<div class="promo-info"><div class="promo-name">'+esc(p.title)+'</div><div class="promo-store">'+esc(p.storeName)+'</div></div>' +
    '</div>';
  }).join('');
}

function openPromoPopup(idx) {
  var p = (window._PROMOS||[])[idx]; if (!p) return;
  var w = document.getElementById('promo-popup-img-wrap');
  w.innerHTML = p.img ? '<img class="promo-popup-img" src="'+esc(p.img)+'" onerror="this.parentNode.innerHTML=\'<div class=promo-popup-img-ph>🛍️</div>\'">' : '<div class="promo-popup-img-ph">🛍️</div>';
  document.getElementById('promo-popup-name').textContent  = p.title;
  document.getElementById('promo-popup-store').innerHTML   = '🏪 '+esc(p.storeName);
  document.getElementById('promo-popup-desc').textContent  = p.desc;
  document.getElementById('promo-popup-btn').onclick = function(){ window.open(p.storeUrl,'_blank'); };
  document.getElementById('promo-popup-bg').classList.add('on');
}
function closePromoPopup(){ document.getElementById('promo-popup-bg').classList.remove('on'); }

// ── CADENA 2: HEADER ──────────────────────────────────────────
function buildLocHeader(stores) {
  var locSet = {};
  stores.forEach(function(s){ var l=parseLocation(s.config.storeLocation,s.config); if(l) locSet[l.toLowerCase()]=l; });
  var hdrLocs=document.getElementById('header-locs'), title=document.getElementById('header-loc-title');
  var locs=Object.values(locSet).sort();
  if (!locs.length) return;
  title.style.display='';
  hdrLocs.innerHTML='';
  var all=document.createElement('span'); all.className='loc-txt active'; all.textContent='Todas';
  all.onclick=function(){ setLocFilter('',all); }; hdrLocs.appendChild(all);
  locs.forEach(function(loc) {
    var t=document.createElement('span'); t.className='loc-txt'; t.textContent=loc; t.dataset.loc=loc.toLowerCase();
    t.onclick=function(){ setLocFilter(loc.toLowerCase(),t); }; hdrLocs.appendChild(t);
  });
}

// ── CADENA 1: FILTROS ─────────────────────────────────────────



































// ── CADENA 1: FILTROS TIPO TEXTO ──────────────────────────────
function buildCatFilters(stores) {
  var kwSet={};
  stores.forEach(function(s){ parseKeywords(s.config.keywords).forEach(function(k){ kwSet[k.toLowerCase()]=k; }); });
  var el=document.getElementById('chips-cat');
  el.innerHTML='<span class="ftxt active-ftxt" onclick="setCatFilter(\'\',this)">Todos</span><span class="ftxt" onclick="setCatFilter(\'mayorista\',this)" style="color:#7c3aed">★ Mayoristas</span>';
  Object.keys(kwSet).sort().forEach(function(kl){
    var c=document.createElement('span'); c.className='ftxt'; c.textContent=kwSet[kl];
    c.onclick=function(){ setCatFilter(kl,c); }; el.appendChild(c);
  });
}
function setCatFilter(f,el) {
  activeCat=f;
  document.querySelectorAll('#chips-cat .ftxt').forEach(function(c){ c.classList.remove('active-ftxt'); c.style.color=''; });
  if(el){ el.classList.add('active-ftxt'); if(f==='mayorista') el.style.color='#7c3aed'; }
  updateAF(); filterDir();
}
function setLocFilter(f,el) {
  activeLoc=f;
  document.querySelectorAll('#header-locs .loc-txt').forEach(function(t){t.classList.remove('active');});
  if(el) el.classList.add('active');
  updateAF(); filterDir();
}
function updateAF() {
  var af=document.getElementById('active-filters'),ct=document.getElementById('af-cat-tag'),lt=document.getElementById('af-loc-tag');
  af.classList.toggle('show',!!(activeCat||activeLoc));
  ct.style.display=activeCat?'':'none'; if(activeCat) ct.innerHTML='<span class="af-tag">&#128717; '+activeCat+' <button onclick="clearCat()">×</button></span>';
  lt.style.display=activeLoc?'':'none'; if(activeLoc) lt.innerHTML='<span class="af-tag loc">&#128205; '+activeLoc+' <button onclick="clearLoc()">×</button></span>';
}
function clearCat(){
  activeCat='';
  document.querySelectorAll('#chips-cat .ftxt').forEach(function(c){ c.classList.remove('active-ftxt'); c.style.color=''; });
  var first=document.querySelector('#chips-cat .ftxt'); if(first) first.classList.add('active-ftxt');
  updateAF(); filterDir();
}
function clearLoc(){
  activeLoc='';
  document.querySelectorAll('#header-locs .loc-txt').forEach(function(t){t.classList.remove('active');});
  var f=document.querySelector('#header-locs .loc-txt'); if(f) f.classList.add('active');
  updateAF(); filterDir();
}
function clearAllFilters(){ clearCat(); clearLoc(); document.getElementById('search-input').value=''; }

function filterDir() {
  var q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  var list=ALL_STORES.filter(function(s){
    var cfg=s.config||{}, kws=parseKeywords(cfg.keywords), loc=parseLocation(cfg.storeLocation,cfg).toLowerCase(), kwt=kws.map(function(k){return k.toLowerCase();}).join(' ');
    var mQ=!q||[(s.name||'').toLowerCase(),(cfg.description||'').toLowerCase(),kwt,loc,(cfg.storeLocation||'').toLowerCase()].some(function(f){return f.includes(q);});
    var mC=!activeCat?true:activeCat==='mayorista'?cfg.businessType==='mayorista':kws.some(function(k){return k.toLowerCase()===activeCat;});
    var mL=!activeLoc||loc===activeLoc;
    return mQ&&mC&&mL;
  });

  var q2 = q || activeCat || activeLoc;
  if (!q2) {
    // Sin filtro — volver a mostrar tiendas cercanas (si hay) o mensaje inicial
    if (window._NEAR_STORES && window._NEAR_STORES.length) {
      renderNearCards(window._NEAR_STORES, 'Tiendas cerca de ti');
    } else {
      document.getElementById('near-cards-track').innerHTML =
        '<div class="empty" style="padding:40px 20px;color:var(--muted);text-align:center;width:80vw">' +
        '<div style="font-size:36px;margin-bottom:8px">🔍</div>' +
        '<div style="font-size:14px;font-weight:600">Busca o activa tu ubicación</div>' +
        '<div style="font-size:12px;margin-top:4px">para ver tiendas aquí</div></div>';
      document.getElementById('count-badge').textContent = '';
      document.getElementById('mapa-title-txt').textContent = 'Tiendas cerca de ti';
    }
    return;
  }
  renderNearCards(list, list.length + ' resultado' + (list.length!==1?'s':''));
}

function setCatFilterByValue(v){document.querySelectorAll('#chips-cat .ftxt').forEach(function(c){if(c.textContent.trim().toLowerCase()===v)setCatFilter(v,c);});}
function setLocFilterByValue(v){document.querySelectorAll('#header-locs .loc-txt').forEach(function(t){if((t.dataset.loc||'')===v)setLocFilter(v,t);});}

// ── SEO ───────────────────────────────────────────────────────
function updateSEO(stores){
  var kwSet={},locSet={};
  stores.forEach(function(s){parseKeywords(s.config.keywords).forEach(function(k){kwSet[k.toLowerCase()]=k;});var l=parseLocation(s.config.storeLocation,s.config);if(l)locSet[l.toLowerCase()]=l;});
  var kwC=Object.values(kwSet).join(', '),locC=Object.values(locSet).join(', '),comb=[kwC,locC].filter(Boolean).join(', ');
  document.getElementById('meta-keywords').content='tiendas, directorio, '+comb;
  var dt='Directorio de tiendas con: '+kwC+'. Ubicadas en: '+locC+'.';
  document.getElementById('meta-desc').content=dt; document.getElementById('og-desc').content=dt;
  document.title='Directorio — '+(kwC.slice(0,50)||'Tiendas')+' | '+(locC.slice(0,40)||'Localidades');
  document.getElementById('schema-ld').textContent=JSON.stringify({'@context':'https://schema.org','@type':'ItemList','name':'Directorio de Tiendas','description':dt,'numberOfItems':stores.length,'keywords':comb,'itemListElement':stores.map(function(s,i){var cfg=s.config||{};return{'@type':'ListItem','position':i+1,'item':{'@type':'LocalBusiness','name':s.name,'description':cfg.description||'','url':buildStoreUrl(s.storeId),'keywords':(cfg.keywords||'')+', '+(cfg.storeLocation||''),'address':{'@type':'PostalAddress','addressLocality':parseLocation(cfg.storeLocation,cfg)}}};})});
}

// ── POPUP TIENDA ──────────────────────────────────────────────
function openPopup(id){
  var s=ALL_STORES.find(function(x){return x.storeId===id;}); if(!s) return;
  var cfg=s.config||{},logo=fixImgUrl(cfg.logo||cfg.logoUrl||''),banner=fixImgUrl(cfg.bannerUrl||'');
  var ini=(s.name||'?')[0].toUpperCase(),url=buildStoreUrl(id),kws=parseKeywords(cfg.keywords),loc=parseLocation(cfg.storeLocation,cfg);
  currentWA=cfg.whatsapp||'';
  document.getElementById('popup-banner').style.background=banner?'url('+banner+') center/cover no-repeat':'var(--primary)';
  document.getElementById('popup-logo').innerHTML=logo?'<img src="'+esc(logo)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent=\''+ini+'\'">':ini;
  document.getElementById('popup-name').textContent=s.name||'';
  document.getElementById('popup-location').innerHTML=cfg.storeLocation?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> '+esc(cfg.storeLocation):'';
  document.getElementById('popup-keywords').innerHTML=kws.map(function(k){return'<span class="popup-kw">'+esc(k)+'</span>';}).join('')+(loc?'<span class="popup-kw loc">📍 '+esc(loc)+'</span>':'');
  document.getElementById('popup-desc').textContent=cfg.description||'Visita nuestra tienda y descubre todos nuestros productos y servicios.';
  document.getElementById('popup-visit-btn').href=url;
  document.getElementById('popup-wa-btn').style.display=currentWA?'flex':'none';
  var qe=document.getElementById('popup-qr-code'); qe.innerHTML='';
  try{new QRCode(qe,{text:url,width:140,height:140,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
  document.getElementById('popup-bg').classList.add('on');
  document.body.style.overflow='hidden';
}
function closePopup(){document.getElementById('popup-bg').classList.remove('on');document.body.style.overflow='';}
function openWA(){if(currentWA)window.open('https://wa.me/'+currentWA.replace(/\D/g,''),'_blank');}
function openQR(id){
  var s=ALL_STORES.find(function(x){return x.storeId===id;}); if(!s) return;
  document.getElementById('qr-store-name').textContent=s.name||'';
  var qe=document.getElementById('qr-code-small'); qe.innerHTML='';
  try{new QRCode(qe,{text:buildStoreUrl(id),width:180,height:180,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
  document.getElementById('qr-modal-bg').classList.add('on');
}
function closeQR(){document.getElementById('qr-modal-bg').classList.remove('on');}
</script>
