<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapa Tiendas Externas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

#map { position: fixed; top: 54px; left: 0; right: 0; bottom: 0; z-index: 1; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 54px;
  background: rgba(10,10,18,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 10px; padding: 0 14px; z-index: 1000;
}
.topbar-title { font-weight: 800; font-size: 15px; color: #fff; flex: 1; }
.topbar-title span { color: #6ee7b7; }
.badge { background: #6ee7b7; color: #0a0a12; font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 99px; }
.btn-top {
  height: 34px; padding: 0 12px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
  color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap;
}
.btn-top:hover { border-color: #6ee7b7; color: #6ee7b7; }

/* POPUP */
.leaflet-popup-content-wrapper {
  background: #12121e !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  border-radius: 14px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  padding: 0 !important; overflow: hidden;
}
.leaflet-popup-tip { background: #12121e !important; }
.leaflet-popup-content { margin: 0 !important; width: 230px !important; }
.popup-img { width: 100%; height: 120px; object-fit: cover; display: block; }
.popup-img-ph { width: 100%; height: 70px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 36px; }
.popup-body { padding: 11px 13px 13px; }
.popup-nombre { font-weight: 800; font-size: 14px; color: #f0f0f8; margin-bottom: 4px; }
.popup-tipo { display: inline-block; font-size: 10px; font-weight: 700; background: rgba(110,231,183,0.15); color: #6ee7b7; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; }
.popup-row { font-size: 12px; color: #8b8ba8; margin-bottom: 4px; }
.popup-tel { color: #60a5fa; font-weight: 600; text-decoration: none; }
.popup-status { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-top: 6px; }
.popup-status.activo { background: rgba(52,211,153,0.18); color: #34d399; }
.popup-status.suspendido { background: rgba(248,113,113,0.18); color: #f87171; }

.fabs { position: fixed; bottom: 20px; right: 14px; z-index: 900; display: flex; flex-direction: column; gap: 10px; }
.fab {
  width: 46px; height: 46px; border-radius: 13px; border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: transform .15s;
}
.fab:hover { transform: scale(1.08); }
.fab.sat { background: rgba(10,10,20,0.95); border: 1px solid rgba(255,255,255,0.15); }
.fab.gps { background: #3b82f6; }

#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
  z-index: 9999; display: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.3);
}
#toast.success { background: #34d399; color: #0a1a12; }
#toast.error   { background: #f87171; color: #fff; }
#toast.warn    { background: #fbbf24; color: #0a0a00; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🗺️ Tiendas <span>Externas</span></div>
  <span class="badge" id="badge-total">0</span>
  <button class="btn-top" onclick="loadTiendas()">↺ Actualizar</button>
  <button class="btn-top" id="btn-full" onclick="toggleFullscreen()">⛶ Pantalla completa</button>
</div>

<div id="map"></div>

<div class="fabs">
  <button class="fab sat" id="fab-sat" title="Satélite / Calles" onclick="toggleTile()">🛰️</button>
  <button class="fab gps" title="Mi ubicación" onclick="irGPS()">📍</button>
</div>

<div id="toast"></div>

<script>
/* ── CONFIG: igual que el HTML original ── */
const BACKEND = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
let TOKEN = localStorage.getItem('lk_token') || '';

let ALL_TIENDAS = [];
let MAP, tileCalles, tileSat, modoSat = true;
let markers = [];

/* ── API: copiada exacta del original ── */
async function api(action, data) {
  data = data || {};
  try {
    var res = await fetch(BACKEND, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(Object.assign({ action: action, token: TOKEN }, data))
    });
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    return json;
  } catch(e) { toast(e.message, 'error'); return null; }
}

/* ── MAPA ── */
function initMap() {
  MAP = L.map('map', { zoomControl: false }).setView([20.5888, -100.3899], 12);
  tileCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21 });
  tileSat    = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 });
  tileSat.addTo(MAP);
  L.control.zoom({ position: 'topleft' }).addTo(MAP);
}

function toggleTile() {
  modoSat = !modoSat;
  var btn = document.getElementById('fab-sat');
  if (modoSat) { MAP.removeLayer(tileCalles); tileSat.addTo(MAP); btn.textContent = '🛰️'; }
  else          { MAP.removeLayer(tileSat); tileCalles.addTo(MAP); btn.textContent = '🗺️'; }
}

/* ── FULLSCREEN ── */
var isFs = false;
function toggleFullscreen() {
  isFs = !isFs;
  var mapEl  = document.getElementById('map');
  var topbar = document.querySelector('.topbar');
  var btn    = document.getElementById('btn-full');
  if (isFs) {
    mapEl.style.top = '0';
    topbar.style.display = 'none';
    btn.textContent = '✕ Salir';
  } else {
    mapEl.style.top = '54px';
    topbar.style.display = '';
    btn.textContent = '⛶ Pantalla completa';
  }
  setTimeout(function(){ MAP.invalidateSize(); }, 200);
}
document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && isFs) toggleFullscreen(); });

/* ── CARGAR TIENDAS ── */
async function loadTiendas() {
  toast('Cargando tiendas...', 'warn');
  var res = await api('external.stores.list');
  if (!res) return;
  ALL_TIENDAS = res.stores || [];
  document.getElementById('badge-total').textContent = ALL_TIENDAS.length;
  ponerMarkers();
  if (ALL_TIENDAS.length) ajustarVista();
  toast(ALL_TIENDAS.length + ' tiendas cargadas ✅', 'success');
}

/* ── MARCADORES ── */
function fixImg(u) {
  if (!u) return '';
  if (u.startsWith('data:')) return u;
  var m  = u.match(/[?&]id=([\w-]+)/); if (m)  return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2 = u.match(/\/d\/([\w-]+)/);   if (m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}

function ponerMarkers() {
  markers.forEach(function(m){ MAP.removeLayer(m); });
  markers = [];

  ALL_TIENDAS.forEach(function(t) {
    var lat = parseFloat(t.locationLat);
    var lng = parseFloat(t.locationLng);
    if (isNaN(lat) || isNaN(lng)) return;

    var color = t.status === 'activo' ? '#6ee7b7' : '#f87171';
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:'+color+';border:3px solid rgba(0,0,0,0.5);box-shadow:0 0 0 2px '+color+'55,0 4px 12px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:16px;">🏪</div>',
      iconSize: [36,36], iconAnchor: [18,36], popupAnchor: [0,-38]
    });

    var foto = t.foto ? fixImg(t.foto) : '';
    var fotoHtml = foto
      ? '<img class="popup-img" src="'+foto+'" onerror="this.style.display=\'none\'">'
      : '<div class="popup-img-ph">🏪</div>';

    var loc = [t.localidad, t.estado].filter(Boolean).join(', ');

    var popup =
      '<div>' + fotoHtml +
      '<div class="popup-body">' +
        '<div class="popup-nombre">'+esc(t.nombre_tienda||'—')+'</div>' +
        (t.tipo_negocio ? '<span class="popup-tipo">'+esc(t.tipo_negocio)+'</span><br>' : '') +
        (t.nombre_cliente ? '<div class="popup-row">👤 '+esc(t.nombre_cliente)+'</div>' : '') +
        (t.telefono ? '<div class="popup-row">📞 <a class="popup-tel" href="tel:'+esc(t.telefono)+'">'+esc(t.telefono)+'</a></div>' : '') +
        (loc ? '<div class="popup-row">📍 '+esc(loc)+'</div>' : '') +
        '<span class="popup-status '+(t.status==='activo'?'activo':'suspendido')+'">'+(t.status==='activo'?'● Activo':'● Suspendido')+'</span>' +
      '</div></div>';

    var marker = L.marker([lat, lng], { icon: icon }).addTo(MAP);
    marker.bindPopup(popup, { maxWidth: 250, minWidth: 230 });
    markers.push(marker);
  });
}

function ajustarVista() {
  var coords = ALL_TIENDAS
    .filter(function(t){ return t.locationLat && t.locationLng; })
    .map(function(t){ return [parseFloat(t.locationLat), parseFloat(t.locationLng)]; });
  if (coords.length > 1) MAP.fitBounds(coords, { padding: [60,60] });
  else if (coords.length === 1) MAP.setView(coords[0], 15);
}

/* ── GPS ── */
function irGPS() {
  if (!navigator.geolocation) { toast('GPS no disponible', 'warn'); return; }
  toast('Obteniendo ubicación...', 'warn');
  navigator.geolocation.getCurrentPosition(function(pos) {
    MAP.setView([pos.coords.latitude, pos.coords.longitude], 15, { animate: true });
    L.marker([pos.coords.latitude, pos.coords.longitude], {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 4px rgba(59,130,246,0.3);"></div>',
        iconSize:[16,16], iconAnchor:[8,8]
      })
    }).addTo(MAP).bindPopup('<b style="color:#12121e">📍 Tu ubicación</b>').openPopup();
    toast('Ubicación obtenida ✅', 'success');
  }, function(){ toast('No se pudo obtener ubicación', 'error'); }, { enableHighAccuracy:true, timeout:10000 });
}

/* ── UTILS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = type||'success'; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(function(){ el.style.display='none'; }, 3000);
}

/* ── INIT ── */
window.addEventListener('load', function() {
  initMap();
  loadTiendas();
});
</script>
</body>
</html>
