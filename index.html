<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Directorio GPS — Tiendas en Tiempo Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --cta: #ff6900; --bg: #f5f6f7; --surface: #fff; --border: #dde1e7;
            --text: #1a1a2e; --muted: #717185; --font-d: 'Outfit', sans-serif;
            --font-b: 'Inter', sans-serif; --r-lg: 14px; --shadow: 0 4px 16px rgba(0,0,0,.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-b); background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- HEADER LOGISTICS --- */
        .header { background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%); color: #fff; padding: 40px 20px 60px; text-align: center; }
        .header-logo { width: 56px; height: 56px; background: rgba(255,255,255,.15); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; border: 1px solid rgba(255,255,255,.2); }
        .header-badge { display: inline-block; background: rgba(255,255,255,.1); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* --- SEARCH FLOATING --- */
        .search-wrap { max-width: 600px; margin: -28px auto 0; padding: 0 16px; position: relative; z-index: 1000; }
        .search-box { background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow); display: flex; border: 1.5px solid var(--border); overflow: hidden; }
        .search-box input { flex: 1; padding: 16px; border: none; outline: none; font-size: 16px; }

        /* --- MAP LOGISTICS --- */
        .mapa-section { max-width: 960px; margin: 24px auto; padding: 0 16px; }
        .mapa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .mapa-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .mapa-toggle { background: var(--primary-light); color: var(--primary); border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; }
        
        #leaflet-map { height: 280px; border-radius: var(--r-lg); border: 1.5px solid var(--border); margin-bottom: 20px; display: none; z-index: 1; }
        #leaflet-map.show { display: block; }

        /* --- HORIZONTAL GPS CARDS --- */
        .near-cards-wrap { display: flex; gap: 14px; overflow-x: auto; padding: 4px 4px 20px; scrollbar-width: none; -ms-overflow-style: none; }
        .near-cards-wrap::-webkit-scrollbar { display: none; }
        
        .near-card { width: 240px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 18px; flex-shrink: 0; transition: 0.3s; position: relative; }
        .near-card.highlighted { border-color: #16a34a; background: #f0fdf4; box-shadow: 0 8px 20px rgba(22,163,74,0.1); }
        .near-card-name { font-family: var(--font-d); font-weight: 800; font-size: 16px; margin-bottom: 4px; color: #1a1a2e; }
        .near-card-dist { font-size: 12px; color: var(--primary); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
        
        .btn-ruta { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .btn-ruta:active { transform: scale(0.98); background: var(--primary-dark); }

        /* --- GRID LOGISTICS --- */
        .dir-grid { max-width: 960px; margin: 0 auto 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 16px; }
        .store-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; padding: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">🏙️</div>
        <div class="header-badge">Directorio Inteligente</div>
        <h1 style="font-family: var(--font-d); margin-top: 10px; font-size: 22px;">Tiendas Cercanas</h1>
    </header>

    <div class="search-wrap">
        <div class="search-box">
            <input type="text" id="inputBusqueda" placeholder="Buscar por nombre o categoría..." oninput="filtrarTiendas()">
        </div>
    </div>

    <section class="mapa-section">
        <div class="mapa-header">
            <div class="mapa-title">📍 Radar GPS en tiempo real</div>
            <button class="mapa-toggle" onclick="toggleMapa()">Ver Mapa</button>
        </div>
        
        <div id="leaflet-map"></div>

        <div class="near-cards-wrap" id="gps-container">
            <div class="near-card">Esperando GPS...</div>
        </div>
    </section>

    <div class="dir-grid" id="grid-principal">
        </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- BASE DE DATOS (BACKEND EMULADO) ---
        const tiendasDB = [
            { id: 1, nombre: "Cafetería Central", lat: 40.4167, lng: -3.7037, cat: "Alimentos", img: "☕" },
            { id: 2, nombre: "Tech Store Pro", lat: 40.4233, lng: -3.7121, cat: "Tecnología", img: "💻" },
            { id: 3, nombre: "Librería Ateneo", lat: 40.4150, lng: -3.6960, cat: "Cultura", img: "📚" },
            { id: 4, nombre: "Farmacia 24h", lat: 40.4180, lng: -3.7010, cat: "Salud", img: "💊" },
            { id: 5, nombre: "Gimnasio Fit", lat: 40.4210, lng: -3.7080, cat: "Deporte", img: "💪" }
        ];

        let map, userMarker;

        // --- LÓGICA DE INICIO ---
        window.onload = () => {
            initMap();
            iniciarGeolocalizacion();
        };

        function initMap() {
            map = L.map('leaflet-map').setView([40.4167, -3.7037], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            tiendasDB.forEach(t => {
                L.marker([t.lat, t.lng]).addTo(map).bindPopup(`<b>${t.nombre}</b><br>${t.cat}`);
            });
        }

        function toggleMapa() {
            const el = document.getElementById('leaflet-map');
            el.classList.toggle('show');
            if(map) setTimeout(() => map.invalidateSize(), 200);
        }

        // --- LOGÍSTICA GPS (HAVERSINE) ---
        function calcularKM(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function iniciarGeolocalizacion() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition(pos => {
                const { latitude: uLat, longitude: uLon } = pos.coords;

                // Actualizar marcador usuario
                if(userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([uLat, uLon], { radius: 10, color: '#1a73e8', fillOpacity: 0.8 }).addTo(map);

                // Recalcular logística de distancias
                const tiendasProcesadas = tiendasDB.map(t => ({
                    ...t,
                    distancia: calcularKM(uLat, uLon, t.lat, t.lng)
                })).sort((a, b) => a.distancia - b.distancia);

                renderizarUI(tiendasProcesadas);
            }, err => console.warn("GPS no disponible"), { enableHighAccuracy: true });
        }

        // --- RENDERIZADO DE INTERFAZ ---
        function renderizarUI(lista) {
            const container = document.getElementById('gps-container');
            const grid = document.getElementById('grid-principal');
            container.innerHTML = "";
            grid.innerHTML = "";

            lista.forEach((t, i) => {
                const html = `
                    <div class="near-card ${i === 0 ? 'highlighted' : ''}">
                        <div style="font-size: 24px; margin-bottom: 8px;">${t.img}</div>
                        <div class="near-card-name">${t.nombre}</div>
                        <div class="near-card-dist">📍 a ${t.distancia.toFixed(2)} km</div>
                        <button class="btn-ruta" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${t.lat},${t.lng}')">
                            Cómo llegar
                        </button>
                    </div>
                `;
                
                // Si es de las 3 más cercanas, va al carrusel GPS
                if(i < 3) container.innerHTML += html;
                
                // Todas van al grid inferior
                grid.innerHTML += `
                    <div class="store-card">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <div style="font-size:30px">${t.img}</div>
                            <div>
                                <h3 style="font-size:16px">${t.nombre}</h3>
                                <p style="font-size:12px; color:var(--muted)">${t.cat} • ${t.distancia.toFixed(1)} km</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarTiendas() {
            const query = document.getElementById('inputBusqueda').value.toLowerCase();
            const filtradas = tiendasDB.filter(t => 
                t.nombre.toLowerCase().includes(query) || t.cat.toLowerCase().includes(query)
            );
            // Re-renderiza basándose en la búsqueda
            // (Nota: En un caso real, aquí mantendrías la distancia calculada)
        }
    </script>
</body>
</html/>
