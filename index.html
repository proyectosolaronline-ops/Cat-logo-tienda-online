
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio — LandingKit v3.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root{--primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;--bg:#f5f6f7;--surface:#fff;--border:#dde1e7;--text:#1a1a2e;--muted:#717185;--font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;--r-lg:14px;--shadow:0 4px 16px rgba(0,0,0,.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
        .header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:40px 20px;text-align:center;position:relative}
        .header-badge{display:inline-flex;background:rgba(255,255,255,.15);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:10px}
        
        .search-wrap{max-width:600px;margin:-25px auto 20px;padding:0 16px;position:relative;z-index:2}
        .search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;overflow:hidden;border:1.5px solid var(--border)}
        .search-box input{flex:1;padding:15px;border:none;outline:none;font-size:14px}

        .mapa-section{max-width:960px;margin:0 auto;padding:10px 16px}
        #leaflet-map{height:250px;border-radius:var(--r-lg);border:1.5px solid var(--border);margin-bottom:15px;display:none}
        #leaflet-map.show{display:block}

        .near-cards-wrap{overflow-x:auto;padding-bottom:15px;scrollbar-width:none}
        .near-cards-track{display:flex;gap:12px;width:max-content}
        
        .near-card{width:210px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;flex-shrink:0;transition:0.2s;cursor:pointer}
        .near-card.highlighted{border-color:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,0.2)}
        .near-card-banner{height:80px;background-size:cover;background-position:center;position:relative;background-color:var(--primary-light)}
        .near-card-logo{width:38px;height:38px;border-radius:8px;border:2px solid #fff;background:#fff;position:absolute;bottom:-15px;left:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
        .near-card-logo img{width:100%;height:100%;object-fit:cover}
        .near-card-body{padding:20px 12px 12px}
        .near-card-name{font-family:var(--font-d);font-size:14px;font-weight:700;margin-bottom:4px}
        .near-card-dist{font-size:11px;color:var(--muted);margin-bottom:8px}
        .near-card-kw{font-size:10px;color:var(--primary);background:var(--primary-light);padding:3px 8px;border-radius:99px;display:inline-block}
        
        .dir-grid{max-width:960px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
        .store-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:15px}
    </style>
</head>
<body>

<header class="header">
    <div class="header-badge" id="gps-status">Detectando cercanía...</div>
    <h1 style="font-family:var(--font-d); font-size:22px">Directorio LandingKit</h1>
</header>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="busqueda" placeholder="¿Qué estás buscando hoy?" oninput="filtrar()">
    </div>
</div>

<section class="mapa-section">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px">
        <span style="font-size:12px; font-weight:700; color:var(--muted)">TIENDAS RADAR</span>
        <button onclick="toggleMapa()" style="border:none; background:none; color:var(--primary); font-weight:700; cursor:pointer">VER MAPA</button>
    </div>
    <div id="leaflet-map"></div>
    <div class="near-cards-wrap">
        <div class="near-cards-track" id="near-track"></div>
    </div>
</section>

<div class="dir-grid" id="global-grid"></div>

<script>
    let map, userLoc = null, allStores = [];

    // 1. DEBUT: LLAMADA AL BACKEND MAESTRO.gs
    window.onload = () => {
        google.script.run
            .withSuccessHandler(data => {
                if(data.ok) {
                    allStores = data.data; // Result del router
                    solicitarGPS();
                }
            })
            .handleRequest({ action: 'stores.directory' }, 'GET');
    };

    function solicitarGPS() {
        navigator.geolocation.getCurrentPosition(pos => {
            userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('gps-status').innerText = "📍 Radar Activo";
            renderizar();
        }, () => renderizar());
    }

    // 2. LÓGICA ANALÍTICA DE DEBUT
    function renderizar() {
        const track = document.getElementById('near-track');
        const grid = document.getElementById('global-grid');
        track.innerHTML = ""; grid.innerHTML = "";

        // Procesar distancias basadas en s.config (v3.3)
        const procesadas = allStores.map(s => {
            let dist = 9999;
            if(userLoc && s.config.locationLat) {
                dist = calcularHaversine(userLoc.lat, userLoc.lng, parseFloat(s.config.locationLat), parseFloat(s.config.locationLng));
            }
            return { ...s, dist };
        }).sort((a,b) => a.dist - b.dist);

        procesadas.forEach((s, i) => {
            const isNear = s.dist < 50; // Umbral de cercanía 50km
            const cardHTML = `
                <div class="near-card ${i===0 && isNear ? 'highlighted' : ''}" onclick="window.open('https://wa.me/${s.config.whatsapp}')">
                    <div class="near-card-banner" style="background-image:url('${s.config.bannerUrl || ''}')">
                        <div class="near-card-logo"><img src="${s.config.logoUrl || s.config.logo}"></div>
                    </div>
                    <div class="near-card-body">
                        <div class="near-card-name">${s.name}</div>
                        <div class="near-card-dist">${s.dist < 9999 ? '📍 a ' + s.dist.toFixed(1) + ' km' : s.config.storeLocation}</div>
                        <div class="near-card-kw">${s.config.description?.substring(0,20) || 'Tienda Oficial'}...</div>
                    </div>
                </div>`;
            
            if(isNear) track.innerHTML += cardHTML;
            grid.innerHTML += `<div class="store-card"><strong>${s.name}</strong><br><small>${s.config.storeLocation || ''}</small></div>`;
        });

        if(userLoc) initMapa(procesadas);
    }

    function initMapa(tiendas) {
        map = L.map('leaflet-map').setView([userLoc.lat, userLoc.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.circleMarker([userLoc.lat, userLoc.lng], {radius:7, color:'#1a73e8', fillOpacity:1}).addTo(map).bindPopup("Tú");
        tiendas.forEach(s => {
            if(s.config.locationLat) L.marker([s.config.locationLat, s.config.locationLng]).addTo(map).bindPopup(s.name);
        });
    }

    function toggleMapa() {
        const el = document.getElementById('leaflet-map');
        el.classList.toggle('show');
        if(map) setTimeout(() => map.invalidateSize(), 200);
    }

    function calcularHaversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
</script>
</body>
</html>
