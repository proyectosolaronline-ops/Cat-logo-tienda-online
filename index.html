<script>
// LÓGICA DE GEOLOCALIZACIÓN QUE TE PERDÍ Y AQUÍ RECUPERO
let userCoords = null;

function getDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
    const R = 6371; // Radio de la Tierra en km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

// ESTO ES LO QUE BUSCA GOOGLE Y TU CATÁLOGO PROCESA
function filterDir() {
    const query = document.getElementById('search-input').value.toLowerCase();
    
    const results = ALL_STORES.map(s => {
        const cfg = s.config || {};
        // Buscamos en TODO: nombre, descripción y etiquetas
        const searchText = `${s.name} ${cfg.description} ${cfg.tags || ''}`.toLowerCase();
        const matches = searchText.includes(query);
        
        // Calculamos distancia si tenemos la posición del usuario
        let distance = Infinity;
        if (userCoords && cfg.lat && cfg.lng) {
            distance = getDistance(userCoords.lat, userCoords.lng, cfg.lat, cfg.lng);
        }
        
        return { ...s, matches, distance };
    })
    .filter(s => s.matches)
    .sort((a, b) => a.distance - b.distance); // PRIORIDAD: LO MÁS CERCANO PRIMERO

    renderDir(results);
}

// Pedir permiso de ubicación al cargar
navigator.geolocation.getCurrentPosition(pos => {
    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    filterDir(); // Re-filtrar para ordenar por cercanía
}, err => console.warn("GPS desactivado"));
</script>
