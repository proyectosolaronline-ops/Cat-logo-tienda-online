<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Productos, Servicios y Ubicaciones</title>
<meta name="description" id="meta-desc" content="Directorio de tiendas locales.">
<meta name="keywords" id="meta-keywords" content="tiendas, productos, servicios, directorio">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;--cta:#ff6900;--cta-dark:#e55c00;--bg:#f5f6f7;--surface:#fff;--border:#dde1e7;--text:#1a1a2e;--muted:#717185;--font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;--r:10px;--r-lg:14px;--r-xl:18px;--shadow:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:36px 20px 48px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")}
.header-logo{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);font-size:24px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(6px)}
.header-locs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;position:relative;z-index:1}
.loc-txt{font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .15s}
.loc-txt.active{color:#fff;font-weight:700;text-decoration:underline;text-underline-offset:3px}
.search-wrap{max-width:600px;margin:-25px auto 0;padding:0 16px;position:relative;z-index:1000}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border)}
.search-box input{flex:1;padding:13px 16px;border:none;outline:none;font-size:14px;font-family:var(--font-b)}
.mapa-section{max-width:960px;margin:0 auto;padding:24px 16px 0}
.mapa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mapa-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:6px}
.mapa-toggle{font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-light);border:none;border-radius:99px;padding:5px 14px;cursor:pointer}
#leaflet-map{height:280px;border-radius:var(--r-lg);border:1.5px solid var(--border);margin-bottom:12px;display:none}
#leaflet-map.show{display:block}
.near-cards-wrap{overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.near-cards-track{display:flex;gap:10px;width:max-content}
.near-card{width:200px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all .2s;flex-shrink:0}
.near-card.highlighted{border-color:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,.25)}
.near-card-banner{height:70px;background:var(--primary);position:relative}
.near-card-body{padding:18px 10px 12px}
.near-card-name{font-family:var(--font-d);font-size:13px;font-weight:700;margin-bottom:2px}
.near-card-dist{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:3px}
.near-card-btn{margin-top:8px;width:100%;padding:7px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
.dir-wrap{max-width:960px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:16px}
.store-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-xl);padding:15px}
</style>
</head>
<body>

<header class="header">
    <div class="header-logo">🏬</div>
    <div class="header-badge">Directorio Local</div>
    <div class="header-locs">
        <span class="loc-txt active">Cerca de mí</span>
        <span class="loc-txt">Sucursales</span>
    </div>
</header>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar productos o servicios...">
    </div>
</div>

<section class="mapa-section">
    <div class="mapa-header">
        <div class="mapa-title"><span>📍</span> Tiendas Cercanas</div>
        <button class="mapa-toggle" onclick="toggleMapa()">Ver Mapa</button>
    </div>
    <div id="leaflet-map"></div>
    <div class="near-cards-wrap">
        <div class="near-cards-track" id="track-gps">
            </div>
    </div>
</section>

<div class="dir-wrap" id="grid-global">
    </div>

<script>
// TUS DATOS (Logística del Backend)
const tiendas = [
    { id: 1, nombre: "Cafetería Central", lat: 40.4167, lng: -3.7037, cat: "Alimentos" },
    { id: 2, nombre: "Tech Store", lat: 40.4233, lng: -3.7121, cat: "Tecnología" },
    { id: 3, nombre: "Librería Ateneo", lat: 40.4150, lng: -3.6960, cat: "Cultura" }
];

let map;

function init() {
    map = L.map('leaflet-map').setView([40.4167, -3.7037], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    tiendas.forEach(t => L.marker([t.lat, t.lng]).addTo(map).bindPopup(t.nombre));
    localizar();
}

function toggleMapa() {
    const m = document.getElementById('leaflet-map');
    m.classList.toggle('show');
    if(map) setTimeout(() => map.invalidateSize(), 200);
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function localizar() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;
        
        const lista = tiendas.map(t => ({
            ...t,
            dist: calcularDistancia(uLat, uLon, t.lat, t.lng)
        })).sort((a,b) => a.dist - b.dist);

        const track = document.getElementById('track-gps');
        const grid = document.getElementById('grid-global');
        track.innerHTML = ""; grid.innerHTML = "";

        lista.forEach((t, i) => {
            // USANDO TUS CLASES EXACTAS: .near-card, .near-card-banner, etc.
            track.innerHTML += `
                <div class="near-card ${i===0?'highlighted':''}">
                    <div class="near-card-banner"></div>
                    <div class="near-card-body">
                        <div class="near-card-name">${t.nombre}</div>
                        <div class="near-card-dist">📍 a ${t.dist.toFixed(2)} km</div>
                        <button class="near-card-btn" onclick="window.open('https://www.google.com/maps?q=${t.lat},${t.lng}')">Ir ahora</button>
                    </div>
                </div>`;
            
            grid.innerHTML += `
                <div class="store-card">
                    <h3 class="near-card-name">${t.nombre}</h3>
                    <p style="font-size:12px; color:var(--muted)">${t.cat}</p>
                </div>`;
        });
    });
}

window.onload = init;
</script>
</body>
</html>
