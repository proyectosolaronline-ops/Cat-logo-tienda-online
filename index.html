<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:48px 20px 56px;text-align:center;position:relative;overflow:hidden}
.header-logo{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.header h1{font-family:var(--font-d);font-size:clamp(24px,5vw,42px);font-weight:800;line-height:1.1;margin-bottom:12px;letter-spacing:-.02em}
.header h1 span{color:#ffd54f}
.header p{font-size:15px;color:rgba(255,255,255,.8);max-width:500px;margin:0 auto}

/* SEARCH */
.search-wrap{max-width:520px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:2}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border)}
.search-box input{flex:1;padding:14px 16px;border:none;outline:none;font-size:14px;color:var(--text)}
.search-btn{padding:12px 16px;background:none;border:none;cursor:pointer;color:var(--muted)}

/* FILTERS & GRID */
.filters-wrap{padding:24px 16px 8px;max-width:960px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.dir-wrap{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.store-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column}
.store-banner{height:90px;background:var(--primary);background-size:cover;background-position:center;position:relative}
.store-logo{width:52px;height:52px;border-radius:12px;border:3px solid #fff;background:#fff;position:absolute;bottom:-22px;left:16px;display:flex;align-items:center;justify-content:center}
.store-body{padding:30px 16px 16px;flex:1}
.store-name{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:4px}
.store-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.store-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.btn-visit{flex:1;padding:10px;background:var(--primary);color:#fff;border-radius:var(--r);text-decoration:none;text-align:center;font-size:13px;font-weight:600}

/* POPUP & MODALES */
.popup-bg, .qr-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.popup-bg.on, .qr-modal-bg.on{display:flex}
.popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:420px;position:relative}
.popup-body{padding:40px 20px 24px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
  <div class="header-badge">🌐 Directorio de tiendas</div>
  <h1>Todo en un solo lugar —<br><span>productos y servicios</span></h1>
  <p>disponibles a tu necesidad</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar tienda o servicio..." oninput="filterDir()">
    <button class="search-btn" onclick="searchInGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</div>

<div class="filters-wrap">
  <div class="chip on" id="chip-all" onclick="setFilter('',this)">Todas</div>
  <div class="chip" onclick="getGeoLocation(this)">📍 Cerca de mí</div>
  <div class="chip" onclick="setFilter('mayorista',this)">★ Mayoristas</div>
</div>

<div class="dir-wrap">
  <div class="count-badge" id="count-badge"></div>
  <div id="geo-status" style="font-size:11px; color:var(--primary); margin-bottom:10px; display:none"></div>
  <div class="dir-grid" id="dir-grid">
    <div class="spinner"></div>
  </div>
</div>

<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-body" id="popup-content">
      <h2 id="popup-name"></h2>
      <p id="popup-desc"></p>
      <div id="popup-qr-code" style="margin:20px 0; text-align:center"></div>
      <a class="btn-visit" id="popup-visit-btn" href="#" target="_blank" style="display:block">Visitar tienda</a>
    </div>
  </div>
</div>

<script>
var params     = new URLSearchParams(location.search);
var BACKEND    = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
var ALL_STORES = [];
var USER_POS   = null;

// LOGISTICA: BUSCADOR GOOGLE
function searchInGoogle() {
    const query = document.getElementById('search-input').value;
    if(query) window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
}

// LOGISTICA: GEOLOCALIZACIÓN
function getGeoLocation(el) {
    const status = document.getElementById('geo-status');
    status.style.display = 'block';
    status.textContent = "Obteniendo ubicación...";
    
    if (!navigator.geolocation) {
        status.textContent = "Geolocalización no soportada";
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        USER_POS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        status.textContent = "📍 Ubicación obtenida. Ordenando por cercanía...";
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
        el.classList.add('on');
        sortAndRender();
    }, () => {
        status.textContent = "Error al obtener ubicación";
    });
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// CARGA DE DATOS
window.addEventListener('load', async function() {
    try {
        var r = await fetch(BACKEND + '?action=stores.directory');
        var d = await r.json();
        ALL_STORES = d.stores.map(s => {
            s.config = (typeof s.config === 'string') ? JSON.parse(s.config) : (s.config || {});
            return s;
        });
        renderDir(ALL_STORES);
    } catch(e) {
        document.getElementById('dir-grid').innerHTML = '<p>Error al conectar</p>';
    }
});

function sortAndRender() {
    let list = [...ALL_STORES];
    if (USER_POS) {
        list.forEach(s => {
            // Asumimos que en tu config tienes 'lat' y 'lng'
            if(s.config.lat && s.config.lng) {
                s.dist = calculateDistance(USER_POS.lat, USER_POS.lng, s.config.lat, s.config.lng);
            } else { s.dist = 999999; }
        });
        list.sort((a, b) => a.dist - b.dist);
    }
    renderDir(list);
}

function renderDir(stores) {
    var g = document.getElementById('dir-grid');
    g.innerHTML = stores.map(s => {
        const cfg = s.config;
        const banner = cfg.bannerUrl || '';
        const logo = cfg.logo || cfg.pcard-logo || '';
        return `
            <div class="store-card" onclick="openPopup('${s.storeId}')">
                <div class="store-banner" style="background-image:url(${banner})">
                    <div class="store-logo"><img src="${logo}" onerror="this.style.display='none'"></div>
                </div>
                <div class="store-body">
                    <div class="store-name">${s.name}</div>
                    <div class="store-desc">${(cfg.description || '').slice(0,60)}...</div>
                    <div class="store-foot" style="margin-top:10px">
                        <span class="store-tag">${cfg.storeLocation || 'Local'}</span>
                        ${s.dist ? `<span class="store-tag" style="background:#fff7ed;color:#ea580c">${s.dist.toFixed(1)} km</span>` : ''}
                    </div>
                </div>
            </div>`;
    }).join('');
}

function filterDir() {
    var q = document.getElementById('search-input').value.toLowerCase();
    var list = ALL_STORES.filter(s => s.name.toLowerCase().includes(q) || (s.config.description || '').toLowerCase().includes(q));
    renderDir(list);
}

function openPopup(id) {
    const s = ALL_STORES.find(x => x.storeId === id);
    document.getElementById('popup-name').textContent = s.name;
    document.getElementById('popup-desc').textContent = s.config.description;
    const url = `${STORE_BASE}?backend=${encodeURIComponent(BACKEND)}&store=${id}`;
    document.getElementById('popup-visit-btn').href = url;
    
    document.getElementById('popup-qr-code').innerHTML = '';
    new QRCode(document.getElementById('popup-qr-code'), { text: url, width: 120, height: 120 });
    document.getElementById('popup-bg').classList.add('on');
}

function closePopup() { document.getElementById('popup-bg').classList.remove('on'); }
</script>
</body>
</html>
