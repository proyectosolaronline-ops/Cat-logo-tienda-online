
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Oficial — LandingKit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --border: #dadce0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #3c4043; }
        .header { background: #fff; border-bottom: 1px solid var(--border); padding: 20px; text-align: center; }
        .status-indicator { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .main { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Mapa */
        #map { height: 350px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; z-index: 1; }
        
        /* Carrusel de Tiendas (Radar) */
        .radar-track { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .radar-track::-webkit-scrollbar { display: none; }
        
        .store-card { width: 240px; background: #fff; border: 1px solid var(--border); border-radius: 12px; flex-shrink: 0; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; }
        .store-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-banner { height: 100px; background: #e8f0fe; background-size: cover; background-position: center; position: relative; }
        .card-logo { width: 44px; height: 44px; background: #fff; border-radius: 8px; position: absolute; bottom: -12px; left: 16px; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card-content { padding: 25px 16px 16px; }
        .card-name { font-family: 'Outfit'; font-weight: 800; font-size: 16px; margin: 0 0 4px; }
        .card-meta { font-size: 12px; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        
        /* Grid General */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 30px; }
        .grid-item { background: #fff; padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="header">
    <div class="status-indicator" id="status">Sincronizando con MAESTRO.gs...</div>
    <h1 style="font-family: 'Outfit'; margin: 8px 0 0; font-size: 22px;">Directorio Solar v3.3</h1>
</div>

<div class="main">
    <div id="map"></div>
    <h2 style="font-family: 'Outfit'; font-size: 18px; margin-bottom: 16px;">📍 Tiendas en tu radar</h2>
    <div class="radar-track" id="radar-track"></div>
    
    <h2 style="font-family: 'Outfit'; font-size: 18px; margin: 40px 0 16px;">Todos los puntos</h2>
    <div class="grid" id="global-grid"></div>
</div>

<script>
    let storesRaw = [];
    let map, userLoc = null;

    // 1. INVOCACIÓN AL BACKEND (MAESTRO.gs)
    window.onload = function() {
        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(res => {
                    if (res.ok) {
                        storesRaw = res.data; // El array 'result' de tu backend
                        document.getElementById('status').innerText = "📍 Conexión Exitosa";
                        solicitarUbicacion();
                    }
                })
                .handleRequest({ action: 'stores.directory' }, 'GET');
        }
    };

    function solicitarUbicacion() {
        navigator.geolocation.getCurrentPosition(p => {
            userLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
            render();
        }, () => render());
    }

    function render() {
        const track = document.getElementById('radar-track');
        const grid = document.getElementById('global-grid');
        track.innerHTML = ""; grid.innerHTML = "";

        // Procesar datos analíticos (Distancia)
        const tiendas = storesRaw.map(s => {
            const cfg = s.config || {};
            let km = 9999;
            if (userLoc && cfg.locationLat) {
                km = haversine(userLoc.lat, userLoc.lng, parseFloat(cfg.locationLat), parseFloat(cfg.locationLng));
            }
            return { ...s, km };
        }).sort((a, b) => a.km - b.km);

        tiendas.forEach(s => {
            const cfg = s.config || {};
            const distLabel = s.km < 999 ? `A ${s.km.toFixed(1)} km` : (cfg.storeLocation || 'Ubicación remota');

            // Carrusel (Radar)
            if (s.km < 100 || tiendas.indexOf(s) < 5) {
                track.innerHTML += `
                <div class="store-card" onclick="window.open('https://wa.me/${cfg.whatsapp}')">
                    <div class="card-banner" style="background-image:url('${cfg.bannerUrl || ''}')">
                        <img class="card-logo" src="${cfg.logoUrl || cfg.logo || ''}" onerror="this.style.display='none'">
                    </div>
                    <div class="card-content">
                        <div class="card-name">${s.name}</div>
                        <div class="card-meta">📍 ${distLabel}</div>
                    </div>
                </div>`;
            }

            // Grid General
            grid.innerHTML += `
            <div class="grid-item">
                <div class="card-name">${s.name}</div>
                <div style="font-size:12px; color:#5f6368; margin-top:4px;">${cfg.description || ''}</div>
                <button onclick="window.open('https://wa.me/${cfg.whatsapp}')" style="margin-top:12px; width:100%; padding:8px; border-radius:6px; border:1px solid var(--primary); background:#fff; color:var(--primary); font-weight:600; cursor:pointer;">WhatsApp</button>
            </div>`;
        });

        initMapa(tiendas);
    }

    function initMapa(data) {
        if (map) return;
        const center = userLoc ? [userLoc.lat, userLoc.lng] : [23.6, -102.5];
        map = L.map('map').setView(center, userLoc ? 12 : 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        if (userLoc) L.circleMarker(center, {radius:6, color:'#1a73e8'}).addTo(map).bindPopup("Estás aquí");

        data.forEach(s => {
            if (s.config && s.config.locationLat) {
                L.marker([s.config.locationLat, s.config.locationLng]).addTo(map).bindPopup(`<b>${s.name}</b>`);
            }
        });
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
</script>
</body>
</html>
