<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapa Tiendas Externas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:sans-serif;background:#0a0a12;}

#map{position:fixed;top:54px;left:0;right:0;bottom:0;z-index:1;}

.topbar{
  position:fixed;top:0;left:0;right:0;height:54px;
  background:rgba(10,10,18,0.97);border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;gap:8px;padding:0 12px;z-index:1000;
}
.topbar-title{font-weight:800;font-size:15px;color:#fff;flex:1;}
.topbar-title span{color:#6ee7b7;}
.badge{background:#6ee7b7;color:#0a0a12;font-size:11px;font-weight:800;padding:2px 9px;border-radius:99px;}
.btn-top{height:32px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;}
.btn-top:hover{border-color:#6ee7b7;color:#6ee7b7;}

/* POPUP */
.leaflet-popup-content-wrapper{background:#12121e!important;border:1px solid rgba(255,255,255,0.12)!important;border-radius:14px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;padding:0!important;overflow:hidden;}
.leaflet-popup-tip{background:#12121e!important;}
.leaflet-popup-content{margin:0!important;width:240px!important;}
.popup-img{width:100%;height:120px;object-fit:cover;display:block;}
.popup-img-ph{width:100%;height:70px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:36px;}
.popup-body{padding:11px 13px 14px;}
.popup-nombre{font-weight:800;font-size:14px;color:#f0f0f8;margin-bottom:6px;}
.popup-row{font-size:12px;color:#8b8ba8;margin-bottom:4px;}
.popup-desc{font-size:11px;color:#8b8ba8;margin-top:4px;line-height:1.4;}

/* FABS */
.fabs{position:fixed;bottom:20px;right:14px;z-index:900;display:flex;flex-direction:column;gap:10px;}
.fab{width:46px;height:46px;border-radius:13px;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.5);transition:transform .15s;}
.fab:hover{transform:scale(1.08);}
.fab.sat{background:rgba(15,15,25,0.97);border:1px solid rgba(255,255,255,0.15);}
.fab.gps{background:#3b82f6;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}
#toast.success{background:#34d399;color:#0a1a12;}
#toast.error{background:#f87171;color:#fff;}
#toast.warn{background:#fbbf24;color:#0a0a00;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🗺️ Tiendas <span>Easylink</span></div>
  <span class="badge" id="badge-total">—</span>
  <button class="btn-top" onclick="loadTiendas()">↺ Recargar</button>
  <button class="btn-top" id="btn-full" onclick="toggleFullscreen()">⛶ Full</button>
</div>

<div id="map"></div>

<div class="fabs">
  <button class="fab sat" id="fab-sat" onclick="toggleTile()">🛰️</button>
  <button class="fab gps" onclick="irGPS()">📍</button>
</div>

<div id="toast"></div>

<script>
/* ── mismo BACKEND del directorio ── */
const BACKEND    = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';
const STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';

let ALL_STORES = [];
let MAP, tileCalles, tileSat, modoSat = true;
let markers = [];

/* ── igual que el directorio original ── */
function fixImgUrl(u) {
  if (!u) return '';
  var m  = u.match(/[?&]id=([\w-]+)/); if (m)  return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2 = u.match(/\/d\/([\w-]+)/);   if (m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}
function buildStoreUrl(id) {
  return STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(id);
}

/* ── MAPA ── */
function initMap() {
  MAP = L.map('map', { zoomControl: false }).setView([20.5888, -100.3899], 12);
  tileCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21 });
  tileSat    = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 });
  tileSat.addTo(MAP);
  L.control.zoom({ position: 'topleft' }).addTo(MAP);
}

function toggleTile() {
  modoSat = !modoSat;
  var btn = document.getElementById('fab-sat');
  if (modoSat) { MAP.removeLayer(tileCalles); tileSat.addTo(MAP); btn.textContent = '🛰️'; }
  else          { MAP.removeLayer(tileSat); tileCalles.addTo(MAP); btn.textContent = '🗺️'; }
}

/* ── FULLSCREEN ── */
var isFs = false;
function toggleFullscreen() {
  isFs = !isFs;
  var btn = document.getElementById('btn-full');
  document.getElementById('map').style.top = isFs ? '0' : '54px';
  document.querySelector('.topbar').style.display = isFs ? 'none' : '';
  btn.textContent = isFs ? '✕ Salir' : '⛶ Full';
  setTimeout(function(){ MAP.invalidateSize(); }, 200);
}
document.addEventListener('keydown', function(e){ if (e.key==='Escape' && isFs) toggleFullscreen(); });

/* ── CARGAR TIENDAS — GET igual que el directorio ── */
async function loadTiendas() {
  toast('Cargando tiendas...', 'warn');
  try {
    var r    = await fetch(BACKEND + '?action=stores.directory');
    var data = await r.json();
    ALL_STORES = (data.stores || []).map(function(s) {
      s.config = typeof s.config === 'string' ? JSON.parse(s.config) : (s.config || {});
      return s;
    });
  } catch(e) {
    toast('Error cargando tiendas', 'error');
    return;
  }

  var conUbicacion = ALL_STORES.filter(function(s) {
    var c = s.config || {};
    return !isNaN(parseFloat(c.locationLat)) && !isNaN(parseFloat(c.locationLng));
  });

  document.getElementById('badge-total').textContent = conUbicacion.length;
  ponerMarkers(conUbicacion);
  ajustarVista(conUbicacion);
  toast(conUbicacion.length + ' tiendas cargadas ✅', 'success');
}

/* ── MARCADORES ── */
function ponerMarkers(stores) {
  markers.forEach(function(m){ MAP.removeLayer(m); });
  markers = [];

  stores.forEach(function(s) {
    var cfg = s.config || {};
    var lat = parseFloat(cfg.locationLat);
    var lng = parseFloat(cfg.locationLng);
    if (isNaN(lat) || isNaN(lng)) return;

    var logoUrl = fixImgUrl(cfg.logo || cfg.logoUrl || '');

    /* Pin: logo circular si hay foto, emoji si no */
    var pinHTML = logoUrl
      ? '<img src="'+logoUrl+'" style="width:52px;height:52px;border-radius:50%;border:4px solid #fff;object-fit:cover;box-shadow:0 3px 10px rgba(0,0,0,.4);" onerror="this.outerHTML=\'<div style=width:52px;height:52px;background:#6ee7b7;color:#0a1a12;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.4);>🏪</div>\'">'
      : '<div style="width:52px;height:52px;background:#6ee7b7;color:#0a1a12;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.4);">🏪</div>';

    var icon = L.divIcon({ html: pinHTML, className: '', iconSize: [56,56], iconAnchor: [28,28], popupAnchor: [0,-30] });

    /* Popup con foto, nombre, tipo, teléfono */
    var foto = fixImgUrl(cfg.bannerUrl || cfg.logo || cfg.logoUrl || '');
    var fotoHtml = foto
      ? '<img class="popup-img" src="'+foto+'" onerror="this.style.display=\'none\'">'
      : '<div class="popup-img-ph">🏪</div>';

    var popup =
      '<div>' + fotoHtml +
      '<div class="popup-body">' +
        '<div class="popup-nombre">'+esc(s.name || '—')+'</div>' +
        (cfg.phone || cfg.telefono ? '<div class="popup-row">📞 <a href="tel:'+esc(cfg.phone||cfg.telefono)+'" style="color:#60a5fa;font-weight:600;text-decoration:none;">'+esc(cfg.phone||cfg.telefono)+'</a></div>' : '') +
        (cfg.category || cfg.tipo ? '<div class="popup-row">🏷️ '+esc(cfg.category||cfg.tipo)+'</div>' : '') +
        (cfg.directoryCity || cfg.city ? '<div class="popup-row">📍 '+esc(cfg.directoryCity||cfg.city)+'</div>' : '') +
        (cfg.description ? '<div class="popup-desc">'+esc(cfg.description.substring(0,80))+'...</div>' : '') +
        '<div style="margin-top:10px;"><a href="'+buildStoreUrl(s.storeId)+'" target="_blank" style="display:block;padding:8px;background:#6ee7b7;color:#0a1a12;text-align:center;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;">Ver tienda →</a></div>' +
      '</div></div>';

    var marker = L.marker([lat, lng], { icon: icon }).addTo(MAP);
    marker.bindPopup(popup, { maxWidth: 260, minWidth: 240 });
    markers.push(marker);
  });
}

function ajustarVista(stores) {
  var coords = stores
    .filter(function(s){ var c=s.config||{}; return c.locationLat && c.locationLng; })
    .map(function(s){ var c=s.config||{}; return [parseFloat(c.locationLat), parseFloat(c.locationLng)]; });
  if (coords.length > 1) MAP.fitBounds(coords, { padding: [60,60] });
  else if (coords.length === 1) MAP.setView(coords[0], 15);
}

/* ── GPS ── */
function irGPS() {
  if (!navigator.geolocation) { toast('GPS no disponible', 'warn'); return; }
  toast('Obteniendo ubicación...', 'warn');
  navigator.geolocation.getCurrentPosition(function(pos) {
    MAP.setView([pos.coords.latitude, pos.coords.longitude], 15, { animate: true });
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
      radius: 9, color: '#3b82f6', fillColor: '#fff', weight: 3, fillOpacity: 1
    }).addTo(MAP).bindPopup('<b style="color:#12121e">📍 Tu ubicación</b>').openPopup();
    toast('Ubicación obtenida ✅', 'success');
  }, function(){ toast('No se pudo obtener ubicación', 'error'); }, { enableHighAccuracy:true, timeout:10000 });
}

/* ── UTILS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = type||'success'; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(function(){ el.style.display='none'; }, 3000);
}

/* ── INIT ── */
window.addEventListener('load', function() {
  initMap();
  loadTiendas();
});
</script>
</body>
</html>
