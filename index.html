<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Verificado</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --primary:#1a73e8; --primary-dark:#1557b0; --primary-light:#e8f0fe;
  --bg:#f5f6f7; --surface:#fff; --border:#dde1e7;
  --text:#1a1a2e; --muted:#717185;
  --font-d:'Outfit',sans-serif; --font-b:'Inter',sans-serif;
  --r-lg:14px; --shadow:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box; margin:0; padding:0}
body{font-family:var(--font-b); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased}

/* HEADER AZUL FIEL A TU CAPTURA */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%); color:#fff; padding:40px 20px 60px; text-align:center; position:relative}
.header-badge{display:inline-flex; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); border-radius:99px; padding:5px 14px; font-size:11px; font-weight:600; text-transform:uppercase; margin-bottom:12px}

/* BUSCADOR ARRIBA (CAPTURA 2 Y 4) */
.search-wrap{max-width:600px; margin:-30px auto 0; padding:0 16px; position:relative; z-index:100}
.search-box{background:#fff; border-radius:var(--r-lg); box-shadow:var(--shadow); display:flex; align-items:center; border:1.5px solid var(--border); overflow:hidden}
.search-box input{flex:1; padding:15px; border:none; outline:none; font-size:14px; font-family:var(--font-b)}

/* FILTROS DEBAJO DEL BUSCADOR */
.filters-area{max-width:960px; margin:20px auto 0; padding:0 16px}
.chips-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none}
.ftxt{font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; padding:8px 16px; border-radius:10px; background:#fff; border:1.5px solid var(--border); white-space:nowrap; transition:0.2s}
.active-ftxt{background:var(--primary); color:#fff; border-color:var(--primary)}

/* SECCIÓN DE MAPA Y CARRUSEL */
.main-content{max-width:960px; margin:0 auto; padding:16px}
.section-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
#leaflet-map{height:0; transition:all 0.3s ease; border-radius:var(--r-lg); margin-bottom:15px; overflow:hidden}
#leaflet-map.show{height:280px; border:1.5px solid var(--border)}

/* DISEÑO DE TUS CARDS (CAPTURA 1) */
.near-cards-track{display:flex; gap:12px; overflow-x:auto; padding-bottom:15px; scrollbar-width:none}
.near-card{width:220px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-lg); overflow:hidden; cursor:pointer; flex-shrink:0; transition:0.2s}
.near-card-banner{height:80px; background-size:cover; background-position:center; position:relative; background-color:var(--primary)}
.near-card-logo{width:40px; height:40px; border-radius:8px; border:2px solid #fff; background:#fff; position:absolute; bottom:-15px; left:15px; display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--primary); box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.near-card-logo img{width:100%; height:100%; object-fit:cover}
.near-card-body{padding:25px 15px 15px}
.near-card-name{font-size:14px; font-weight:700; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.near-card-btn{width:100%; padding:10px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer}
</style>
</head>
<body>

<div class="header">
    <div class="header-badge">🌐 DIRECTORIO LOCAL</div>
    <h2 style="font-family:var(--font-d); font-weight:800">Tiendas y Servicios</h2>
</div>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar tienda, producto o servicio..." oninput="filterDir()">
    </div>
</div>

<div class="filters-area">
    <div class="chips-row" id="chips-cat">
        <span class="ftxt active-ftxt" onclick="setCatFilter('',this)">Todos</span>
        <span class="ftxt" onclick="setCatFilter('mayorista',this)" style="color:#7c3aed">★ Mayoristas</span>
        <span class="ftxt" onclick="setCatFilter('carne',this)">Carne</span>
        <span class="ftxt" onclick="setCatFilter('pollo',this)">Pollo</span>
        <span class="ftxt" onclick="setCatFilter('res',this)">Res</span>
    </div>
</div>

<div class="main-content">
    <div class="section-header">
        <span style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase">Resultados</span>
        <button onclick="toggleMapa()" id="mapa-toggle" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer">Ver en mapa</button>
    </div>
    
    <div id="leaflet-map"></div>

    <div class="near-cards-track" id="near-cards-track">
        </div>
</div>

<script>
// --- CONFIGURACIÓN DE TU BACKEND ---
var BACKEND = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
var ALL_STORES = [], _leafletMap = null, _markers = {}, activeCat = '';

// --- LÓGICA DE IMÁGENES Y REDIRECCIÓN ---
function fixImgUrl(u) {
    if (!u) return '';
    var m = u.match(/[?&]id=([\w-]+)/); if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
    return u;
}

function buildUrl(id) { 
    return STORE_BASE + '?store=' + id + '&backend=' + encodeURIComponent(BACKEND); 
}

// --- CARGA Y RENDERIZADO ---
async function loadData() {
    try {
        const r = await fetch(BACKEND + '?action=stores.directory');
        const d = await r.json();
        ALL_STORES = d.stores.map(s => {
            s.config = (typeof s.config === 'string') ? JSON.parse(s.config) : (s.config || {});
            return s;
        });
        renderDir(ALL_STORES);
        initMap(); 
    } catch(e) { console.error("Error:", e); }
}

function renderDir(stores) {
    const track = document.getElementById('near-cards-track');
    track.innerHTML = stores.map(s => {
        const logo = fixImgUrl(s.config.logo || s.config.logoUrl);
        const banner = fixImgUrl(s.config.bannerUrl);
        return `
        <div class="near-card" onclick="window.open('${buildUrl(s.storeId)}','_blank')">
            <div class="near-card-banner" style="background-image:url(${banner})">
                <div class="near-card-logo">${logo ? `<img src="${logo}">` : s.name[0]}</div>
            </div>
            <div class="near-card-body">
                <div class="near-card-name">${s.name}</div>
                <button class="near-card-btn">Ver tienda →</button>
            </div>
        </div>`;
    }).join('');
    updateMarkers(stores);
}

// --- MAPA DINÁMICO (SOLUCIÓN AL MAPA VACÍO) ---
function initMap() {
    if (_leafletMap) return;
    _leafletMap = L.map('leaflet-map').setView([19.4326, -99.1332], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_leafletMap);
}

function updateMarkers(stores) {
    if (!_leafletMap) return;
    Object.values(_markers).forEach(m => _leafletMap.removeLayer(m));
    _markers = {};
    const bounds = [];
    stores.forEach(s => {
        const lat = parseFloat(s.config.locationLat), lng = parseFloat(s.config.locationLng);
        if (!isNaN(lat) && !isNaN(lng)) {
            const m = L.marker([lat, lng]).addTo(_leafletMap).bindPopup(s.name);
            _markers[s.storeId] = m;
            bounds.push([lat, lng]);
        }
    });
    if (bounds.length > 0) _leafletMap.fitBounds(bounds);
}

function toggleMapa() {
    const m = document.getElementById('leaflet-map');
    m.classList.toggle('show');
    if(m.classList.contains('show')) {
        setTimeout(() => { _leafletMap.invalidateSize(); }, 300); // CRITICAL: Esto repara el mapa vacío
    }
}

function filterDir() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = ALL_STORES.filter(s => {
        return s.name.toLowerCase().includes(q) && (activeCat === '' || (s.config.keywords || '').toLowerCase().includes(activeCat));
    });
    renderDir(filtered);
}

function setCatFilter(cat, el) {
    activeCat = cat.toLowerCase();
    document.querySelectorAll('.ftxt').forEach(x => x.classList.remove('active-ftxt'));
    el.classList.add('active-ftxt');
    filterDir();
}

window.onload = loadData;
</script>
</body>
</html>
