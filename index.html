<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Resultados</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:40px 20px 60px;text-align:center;position:relative}
.header-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:5px 15px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:15px}

/* SEARCH & FILTERS (ARRIBA) */
.search-wrap{max-width:600px;margin:-30px auto 0;padding:0 16px;position:relative;z-index:10}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;align-items:center;border:1.5px solid var(--border);overflow:hidden}
.search-box input{flex:1;padding:15px;border:none;outline:none;font-size:15px;font-family:var(--font-b)}

.filters-area{max-width:960px;margin:20px auto 0;padding:0 16px}
.chips-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.ftxt{font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;padding:6px 12px;border-radius:8px;background:#fff;border:1.px solid var(--border);white-space:nowrap;transition:0.2s}
.ftxt.active-ftxt{background:var(--primary);color:#fff;border-color:var(--primary)}

/* HILERA DE RESULTADOS */
.mapa-section{max-width:960px;margin:10px auto 0;padding:16px}
.near-cards-wrap{overflow-x:auto;padding:10px 0;scrollbar-width:none}
.near-cards-track{display:flex;gap:12px;width:max-content}

/* CARD ESTILO CAROUSEL */
.near-card{width:220px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .2s;flex-shrink:0}
.near-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--primary)}
.near-card-banner{height:80px;background-size:cover;background-position:center;position:relative;background-color:#eee}
.near-card-logo{width:40px;height:40px;border-radius:8px;border:2px solid #fff;background:#fff;position:absolute;bottom:-15px;left:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.near-card-logo img{width:100%;height:100%;object-fit:cover}
.near-card-body{padding:25px 15px 15px}
.near-card-name{font-family:var(--font-d);font-size:14px;font-weight:700;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.near-card-btn{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}

#leaflet-map{height:0;transition:height 0.3s ease;border-radius:var(--r-lg);overflow:hidden;margin-bottom:15px}
#leaflet-map.show{height:300px}

/* POPUPS Y MODALES (Tus mismos estilos) */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-bg.on{display:flex}
.popup{background:#fff;width:90%;max-width:400px;border-radius:20px;padding:20px;position:relative}
</style>
</head>
<body>

<div class="header">
    <div class="header-badge">🌐 DIRECTORIO LOCAL</div>
    <h2 style="font-family:var(--font-d)">Tiendas y Servicios</h2>
</div>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="¿Qué estás buscando hoy?" oninput="filterDir()">
    </div>
</div>

<div class="filters-area">
    <div class="chips-row" id="chips-cat">
        <span class="ftxt active-ftxt" onclick="setCatFilter('',this)">Todos</span>
        <span class="ftxt" onclick="setCatFilter('mayorista',this)">★ Mayoristas</span>
        <span class="ftxt" onclick="setCatFilter('carne',this)">Carne</span>
        <span class="ftxt" onclick="setCatFilter('pollo',this)">Pollo</span>
        <span class="ftxt" onclick="setCatFilter('res',this)">Res</span>
    </div>
</div>

<div class="mapa-section show">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:12px;font-weight:700;color:var(--muted)">RESULTADOS</span>
        <button onclick="toggleMapa()" style="border:none;background:none;color:var(--primary);font-weight:600;cursor:pointer">Ver en mapa</button>
    </div>
    
    <div id="leaflet-map"></div>

    <div class="near-cards-wrap">
        <div class="near-cards-track" id="near-cards-track">
            </div>
    </div>
</div>

<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
    <div class="popup">
        <div id="popup-content"></div>
        <button onclick="closePopup()" style="margin-top:15px;width:100%;padding:10px;border:none;border-radius:10px;background:#eee;cursor:pointer">Cerrar</button>
    </div>
</div>

<script>
// --- VARIABLES Y LÓGICA ---
var ALL_STORES = []; // Se llena con tu fetch del backend
var activeCat = '';

// Simulación de carga (Aquí va tu fetch real)
function renderDir(stores) {
    const track = document.getElementById('near-cards-track');
    if (stores.length === 0) {
        track.innerHTML = '<p style="padding:20px;color:gray">No se encontraron resultados</p>';
        return;
    }

    track.innerHTML = stores.map(s => `
        <div class="near-card">
            <div class="near-card-banner" style="background-image:url(${s.config.bannerUrl || ''})">
                <div class="near-card-logo">
                    ${s.config.logo ? `<img src="${s.config.logo}">` : s.name[0]}
                </div>
            </div>
            <div class="near-card-body">
                <div class="near-card-name">${s.name}</div>
                <button class="near-card-btn" onclick="window.open('${s.url}','_blank')">Ver tienda →</button>
            </div>
        </div>
    `).join('');
}

function filterDir() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtrados = ALL_STORES.filter(s => {
        const coincideNombre = s.name.toLowerCase().includes(q);
        const coincideCat = activeCat === '' || (s.config.keywords || '').includes(activeCat);
        return coincideNombre && coincideCat;
    });
    renderDir(filtrados);
}

function setCatFilter(cat, el) {
    activeCat = cat;
    document.querySelectorAll('.ftxt').forEach(x => x.classList.remove('active-ftxt'));
    el.classList.add('active-ftxt');
    filterDir();
}

function toggleMapa() {
    const m = document.getElementById('leaflet-map');
    m.classList.toggle('show');
    // Aquí disparas la inicialización de Leaflet si es necesario
}

function fixImgUrl(u) { return u; } // Tu función original
function closePopup() { document.getElementById('popup-bg').classList.remove('on'); }

// Al cargar, inicializa con tus datos reales
window.onload = () => { 
    // ALL_STORES = ... (Tu lógica de carga desde Google Sheets)
    // renderDir(ALL_STORES);
};
</script>
</body>
</html>
