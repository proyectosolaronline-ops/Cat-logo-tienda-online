<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Resultados</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* MANTENGO TUS ESTILOS ORIGINALES */
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:40px 20px 60px;text-align:center;position:relative}
.header-badge{display:inline-flex;background:rgba(255,255,255,0.15);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:12px}

/* BUSCADOR ARRIBA */
.search-wrap{max-width:600px;margin:-30px auto 0;padding:0 16px;position:relative;z-index:10}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;align-items:center;border:1.5px solid var(--border);overflow:hidden}
.search-box input{flex:1;padding:15px;border:none;outline:none;font-size:14px}

.filters-area{max-width:960px;margin:20px auto 0;padding:0 16px}
.ftxt{font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;padding:8px 12px;border-radius:8px;transition:0.2s;display:inline-block}
.active-ftxt{color:var(--primary);font-weight:700;text-decoration:underline;text-underline-offset:3px}

/* HILERA DE RESULTADOS (DISEÑO ORIGINAL) */
.mapa-section{max-width:960px;margin:0 auto;padding:16px; display:block !important;}
#leaflet-map{height:0;transition:height 0.3s;border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px}
#leaflet-map.show{height:280px;border:1.5px solid var(--border)}
.near-cards-wrap{overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.near-cards-track{display:flex;gap:10px;width:max-content}

.near-card{width:200px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;flex-shrink:0}
.near-card-banner{height:70px;background-size:cover;background-position:center;position:relative;background-color:var(--primary)}
.near-card-logo{width:36px;height:36px;border-radius:8px;border:2px solid #fff;background:#fff;position:absolute;bottom:-14px;left:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.near-card-logo img{width:100%;height:100%;object-fit:cover}
.near-card-body{padding:20px 10px 12px}
.near-card-name{font-size:13px;font-weight:700;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.near-card-btn{width:100%;padding:8px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="header">
    <div class="header-badge">🌐 DIRECTORIO LOCAL</div>
    <h2 style="font-family:var(--font-d);font-weight:800">Tiendas y Servicios</h2>
</div>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="¿Qué estás buscando hoy?" oninput="filterDir()">
    </div>
</div>

<div class="filters-area">
    <div id="chips-cat">
        <span class="ftxt active-ftxt" onclick="setCatFilter('',this)">Todos</span>
        <span class="ftxt" onclick="setCatFilter('mayorista',this)" style="color:#7c3aed">★ Mayoristas</span>
        <span class="ftxt" onclick="setCatFilter('carne',this)">Carne</span>
        <span class="ftxt" onclick="setCatFilter('pollo',this)">Pollo</span>
        <span class="ftxt" onclick="setCatFilter('res',this)">Res</span>
    </div>
</div>

<div class="mapa-section" id="mapa-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:11px;font-weight:700;color:var(--muted)">RESULTADOS ENCONTRADOS</span>
        <button onclick="toggleMapa()" id="mapa-toggle" style="border:none;background:none;color:var(--primary);font-weight:700;cursor:pointer">Ver en mapa</button>
    </div>
    
    <div id="leaflet-map"></div>

    <div class="near-cards-wrap">
        <div class="near-cards-track" id="near-cards-track">
            </div>
    </div>
</div>

<script>
// --- TU LÓGICA ORIGINAL DE REDIRECCIÓN Y BACKEND ---
var params = new URLSearchParams(location.search);
var BACKEND = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
var ALL_STORES = [], activeCat = '';

function fixImgUrl(u) {
    if (!u) return '';
    var m = u.match(/[?&]id=([\w-]+)/); if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
    var m2 = u.match(/\/d\/([\w-]+)/); if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
    return u;
}

function buildStoreUrl(id) { 
    return STORE_BASE + '?store=' + id + '&backend=' + encodeURIComponent(BACKEND); 
}

async function loadData() {
    try {
        const r = await fetch(BACKEND + '?action=stores.directory');
        const d = await r.json();
        ALL_STORES = d.stores.map(s => {
            s.config = (typeof s.config === 'string') ? JSON.parse(s.config) : (s.config || {});
            return s;
        });
        renderDir(ALL_STORES);
    } catch(e) {
        document.getElementById('near-cards-track').innerHTML = "No se pudieron cargar los datos.";
    }
}

// ESTA FUNCIÓN AHORA PONE LOS RESULTADOS EN LA HILERA DE ARRIBA
function renderDir(stores) {
    const track = document.getElementById('near-cards-track');
    if (stores.length === 0) {
        track.innerHTML = '<p style="padding:20px;color:gray">No se encontraron resultados</p>';
        return;
    }

    track.innerHTML = stores.map(s => {
        const cfg = s.config || {};
        const logo = fixImgUrl(cfg.logo || cfg.logoUrl);
        const banner = fixImgUrl(cfg.bannerUrl);
        const ini = s.name[0].toUpperCase();
        return `
            <div class="near-card">
                <div class="near-card-banner" style="background-image:url(${banner})">
                    <div class="near-card-logo">
                        ${logo ? `<img src="${logo}">` : ini}
                    </div>
                </div>
                <div class="near-card-body">
                    <div class="near-card-name">${s.name}</div>
                    <button class="near-card-btn" onclick="window.open('${buildStoreUrl(s.storeId)}','_blank')">Ver tienda →</button>
                </div>
            </div>`;
    }).join('');
}

function filterDir() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtrados = ALL_STORES.filter(s => {
        const coincidencia = (s.name + (s.config.keywords || '')).toLowerCase().includes(q);
        const categoria = activeCat === '' || (s.config.keywords || '').toLowerCase().includes(activeCat);
        return coincidencia && categoria;
    });
    renderDir(filtrados);
}

function setCatFilter(cat, el) {
    activeCat = cat.toLowerCase();
    document.querySelectorAll('.ftxt').forEach(x => x.classList.remove('active-ftxt'));
    el.classList.add('active-ftxt');
    filterDir();
}

function toggleMapa() {
    const m = document.getElementById('leaflet-map');
    m.classList.toggle('show');
    if(m.classList.contains('show')) {
        // Aquí puedes disparar tu lógica de Leaflet
        setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
    }
}

window.onload = loadData;
</script>
</body>
</html>
