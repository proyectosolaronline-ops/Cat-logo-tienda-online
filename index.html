<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tiendas Externas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;}
#map{width:100%;height:100dvh;}

/* Pin con foto */
.ext-pin{
  width:52px;height:52px;border-radius:50%;
  border:4px solid #f97316;
  object-fit:cover;
  box-shadow:0 3px 12px rgba(249,115,22,.55);
  display:block;
}
.ext-pin-ph{
  width:52px;height:52px;border-radius:50%;
  border:4px solid #f97316;
  background:linear-gradient(135deg,#f97316,#ea580c);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 3px 12px rgba(249,115,22,.55);
  color:#fff;
}

/* Popup */
.lf-popup .leaflet-popup-content-wrapper{
  border-radius:16px;padding:0;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.2);
  min-width:220px;
}
.lf-popup .leaflet-popup-content{margin:0;width:100%!important;}
.lf-popup .leaflet-popup-tip-container{display:none;}
.pop-foto{width:100%;height:110px;object-fit:cover;display:block;}
.pop-foto-ph{width:100%;height:80px;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:36px;}
.pop-body{padding:12px 14px 14px;}
.pop-name{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;}
.pop-loc{font-size:12px;color:#888;margin-bottom:10px;}
.pop-actions{display:flex;flex-direction:column;gap:7px;}
.pop-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;color:#fff;}
.pop-btn.azul{background:#1a73e8;}
.pop-btn.verde{background:#25d366;}

/* Tu ubicación dot */
.yo-dot{
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:3px solid #16a34a;
  box-shadow:0 0 0 4px rgba(22,163,74,.25);
}
</style>
</head>
<body>
<div id="map"></div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';

let mapa, userLat = null, userLng = null;

function fixImg(u){
  if(!u) return '';
  var m=u.match(/[?&]id=([\w-]+)/); if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2=u.match(/\/d\/([\w-]+)/);  if(m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('load', async function(){
  /* ── Iniciar mapa ── */
  mapa = L.map('map', { zoomControl: true }).setView([22.5, -102.5], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(mapa);

  /* ── GPS usuario ── */
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      var yoIcon = L.divIcon({ html:'<div class="yo-dot"></div>', className:'', iconSize:[16,16], iconAnchor:[8,8] });
      L.marker([userLat, userLng], { icon: yoIcon }).addTo(mapa)
       .bindTooltip('Tú', { permanent:false, direction:'top' });
    }, function(){}, { enableHighAccuracy:true, timeout:8000 });
  }

  /* ── Cargar tiendas externas ── */
  try {
    var r    = await fetch(BACKEND + '?action=stores.directory');
    var data = await r.json();
    var stores = (data.stores || []).map(function(s){
      s.config = typeof s.config === 'string' ? JSON.parse(s.config) : (s.config || {});
      return s;
    });
    var externas = stores.filter(function(s){ return s.isExternal === true; });

    if(!externas.length) return;

    var bounds = [];

    externas.forEach(function(s){
      var cfg = s.config || {};
      var lat = parseFloat(cfg.locationLat);
      var lng = parseFloat(cfg.locationLng);
      if(isNaN(lat) || isNaN(lng)) return;

      var foto = fixImg(cfg.logo || cfg.logoUrl || cfg.foto || '');

      /* ── Pin con foto o emoji ── */
      var pinHTML = foto
        ? '<img class="ext-pin" src="'+foto+'" onerror="this.outerHTML=\'<div class=ext-pin-ph>🏪</div>\'">'
        : '<div class="ext-pin-ph">🏪</div>';

      var icon = L.divIcon({
        html      : pinHTML,
        className : '',
        iconSize  : [52, 52],
        iconAnchor: [26, 26]
      });

      /* ── Contenido popup ── */
      var loc  = cfg.description || cfg.storeLocation || '';
      var link = cfg.linkNegocio || '';
      var tel  = (cfg.whatsapp  || '').replace(/\D/g,'');

      var popHTML =
        (foto
          ? '<img class="pop-foto" src="'+foto+'" onerror="this.outerHTML=\'<div class=pop-foto-ph>🏪</div>\'">'
          : '<div class="pop-foto-ph">🏪</div>') +
        '<div class="pop-body">' +
          '<div class="pop-name">'+esc(s.name||'Tienda')+'</div>' +
          (loc ? '<div class="pop-loc">📍 '+esc(loc)+'</div>' : '') +
          '<div class="pop-actions">' +
            (link ? '<a href="'+esc(link)+'" target="_blank" class="pop-btn azul">🔗 Ver negocio</a>' : '') +
            (tel  ? '<a href="https://wa.me/52'+tel+'" target="_blank" class="pop-btn verde">💬 WhatsApp</a>' : '') +
          '</div>' +
        '</div>';

      L.marker([lat, lng], { icon: icon })
        .addTo(mapa)
        .bindPopup(popHTML, { className:'lf-popup', maxWidth:260, minWidth:220 });

      bounds.push([lat, lng]);
    });

    /* ── Centrar mapa en todas las tiendas ── */
    if(bounds.length === 1){
      mapa.setView(bounds[0], 14);
    } else if(bounds.length > 1){
      mapa.fitBounds(L.latLngBounds(bounds), { padding:[40,40], maxZoom:14 });
    }

  } catch(e){
    console.error('Error cargando tiendas:', e);
  }
});
</script>
</body>
</html>
