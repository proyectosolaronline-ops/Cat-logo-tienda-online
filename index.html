<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tiendas Externas — Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d12;
  --surface: rgba(18,18,28,0.95);
  --surface2: rgba(30,30,46,0.97);
  --border: rgba(255,255,255,0.10);
  --accent: #6ee7b7;
  --accent2: #3b82f6;
  --text: #f0f0f8;
  --muted: #8b8ba8;
  --danger: #f87171;
  --warn: #fbbf24;
  --success: #34d399;
  --font-d: 'Syne', sans-serif;
  --font-b: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 14px;
  --glow: 0 0 24px rgba(110,231,183,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font-b); background: var(--bg); color: var(--text); }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 54px; display: flex; align-items: center; gap: 12px; padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.topbar-icon { font-size: 20px; }
.topbar-title { font-family: var(--font-d); font-size: 15px; font-weight: 800; color: var(--text); flex: 1; letter-spacing: -0.02em; }
.topbar-title span { color: var(--accent); }
.badge-total {
  font-size: 11px; font-weight: 700; font-family: var(--mono);
  background: var(--accent); color: #0d1a12;
  padding: 2px 9px; border-radius: 99px;
}
.btn-icon {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.05);
  color: var(--text); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s; flex-shrink: 0;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
.btn-icon.active { background: var(--accent); color: #0d1a12; border-color: var(--accent); }

/* ── MAPA ── */
#map {
  position: fixed; top: 54px; left: 0; right: 0; bottom: 0;
  width: 100%; height: calc(100dvh - 54px);
  z-index: 1;
}
#map.fullscreen { top: 0 !important; height: 100dvh !important; }

/* ── BARRA LATERAL LISTA ── */
.sidebar {
  position: fixed; top: 54px; right: 0; bottom: 0;
  width: 320px; z-index: 500;
  background: var(--surface);
  border-left: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.open { transform: translateX(0); }
.sidebar-hdr {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-title { font-family: var(--font-d); font-size: 14px; font-weight: 700; }
.search-box {
  margin: 10px 12px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: var(--text); font-size: 13px; font-family: var(--font-b);
  width: calc(100% - 24px); outline: none;
  transition: border-color .15s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }
.tiendas-list { flex: 1; overflow-y: auto; padding: 4px 0 16px; }
.tienda-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background .12s;
}
.tienda-item:hover { background: rgba(110,231,183,0.06); }
.tienda-item.active { background: rgba(110,231,183,0.10); border-left: 2px solid var(--accent); }
.tienda-thumb {
  width: 42px; height: 42px; border-radius: 10px; object-fit: cover;
  border: 1px solid var(--border); flex-shrink: 0;
  background: rgba(255,255,255,0.06);
}
.tienda-placeholder {
  width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.tienda-info { flex: 1; min-width: 0; }
.tienda-nombre { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tienda-tipo { font-size: 11px; color: var(--accent); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tienda-loc { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge-status {
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 99px; flex-shrink: 0;
}
.badge-status.activo { background: rgba(52,211,153,0.18); color: var(--success); }
.badge-status.suspendido { background: rgba(248,113,113,0.18); color: var(--danger); }

/* ── FLOATING BUTTONS ── */
.fab-group {
  position: fixed; bottom: 24px; right: 16px; z-index: 600;
  display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
}
.fab {
  width: 48px; height: 48px; border-radius: 14px;
  border: none; cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: all .18s; color: #0d1a12;
}
.fab.primary { background: var(--accent); }
.fab.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 16px; }
.fab:hover { transform: scale(1.08); }
.fab.active { background: var(--accent2); color: #fff; }

/* ── SPINNER / LOADER ── */
.loader-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.loader-overlay.hidden { display: none; }
.spinner-ring {
  width: 48px; height: 48px;
  border: 3px solid rgba(110,231,183,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt { font-family: var(--font-d); font-size: 14px; color: var(--muted); }

/* ── GPS PILL ── */
.gps-pill {
  position: fixed; top: 66px; left: 50%; transform: translateX(-50%);
  z-index: 900; background: var(--accent); color: #0d1a12;
  padding: 7px 18px; border-radius: 99px; font-size: 12px; font-weight: 700;
  font-family: var(--font-d); display: none; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(110,231,183,0.3);
}
.gps-pill.show { display: block; }

/* ── POPUP CUSTOM ── */
.leaflet-popup-content-wrapper {
  background: var(--surface2) !important;
  border: 1px solid var(--border) !important;
  border-radius: 16px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  padding: 0 !important;
  overflow: hidden;
  min-width: 220px;
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-content { margin: 0 !important; width: 240px !important; }
.popup-foto {
  width: 100%; height: 120px; object-fit: cover; display: block;
}
.popup-foto-ph {
  width: 100%; height: 80px;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
}
.popup-body { padding: 12px 14px 14px; }
.popup-nombre { font-family: var(--font-d); font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.popup-tipo {
  display: inline-block; font-size: 10px; font-weight: 700;
  background: rgba(110,231,183,0.15); color: var(--accent);
  padding: 2px 8px; border-radius: 99px; margin-bottom: 8px;
}
.popup-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.popup-row svg { flex-shrink: 0; }
.popup-tel { color: var(--accent2); font-weight: 600; text-decoration: none; }
.popup-tel:hover { text-decoration: underline; }
.popup-badge {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; margin-top: 6px;
}
.popup-badge.activo { background: rgba(52,211,153,0.18); color: var(--success); }
.popup-badge.suspendido { background: rgba(248,113,113,0.18); color: var(--danger); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600;
  z-index: 9999; display: none; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  font-family: var(--font-b);
}
#toast.success { background: var(--success); color: #0d1a12; }
#toast.error   { background: var(--danger);  color: #fff; }
#toast.warn    { background: var(--warn);    color: #0d1a12; }

/* ── CLUSTER COUNT ── */
.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large { background: rgba(110,231,183,0.2) !important; border: 2px solid var(--accent) !important; }
.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div { background: var(--accent) !important; color: #0d1a12 !important; font-weight: 800 !important; font-family: var(--font-d) !important; }

/* ── MOBILE SIDEBAR TOGGLE ── */
@media (max-width: 640px) {
  .sidebar { width: 88vw; }
  .fab-group { right: 14px; bottom: 20px; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="spinner-ring"></div>
  <div class="loader-txt">Cargando tiendas...</div>
</div>

<!-- GPS PILL -->
<div class="gps-pill" id="gps-pill">📡 Localizando...</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <div class="topbar-icon">🗺️</div>
  <div class="topbar-title">Tiendas <span>Externas</span></div>
  <span class="badge-total" id="badge-total">0</span>
  <button class="btn-icon" id="btn-gps" title="Mi ubicación" onclick="irAMiUbicacion()">📍</button>
  <button class="btn-icon" id="btn-reload" title="Recargar" onclick="cargarTiendas()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
  </button>
  <button class="btn-icon" id="btn-lista" title="Lista" onclick="toggleSidebar()">☰</button>
  <button class="btn-icon" id="btn-debug" title="Debug" onclick="document.getElementById('debug-panel').style.display=document.getElementById('debug-panel').style.display==='none'?'block':'none'">🐛</button>
  <button class="btn-icon" id="btn-token" title="Token" onclick="document.getElementById('token-modal').style.display='flex'">🔑</button>
  <button class="btn-icon" id="btn-full" title="Pantalla completa" onclick="toggleFullscreen()">⛶</button>
</div>

<!-- MAPA -->
<div id="map"></div>

<!-- SIDEBAR LISTA -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-hdr">
    <div class="sidebar-title">Directorio</div>
    <button class="btn-icon" onclick="toggleSidebar()">✕</button>
  </div>
  <input class="search-box" id="search-list" placeholder="Buscar tienda..." oninput="filtrarLista()">
  <div class="tiendas-list" id="tiendas-list"></div>
</div>

<!-- FABs -->
<div class="fab-group">
  <button class="fab secondary" id="fab-sat" title="Satélite/Calles" onclick="toggleTileMode()">🛰️</button>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════ CONFIG ═══════════════════════════ */
const BACKEND = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
let TOKEN = localStorage.getItem('lk_token') || '';

let MAP, tileCalles, tileSatelite, modoSat = true;
let ALL_TIENDAS = [], markers = [], activeItem = null;

function showDebug(msg, tipo) {
  const d = document.getElementById('debug-panel');
  const line = document.createElement('div');
  line.style.cssText = `padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:11px;color:${tipo==='error'?'#f87171':tipo==='ok'?'#6ee7b7':'#fbbf24'};word-break:break-all;`;
  line.textContent = (tipo==='error'?'❌ ':tipo==='ok'?'✅ ':'⚠️ ') + msg;
  d.appendChild(line);
  d.style.display = 'block';
}

/* ══════════════ INIT MAP ══════════════ */
function initMap() {
  MAP = L.map('map', {
    zoomControl: false,
    attributionControl: false,
  }).setView([20.5888, -100.3899], 12);

  tileCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 21, attribution: '© OpenStreetMap'
  });

  tileSatelite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 21, attribution: '© Esri' }
  );

  tileSatelite.addTo(MAP); // satélite por defecto

  // Zoom control en top-left
  L.control.zoom({ position: 'topleft' }).addTo(MAP);
  L.control.attribution({ position: 'bottomleft', prefix: '© Esri / OSM' }).addTo(MAP);
}

/* ══════════════ TOGGLE TILE ══════════════ */
function toggleTileMode() {
  modoSat = !modoSat;
  const btn = document.getElementById('fab-sat');
  if (modoSat) {
    MAP.removeLayer(tileCalles);
    tileSatelite.addTo(MAP);
    btn.textContent = '🛰️';
    btn.title = 'Cambiar a vista calles';
  } else {
    MAP.removeLayer(tileSatelite);
    tileCalles.addTo(MAP);
    btn.textContent = '🗺️';
    btn.title = 'Cambiar a vista satélite';
  }
}

/* ══════════════ API ══════════════ */
async function api(action, data) {
  data = data || {};
  showDebug(`Llamando: ${action} | token: "${TOKEN||'(vacío)'}"`, 'warn');
  try {
    // Exactamente igual que el HTML original
    const payload = JSON.stringify(Object.assign({ action, token: TOKEN }, data));
    showDebug(`Body: ${payload.substring(0,120)}`, 'warn');

    const res = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: payload
    });

    showDebug(`HTTP status: ${res.status} ${res.statusText}`, res.ok ? 'ok' : 'error');

    const raw = await res.text();
    showDebug(`Raw response (200 chars): ${raw.substring(0, 200)}`, 'warn');

    let json;
    try { json = JSON.parse(raw); }
    catch(pe) { showDebug(`No es JSON válido: ${pe.message}`, 'error'); return null; }

    showDebug(`json.ok=${json.ok} | stores count=${Array.isArray(json.stores)?json.stores.length:'N/A'} | keys: ${Object.keys(json).join(',')}`, json.ok ? 'ok' : 'error');

    if (!json.ok) {
      showDebug(`Error backend: ${json.error || JSON.stringify(json)}`, 'error');
      // Intentar GET como fallback
      showDebug('Intentando GET como fallback...', 'warn');
      const resG = await fetch(`${BACKEND}?action=${action}&token=${encodeURIComponent(TOKEN)}`);
      const rawG = await resG.text();
      showDebug(`GET response: ${rawG.substring(0,200)}`, 'warn');
      try {
        const jG = JSON.parse(rawG);
        if (jG.ok) { showDebug(`GET funcionó! stores: ${(jG.stores||[]).length}`, 'ok'); return jG; }
      } catch(e2) { showDebug('GET tampoco funcionó', 'error'); }
      return null;
    }

    if (json.stores && json.stores.length === 0) {
      showDebug('Backend OK pero stores=[] (vacío). ¿Token incorrecto o sin tiendas?', 'warn');
    }

    return json;
  } catch (e) {
    showDebug(`Excepción fetch: ${e.message}`, 'error');
    toast(e.message, 'error');
    return null;
  }
}

/* ══════════════ CARGAR TIENDAS ══════════════ */
async function cargarTiendas() {
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('btn-reload').innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .6s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>`;

  const res = await api('external.stores.list');

  document.getElementById('btn-reload').innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>`;

  document.getElementById('loader').classList.add('hidden');

  if (!res) return;
  ALL_TIENDAS = (res.stores || []).filter(t => t.locationLat && t.locationLng);

  document.getElementById('badge-total').textContent = ALL_TIENDAS.length;

  ponerMarkers();
  renderLista(ALL_TIENDAS);

  if (ALL_TIENDAS.length) ajustarVista();
}

/* ══════════════ MARCADORES ══════════════ */
function fixImg(u) {
  if (!u) return '';
  if (u.startsWith('data:')) return u;
  const m  = u.match(/[?&]id=([\w-]+)/);
  if (m)  return 'https://lh3.googleusercontent.com/d/' + m[1];
  const m2 = u.match(/\/d\/([\w-]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  return u;
}

function ponerMarkers() {
  markers.forEach(m => MAP.removeLayer(m));
  markers = [];

  ALL_TIENDAS.forEach(t => {
    const lat = parseFloat(t.locationLat);
    const lng = parseFloat(t.locationLng);
    if (isNaN(lat) || isNaN(lng)) return;

    // Icono personalizado
    const color = t.status === 'activo' ? '#6ee7b7' : '#f87171';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:32px;height:32px;border-radius:50%;
        background:${color};
        border:3px solid rgba(0,0,0,0.6);
        box-shadow:0 0 0 2px ${color}40, 0 4px 12px rgba(0,0,0,0.5);
        display:flex;align-items:center;justify-content:center;
        font-size:14px;cursor:pointer;
        transition:transform .15s;
      ">🏪</div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -34]
    });

    const marker = L.marker([lat, lng], { icon }).addTo(MAP);
    marker.bindPopup(buildPopup(t), {
      maxWidth: 260,
      minWidth: 240,
      closeButton: true,
      className: 'custom-popup'
    });

    marker.on('click', () => {
      highlightItem(t.storeId);
    });

    marker._storeId = t.storeId;
    markers.push(marker);
  });
}

function buildPopup(t) {
  const foto = t.foto ? fixImg(t.foto) : '';
  const fotoHtml = foto
    ? `<img class="popup-foto" src="${foto}" onerror="this.style.display='none'">`
    : `<div class="popup-foto-ph">🏪</div>`;

  const loc = [t.localidad, t.estado].filter(Boolean).join(', ') || '';

  return `
    <div>
      ${fotoHtml}
      <div class="popup-body">
        <div class="popup-nombre">${esc(t.nombre_tienda || '—')}</div>
        ${t.tipo_negocio ? `<span class="popup-tipo">${esc(t.tipo_negocio)}</span>` : ''}
        ${t.nombre_cliente ? `<div class="popup-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(t.nombre_cliente)}</div>` : ''}
        ${t.telefono ? `<div class="popup-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.38 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.69a16 16 0 0 0 6.29 6.29l1.01-1.01a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><a class="popup-tel" href="tel:${esc(t.telefono)}">${esc(t.telefono)}</a></div>` : ''}
        ${loc ? `<div class="popup-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(loc)}</div>` : ''}
        <span class="popup-badge ${t.status === 'activo' ? 'activo' : 'suspendido'}">
          ${t.status === 'activo' ? '● Activo' : '● Suspendido'}
        </span>
      </div>
    </div>`;
}

/* ══════════════ LISTA SIDEBAR ══════════════ */
function renderLista(lista) {
  const el = document.getElementById('tiendas-list');
  if (!lista.length) {
    el.innerHTML = '<div style="padding:30px 16px;text-align:center;color:var(--muted);font-size:13px">Sin resultados</div>';
    return;
  }
  el.innerHTML = lista.map(t => {
    const foto = t.foto ? fixImg(t.foto) : '';
    const fotoEl = foto
      ? `<img class="tienda-thumb" src="${foto}" onerror="this.style.display='none;this.nextElementSibling.style.display='flex'">`
      : `<div class="tienda-placeholder">🏪</div>`;
    const loc = [t.localidad, t.estado].filter(Boolean).join(', ') || '—';
    return `
      <div class="tienda-item" id="item-${esc(t.storeId)}" onclick="irATienda('${esc(t.storeId)}')">
        ${fotoEl}
        <div class="tienda-info">
          <div class="tienda-nombre">${esc(t.nombre_tienda || '—')}</div>
          <div class="tienda-tipo">${esc(t.tipo_negocio || t.nombre_cliente || '')}</div>
          <div class="tienda-loc">${esc(loc)}</div>
        </div>
        <span class="badge-status ${t.status === 'activo' ? 'activo' : 'suspendido'}">
          ${t.status === 'activo' ? 'Activo' : 'Suspd.'}
        </span>
      </div>`;
  }).join('');
}

function filtrarLista() {
  const q = document.getElementById('search-list').value.toLowerCase();
  const filtradas = q ? ALL_TIENDAS.filter(t =>
    (t.nombre_tienda || '').toLowerCase().includes(q) ||
    (t.nombre_cliente || '').toLowerCase().includes(q) ||
    (t.tipo_negocio || '').toLowerCase().includes(q) ||
    (t.localidad || '').toLowerCase().includes(q) ||
    (t.estado || '').toLowerCase().includes(q)
  ) : ALL_TIENDAS;
  renderLista(filtradas);
}

function irATienda(storeId) {
  const t = ALL_TIENDAS.find(x => x.storeId === storeId);
  if (!t) return;
  const lat = parseFloat(t.locationLat);
  const lng = parseFloat(t.locationLng);
  if (isNaN(lat) || isNaN(lng)) return;

  // Cerrar sidebar en móvil
  if (window.innerWidth < 640) toggleSidebar();

  MAP.setView([lat, lng], 17, { animate: true });

  const marker = markers.find(m => m._storeId === storeId);
  if (marker) {
    setTimeout(() => marker.openPopup(), 500);
  }

  highlightItem(storeId);
}

function highlightItem(storeId) {
  if (activeItem) {
    const prev = document.getElementById('item-' + activeItem);
    if (prev) prev.classList.remove('active');
  }
  activeItem = storeId;
  const el = document.getElementById('item-' + storeId);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ══════════════ AJUSTAR VISTA ══════════════ */
function ajustarVista() {
  const coords = ALL_TIENDAS
    .filter(t => t.locationLat && t.locationLng)
    .map(t => [parseFloat(t.locationLat), parseFloat(t.locationLng)]);
  if (coords.length) MAP.fitBounds(coords, { padding: [60, 60] });
}

/* ══════════════ GPS ══════════════ */
function irAMiUbicacion() {
  if (!navigator.geolocation) { toast('GPS no disponible', 'warn'); return; }
  const pill = document.getElementById('gps-pill');
  pill.classList.add('show');
  navigator.geolocation.getCurrentPosition(
    pos => {
      pill.classList.remove('show');
      MAP.setView([pos.coords.latitude, pos.coords.longitude], 15, { animate: true });
      // marker de usuario
      const userIcon = L.divIcon({
        className: '',
        html: `<div style="width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 4px rgba(59,130,246,0.3);"></div>`,
        iconSize: [18, 18], iconAnchor: [9, 9]
      });
      L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon })
        .addTo(MAP).bindPopup('<div style="color:#1a1a1a;font-weight:700;font-size:13px">📍 Tu ubicación</div>').openPopup();
      toast('Ubicación obtenida ✅', 'success');
    },
    () => { pill.classList.remove('show'); toast('No se pudo obtener la ubicación', 'error'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* ══════════════ SIDEBAR ══════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('btn-lista').classList.toggle('active');
}

/* ══════════════ PANTALLA COMPLETA ══════════════ */
let isFullscreen = false;
function toggleFullscreen() {
  isFullscreen = !isFullscreen;
  const mapEl   = document.getElementById('map');
  const topbar  = document.getElementById('topbar');
  const btn     = document.getElementById('btn-full');
  const sidebar = document.getElementById('sidebar');

  if (isFullscreen) {
    mapEl.classList.add('fullscreen');
    topbar.style.display = 'none';
    sidebar.style.top = '0';
    btn.textContent = '✕';
    btn.classList.add('active');
    // Reposicionar btn afuera
    btn.style.position = 'fixed';
    btn.style.top = '12px';
    btn.style.right = '12px';
    btn.style.zIndex = '2000';
  } else {
    mapEl.classList.remove('fullscreen');
    topbar.style.display = '';
    sidebar.style.top = '54px';
    btn.textContent = '⛶';
    btn.classList.remove('active');
    btn.style.position = '';
    btn.style.top = '';
    btn.style.right = '';
    btn.style.zIndex = '';
  }
  setTimeout(() => MAP && MAP.invalidateSize(), 320);
}

// ESC para salir de fullscreen
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
});

/* ══════════════ UTILS ══════════════ */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type || 'success'; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 3500);
}

function guardarToken() {
  const val = document.getElementById('token-input').value.trim();
  TOKEN = val;
  localStorage.setItem('lk_token', val);
  document.getElementById('token-modal').style.display = 'none';
  // limpiar debug
  const d = document.getElementById('debug-panel');
  d.querySelectorAll('div:not(:first-child)').forEach(x => x.remove());
  cargarTiendas();
}
function cerrarTokenModal() {
  document.getElementById('token-modal').style.display = 'none';
}

/* ══════════════ ARRANQUE ══════════════ */
window.addEventListener('load', () => {
  initMap();
  // Pre-llenar token input si existe
  document.getElementById('token-input').value = TOKEN;
  cargarTiendas();
});
</script>
