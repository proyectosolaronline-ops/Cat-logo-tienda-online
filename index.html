<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Tiendas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0;
            --cta: #ff6900; --bg: #f5f6f7; --surface: #fff;
            --text: #1a1a2e; --muted: #717185; --border: #dde1e7;
            --font-d: 'Outfit', sans-serif; --font-b: 'Inter', sans-serif;
            --r: 12px; --shadow: 0 4px 12px rgba(0,0,0,.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-b); background: var(--bg); color: var(--text); line-height: 1.5; }

        /* HEADER */
        .header { background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%); color: #fff; padding: 50px 20px; text-align: center; }
        .header h1 { font-family: var(--font-d); font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 15px; }

        /* SEARCH */
        .search-wrap { max-width: 500px; margin: -25px auto 20px; padding: 0 20px; }
        .search-box { background: #fff; display: flex; border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
        .search-box input { flex: 1; border: none; padding: 15px; outline: none; font-size: 15px; }

        /* GRID */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* CARD */
        .card { background: #fff; border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card-img { height: 100px; background: #ddd; background-size: cover; background-position: center; position: relative; }
        .card-logo { width: 60px; height: 60px; border-radius: 10px; border: 3px solid #fff; position: absolute; bottom: -30px; left: 15px; background: #fff; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card-body { padding: 40px 15px 15px; flex: 1; }
        .card-name { font-family: var(--font-d); font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .card-desc { font-size: 13px; color: var(--muted); height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-footer { padding: 10px 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-open { background: var(--primary); color: #fff; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 16px; overflow: hidden; text-align: center; }
        .modal-body { padding: 25px; }
        .qr-area { margin: 20px auto; display: inline-block; padding: 10px; background: #f9f9f9; border-radius: 10px; }
        .btn-wa { display: block; background: #25d366; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 700; margin-top: 10px; }
        
        #status { text-align: center; color: var(--muted); padding: 40px; }
        .loader { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>Directorio de Tiendas</h1>
    <p>Encuentra productos y servicios cerca de ti</p>
</div>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="q" placeholder="Buscar por nombre o producto..." oninput="filtrar()">
    </div>
</div>

<div class="container">
    <div id="status"><div class="loader"></div> Cargando ecosistema...</div>
    <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this) cerrar()">
    <div class="modal-content">
        <div class="modal-body">
            <h2 id="m-name">Nombre de Tienda</h2>
            <div class="qr-area" id="m-qr"></div>
            <p style="font-size: 12px; color: var(--muted); margin-bottom: 20px;">Escanea para ver el catálogo</p>
            <a href="#" id="m-link" class="btn-open" style="display:block; padding: 12px; font-size: 14px;" target="_blank">Entrar a la Tienda</a>
            <a href="#" id="m-wa" class="btn-wa" target="_blank">Contactar por WhatsApp</a>
        </div>
    </div>
</div>

<script>
    // Configuración Base
    const URL_API = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
    const URL_TIENDA_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
    
    let TIENDAS = [];

    // 1. Carga de datos con protección contra errores
    async function cargar() {
        try {
            const res = await fetch(`${URL_API}?action=stores.directory`);
            const data = await res.json();
            
            TIENDAS = (data.stores || []).map(s => {
                let config = {};
                try {
                    config = typeof s.config === 'string' ? JSON.parse(s.config) : (s.config || {});
                } catch(e) { console.error("Error parseando config de tienda:", s.storeId); }
                return { ...s, config };
            });

            document.getElementById('status').style.display = 'none';
            render(TIENDAS);
        } catch (err) {
            document.getElementById('status').innerHTML = "Error al conectar con el servidor.";
            console.error(err);
        }
    }

    // 2. Renderizado dinámico
    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        if(lista.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px;">No se encontraron tiendas.</p>';
            return;
        }

        lista.forEach(s => {
            const urlFinal = `${URL_TIENDA_BASE}?backend=${encodeURIComponent(URL_API)}&store=${s.storeId}`;
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => abrirModal(s);
            
            div.innerHTML = `
                <div class="card-img" style="background-image: url('${s.config.bannerUrl || ''}'); background-color:#1a73e8">
                    <img src="${s.config.logo || ''}" class="card-logo" onerror="this.src='https://via.placeholder.com/60?text=Shop'">
                </div>
                <div class="card-body">
                    <div class="card-name">${s.name}</div>
                    <div class="card-desc">${s.config.description || 'Tienda oficial de productos y servicios.'}</div>
                </div>
                <div class="card-footer">
                    <span style="font-size:11px; font-weight:600; color:#1a73e8">📍 ${s.config.storeLocation || 'Disponible'}</span>
                    <a href="${urlFinal}" class="btn-open" target="_blank" onclick="event.stopPropagation()">Ver catálogo</a>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    // 3. Buscador en tiempo real
    function filtrar() {
        const q = document.getElementById('q').value.toLowerCase();
        const filtradas = TIENDAS.filter(s => 
            s.name.toLowerCase().includes(q) || 
            (s.config.description || '').toLowerCase().includes(q)
        );
        render(filtradas);
    }

    // 4. Lógica de Modal y QR
    function abrirModal(s) {
        const urlFinal = `${URL_TIENDA_BASE}?backend=${encodeURIComponent(URL_API)}&store=${s.storeId}`;
        document.getElementById('m-name').textContent = s.name;
        document.getElementById('m-link').href = urlFinal;
        document.getElementById('m-wa').href = `https://wa.me/${(s.config.whatsapp || '').replace(/\D/g,'')}`;
        
        const qrCtn = document.getElementById('m-qr');
        qrCtn.innerHTML = '';
        new QRCode(qrCtn, { text: urlFinal, width: 160, height: 160 });
        
        document.getElementById('modal').classList.add('active');
    }

    function cerrar() {
        document.getElementById('modal').classList.remove('active');
    }

    // Arrancar
    cargar();
</script>

</body>
</html>
