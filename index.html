<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Productos, Servicios y Ubicaciones</title>
<meta name="description" id="meta-desc" content="Directorio de tiendas locales. Encuentra productos y servicios cerca de ti.">
<meta name="keywords" id="meta-keywords" content="tiendas, productos, servicios, directorio">
<meta property="og:title" content="Directorio de Tiendas">
<meta property="og:description" id="og-desc" content="Encuentra tiendas con productos y servicios cerca de ti.">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:48px 20px 56px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")}
.header-logo{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.header-logo svg{width:28px;height:28px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(6px)}
.header h1{font-family:var(--font-d);font-size:clamp(24px,5vw,42px);font-weight:800;line-height:1.1;margin-bottom:12px;letter-spacing:-.02em}
.header h1 span{color:#ffd54f}
.header p{font-size:15px;color:rgba(255,255,255,.8);max-width:500px;margin:0 auto;line-height:1.6}
.search-wrap{max-width:520px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:2}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border)}
.search-box input{flex:1;padding:14px 16px;border:none;outline:none;font-size:14px;font-family:var(--font-b);color:var(--text)}
.search-box input::placeholder{color:var(--muted)}
.search-btn{padding:12px 16px;background:none;border:none;cursor:pointer;color:var(--muted)}
.search-btn svg{width:18px;height:18px}

/* ── CARRUSEL PROMOS ── */
.promos-section{max-width:960px;margin:0 auto;padding:28px 0 0;display:none}
.promos-section.show{display:block}
.promos-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:12px}
.promos-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cta)}
.promos-pulse{width:8px;height:8px;border-radius:50%;background:var(--cta);animation:ppulse 1.6s infinite}
@keyframes ppulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.promos-count{font-size:11px;color:var(--muted)}
.promos-scroll{overflow-x:auto;padding:0 16px 14px;scrollbar-width:none;-ms-overflow-style:none;position:relative}
.promos-scroll::-webkit-scrollbar{display:none}
.promos-track{display:flex;gap:12px;width:max-content}
.promo-card{width:175px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .2s;flex-shrink:0}
.promo-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--cta)}
.promo-img{aspect-ratio:4/3;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.promo-img img{width:100%;height:100%;object-fit:cover}
.promo-badge{position:absolute;top:7px;left:7px;background:var(--cta);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase}
.promo-body{padding:10px 12px 12px}
.promo-store-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.promo-name{font-family:var(--font-d);font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.promo-desc-short{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.promo-price-lbl{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--cta)}
.promos-divider{height:1px;background:var(--border);max-width:928px;margin:4px auto 0}

/* ── POPUP PROMO ── */
.promo-popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.promo-popup-bg.on{display:flex}
.promo-popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.28);animation:ppIn .22s cubic-bezier(.34,1.2,.64,1) both}
@keyframes ppIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pp-img-wrap{aspect-ratio:4/3;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;border-radius:var(--r-xl) var(--r-xl) 0 0}
.pp-img-wrap img{width:100%;height:100%;object-fit:cover}
.pp-close-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(0,0,0,.42);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.pp-body{padding:20px 22px 24px}
.pp-store-name{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.pp-prod-name{font-family:var(--font-d);font-size:20px;font-weight:800;margin-bottom:8px;line-height:1.2;color:var(--text)}
.pp-prod-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:14px}
.pp-prod-price{font-family:var(--font-d);font-size:28px;font-weight:800;color:var(--cta);margin-bottom:20px}
.pp-goto-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--cta);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b);text-decoration:none;transition:all .15s}
.pp-goto-btn:hover{background:var(--cta-dark);transform:translateY(-1px)}
.pp-goto-btn svg{width:14px;height:14px;flex-shrink:0}

/* FILTROS */
.filters-section{max-width:960px;margin:0 auto;padding:28px 16px 0}
.filter-section-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.filter-icon{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.fi-cat{background:var(--primary-light)}
.fi-loc{background:#fff3e0}
.chips-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.chip.on-cat{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip.on-loc{background:#e65100;color:#fff;border-color:#e65100}
.chip:hover:not(.on-cat):not(.on-loc){border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.chip.loc-chip:hover:not(.on-loc){border-color:#e65100;color:#e65100;background:#fff3e0}
.divider-line{height:1px;background:var(--border);margin:4px 0 16px}
.active-filters{max-width:960px;margin:0 auto;padding:0 16px 8px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
.active-filters.show{display:flex}
.af-label{font-size:11px;color:var(--muted);font-weight:500}
.af-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);border:1px solid var(--primary)}
.af-tag.loc{background:#fff3e0;color:#e65100;border-color:#e65100}
.af-tag button{background:none;border:none;cursor:pointer;color:inherit;font-size:13px;line-height:1;padding:0;opacity:.7}
.af-tag button:hover{opacity:1}
.clear-all{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--font-b)}
.clear-all:hover{color:var(--primary)}

/* GRID */
.dir-wrap{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.store-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column}
.store-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.store-banner{height:90px;background:var(--primary);background-size:cover;background-position:center;position:relative;flex-shrink:0}
.store-logo{width:52px;height:52px;border-radius:12px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.15);position:absolute;bottom:-22px;left:16px}
.store-logo img{width:100%;height:100%;object-fit:cover}
.store-body{padding:30px 16px 16px;flex:1;display:flex;flex-direction:column}
.store-name{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text)}
.store-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1;margin-bottom:10px}
.store-keywords{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.store-kw-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--primary-light);color:var(--primary);cursor:pointer;transition:all .12s}
.store-kw-tag:hover{background:var(--primary);color:#fff}
.store-loc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#fff3e0;color:#e65100;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px}
.store-loc-tag:hover{background:#e65100;color:#fff}
.store-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.store-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.store-tag.mayorista{background:#f3e8ff;color:#7c3aed}
.store-foot{display:flex;gap:8px}
.btn-visit{flex:1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-visit:hover{background:var(--primary-dark)}
.btn-qr{width:40px;height:40px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-qr:hover{border-color:var(--primary);background:var(--primary-light)}
.btn-qr svg{width:18px;height:18px;color:var(--muted)}
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.popup-bg.on{display:flex}
.popup{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.popup-banner{height:120px;background:var(--primary);background-size:cover;background-position:center;border-radius:var(--r-xl) var(--r-xl) 0 0;position:relative}
.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(0,0,0,.35);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.popup-logo{width:64px;height:64px;border-radius:14px;border:3px solid #fff;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.15);position:absolute;bottom:-28px;left:20px}
.popup-logo img{width:100%;height:100%;object-fit:cover}
.popup-body{padding:40px 20px 24px}
.popup-name{font-family:var(--font-d);font-size:22px;font-weight:800;margin-bottom:6px}
.popup-location{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.popup-keywords{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.popup-kw{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary)}
.popup-kw.loc{background:#fff3e0;color:#e65100}
.popup-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px}
.popup-qr{background:var(--bg);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px}
.popup-qr-label{font-size:11px;color:var(--muted);font-weight:500}
.popup-actions{display:flex;gap:10px}
.btn-cta{flex:1;padding:13px;background:var(--cta);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-cta:hover{background:var(--cta-dark)}
.btn-wa{padding:13px 16px;background:#25d366;color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-wa:hover{background:#1db954}
.btn-wa svg{width:20px;height:20px}
.qr-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.qr-modal-bg.on{display:flex}
.qr-box{background:#fff;border-radius:var(--r-xl);padding:28px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.qr-box h3{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:6px}
.qr-box p{font-size:11px;color:var(--muted);margin-bottom:16px}
.qr-close{margin-top:16px;padding:9px 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b)}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-ico{font-size:52px;margin-bottom:16px;opacity:.4}
.empty h3{font-family:var(--font-d);font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.count-badge{font-size:12px;color:var(--muted);margin-bottom:16px}
@media(max-width:480px){.dir-grid{grid-template-columns:1fr 1fr}.promo-card{width:152px}}
</style>
</head>
<body>

<script id="schema-ld" type="application/ld+json">{"@context":"https://schema.org","@type":"ItemList","name":"Directorio de Tiendas","numberOfItems":0,"itemListElement":[]}</script>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
  <div class="header-badge">🌐 Directorio de tiendas</div>
 <!-- // <h1>Todo en un solo lugar —<br><span>productos y servicios</span></h1> -->
 <!--  // <p id="header-desc">disponibles a tu necesidad</p> -->
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar tienda, producto, servicio o ciudad..." oninput="filterDir()">
    <button class="search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</div>

<!-- CARRUSEL PROMOS — visible solo cuando hay datos -->
<div class="promos-section" id="promos-section">
  <div class="promos-hdr">
    <div class="promos-label">
      <span class="promos-pulse"></span>
      Ofertas y promociones
    </div>
    <span class="promos-count" id="promos-count"></span>
  </div>
  <div class="promos-scroll">
    <div class="promos-track" id="promos-track"></div>
  </div>
</div>
<div style="height:1px;background:var(--border);max-width:928px;margin:4px auto 0;display:none" id="promos-divider"></div>

<!-- FILTROS CADENA 1 -->
<div class="filters-section">
  <div class="filter-section-label">
    <span class="filter-icon fi-cat">🛍</span>
    Cadena 1 — Productos y Servicios
  </div>
  <div class="chips-row" id="chips-cat">
    <div class="chip on-cat" onclick="setCatFilter('',this)">Todos</div>
    <div class="chip" onclick="setCatFilter('mayorista',this)" style="background:#f3e8ff;color:#7c3aed;border-color:#ddd6fe">★ Mayoristas</div>
  </div>
  <div class="divider-line"></div>
  <div class="filter-section-label">
    <span class="filter-icon fi-loc">📍</span>
    Cadena 2 — Ubicaciones
  </div>
  <div class="chips-row" id="chips-loc">
    <div class="chip on-loc" onclick="setLocFilter('',this)">Todas las ciudades</div>
  </div>
</div>

<div class="active-filters" id="active-filters">
  <span class="af-label">Filtrando por:</span>
  <span id="af-cat-tag" style="display:none"></span>
  <span id="af-loc-tag" style="display:none"></span>
  <button class="clear-all" onclick="clearAllFilters()">Limpiar todo</button>
</div>

<div class="dir-wrap">
  <div class="count-badge" id="count-badge"></div>
  <div class="dir-grid" id="dir-grid"><div class="spinner"></div></div>
</div>

<!-- POPUP PROMO -->
<div class="promo-popup-bg" id="promo-popup-bg" onclick="if(event.target===this)closePromoPopup()">
  <div class="promo-popup" id="promo-popup">
    <div class="pp-img-wrap" id="pp-img-wrap">
      <button class="pp-close-btn" onclick="closePromoPopup()">✕</button>
    </div>
    <div class="pp-body">
      <div class="pp-store-name" id="pp-store-name"></div>
      <div class="pp-prod-name"  id="pp-prod-name"></div>
      <div class="pp-prod-desc"  id="pp-prod-desc"></div>
      <div class="pp-prod-price" id="pp-prod-price"></div>
      <a class="pp-goto-btn" id="pp-goto-btn" href="#" target="_blank">
        Ir a la tienda
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</div>

<!-- POPUP TIENDA -->
<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-banner" id="popup-banner">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div class="popup-logo" id="popup-logo"></div>
    </div>
    <div class="popup-body">
      <div class="popup-name"     id="popup-name"></div>
      <div class="popup-location" id="popup-location"></div>
      <div class="popup-keywords" id="popup-keywords"></div>
      <div class="popup-desc"     id="popup-desc"></div>
      <div class="popup-qr"><div id="popup-qr-code"></div><div class="popup-qr-label">Escanea para visitar la tienda</div></div>
      <div class="popup-actions">
        <a class="btn-cta" id="popup-visit-btn" href="#" target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Visitar tienda
        </a>
        <button class="btn-wa" id="popup-wa-btn" style="display:none" onclick="openWA()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="qr-modal-bg" id="qr-modal-bg" onclick="if(event.target===this)closeQR()">
  <div class="qr-box">
    <h3 id="qr-store-name"></h3>
    <p>Escanea para visitar la tienda</p>
    <div id="qr-code-small"></div>
    <button class="qr-close" onclick="closeQR()">Cerrar</button>
  </div>
</div>

<script>
var params     = new URLSearchParams(location.search);
var BACKEND    = params.get('backend') || localStorage.getItem('ld_backend') || 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = params.get('storeBase') || 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
var ALL_STORES = [], activeCat = '', activeLoc = '', currentWA = '';

// ── HELPERS ───────────────────────────────────────────────────
function fixImgUrl(u) {
  if (!u) return '';
  var m = u.match(/[?&]id=([\w-]+)/); if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  var m2 = u.match(/\/d\/([\w-]+)/);  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  return u;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function buildStoreUrl(id) { return STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(id); }
function parseKw(raw)  { return raw ? raw.split(',').map(function(k){return k.trim();}).filter(Boolean) : []; }
function parseLoc(raw) { return raw ? raw.split(',')[0].trim() : ''; }
function fmtPrice(n, cur) {
  try { return new Intl.NumberFormat('es-MX',{style:'currency',currency:cur||'MXN'}).format(Number(n||0)); }
  catch(e) { return '$'+Number(n||0).toFixed(2); }
}

// ── CARGA ─────────────────────────────────────────────────────
window.addEventListener('load', async function() {
  if (!BACKEND) { document.getElementById('dir-grid').innerHTML='<div class="empty"><div class="empty-ico">⚙️</div><h3>Configuración requerida</h3><p>Agrega ?backend=TU_URL</p></div>'; return; }
  try {
    var r = await fetch(BACKEND + '?action=stores.directory');
    var d = JSON.parse(await r.text());
    var stores = (d.stores||[]).map(function(s){ s.config=(typeof s.config==='string')?JSON.parse(s.config):(s.config||{}); return s; });
    ALL_STORES = stores;
    buildFilterChains(stores);
    renderDir(stores);
    updateSEO(stores);
    buildPromoCarousel(stores); // async, no bloquea
  } catch(e) {
    document.getElementById('dir-grid').innerHTML = '<div class="empty"><div class="empty-ico">😕</div><h3>Error al cargar</h3><p>' + esc(e.message) + '</p></div>';
  }
});

// ── CARRUSEL PROMOS ───────────────────────────────────────────
async function buildPromoCarousel(stores) {
  // Fetch paralelo de catálogos — solo tiendas activas/en directorio
  var targets = stores.filter(function(s){ return s.config && s.config.inDirectory !== false; });
  var allPromos = [];

  await Promise.all(targets.map(function(s) {
    return fetch(BACKEND + '?action=store.catalog&storeId=' + encodeURIComponent(s.storeId))
      .then(function(r){ return r.json(); })
      .then(function(d){
        (d.products||[]).forEach(function(p){
          if ((p.active===true||p.active==='TRUE') &&
              p.category && p.category.trim().toLowerCase() === 'promo' &&
              p.imageUrl) {
            allPromos.push({ storeId:s.storeId, storeName:s.name, currency:s.config.currency||'MXN', p:p });
          }
        });
      })
      .catch(function(){});
  }));

  if (!allPromos.length) return;

  // Guardar para el popup
  window._PROMOS = allPromos;

  // Renderizar cards
  document.getElementById('promos-track').innerHTML = allPromos.map(function(item, idx) {
    var img  = fixImgUrl(item.p.imageUrl);
    var desc = (item.p.description||'').slice(0,55) + ((item.p.description||'').length>55?'…':'');
    return '<div class="promo-card" onclick="openPromoPopup(' + idx + ')">' +
      '<div class="promo-img">' +
        (img ? '<img src="'+esc(img)+'" loading="lazy" onerror="this.style.display=\'none\'">' : '🏷') +
        '<div class="promo-badge">Promo</div>' +
      '</div>' +
      '<div class="promo-body">' +
        '<div class="promo-store-lbl">'  + esc(item.storeName) + '</div>' +
        '<div class="promo-name">'        + esc(item.p.name)   + '</div>' +
        (desc?'<div class="promo-desc-short">'+esc(desc)+'</div>':'') +
        '<div class="promo-price-lbl">'  + fmtPrice(item.p.price, item.currency) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('promos-count').textContent = allPromos.length + ' promo' + (allPromos.length!==1?'s':'');
  document.getElementById('promos-section').classList.add('show');
  document.getElementById('promos-divider').style.display = '';
}

function openPromoPopup(idx) {
  var item = window._PROMOS && window._PROMOS[idx]; if (!item) return;
  var img  = fixImgUrl(item.p.imageUrl);
  var url  = buildStoreUrl(item.storeId);

  var wrap = document.getElementById('pp-img-wrap');
  wrap.innerHTML = '<button class="pp-close-btn" onclick="closePromoPopup()">✕</button>';
  if (img) {
    var el = document.createElement('img');
    el.src = img; el.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
    wrap.insertBefore(el, wrap.firstChild);
  }

  document.getElementById('pp-store-name').textContent  = item.storeName;
  document.getElementById('pp-prod-name').textContent   = item.p.name;
  document.getElementById('pp-prod-desc').textContent   = item.p.description || '';
  document.getElementById('pp-prod-price').textContent  = fmtPrice(item.p.price, item.currency);
  document.getElementById('pp-goto-btn').href           = url;

  document.getElementById('promo-popup-bg').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closePromoPopup() {
  document.getElementById('promo-popup-bg').classList.remove('on');
  document.body.style.overflow = '';
}

// ── FILTROS ───────────────────────────────────────────────────
function buildFilterChains(stores) {
  var kwSet={}, locSet={};
  stores.forEach(function(s){
    parseKw(s.config.keywords).forEach(function(k){ kwSet[k.toLowerCase()]=k; });
    var loc=parseLoc(s.config.storeLocation); if(loc) locSet[loc.toLowerCase()]=loc;
  });
  var catEl = document.getElementById('chips-cat');
  catEl.innerHTML = '<div class="chip on-cat" onclick="setCatFilter(\'\',this)">Todos</div><div class="chip" onclick="setCatFilter(\'mayorista\',this)" style="background:#f3e8ff;color:#7c3aed;border-color:#ddd6fe">★ Mayoristas</div>';
  Object.keys(kwSet).sort().forEach(function(kl){
    var c=document.createElement('div'); c.className='chip'; c.textContent=kwSet[kl];
    c.onclick=function(){ setCatFilter(kl,c); }; catEl.appendChild(c);
  });
  var locEl = document.getElementById('chips-loc');
  locEl.innerHTML = '<div class="chip on-loc" onclick="setLocFilter(\'\',this)">Todas las ciudades</div>';
  Object.keys(locSet).sort().forEach(function(ll){
    var c=document.createElement('div'); c.className='chip loc-chip'; c.textContent='📍 '+locSet[ll];
    c.onclick=function(){ setLocFilter(ll,c); }; locEl.appendChild(c);
  });
}

function setCatFilter(f,el){
  activeCat=f;
  document.querySelectorAll('#chips-cat .chip').forEach(function(c){c.classList.remove('on-cat');c.style.background='';c.style.color='';c.style.borderColor='';});
  el.classList.add('on-cat');
  if(f==='mayorista'){el.style.background='#7c3aed';el.style.color='#fff';el.style.borderColor='#7c3aed';}
  updateAF(); filterDir();
}
function setLocFilter(f,el){
  activeLoc=f;
  document.querySelectorAll('#chips-loc .chip').forEach(function(c){c.classList.remove('on-loc');});
  el.classList.add('on-loc'); updateAF(); filterDir();
}
function updateAF(){
  var af=document.getElementById('active-filters');
  var ct=document.getElementById('af-cat-tag'), lt=document.getElementById('af-loc-tag');
  af.classList.toggle('show',!!(activeCat||activeLoc));
  ct.style.display=activeCat?'':'none';
  if(activeCat) ct.innerHTML='<span class="af-tag">🛍 '+esc(activeCat)+' <button onclick="clearCat()">×</button></span>';
  lt.style.display=activeLoc?'':'none';
  if(activeLoc) lt.innerHTML='<span class="af-tag loc">📍 '+esc(activeLoc)+' <button onclick="clearLoc()">×</button></span>';
}
function clearCat(){activeCat='';document.querySelectorAll('#chips-cat .chip').forEach(function(c){c.classList.remove('on-cat');c.style.background='';c.style.color='';c.style.borderColor='';});document.querySelector('#chips-cat .chip').classList.add('on-cat');updateAF();filterDir();}
function clearLoc(){activeLoc='';document.querySelectorAll('#chips-loc .chip').forEach(function(c){c.classList.remove('on-loc');});document.querySelector('#chips-loc .chip').classList.add('on-loc');updateAF();filterDir();}
function clearAllFilters(){clearCat();clearLoc();document.getElementById('search-input').value='';}

function filterDir(){
  var q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  var list=ALL_STORES.filter(function(s){
    var cfg=s.config||{}, kws=parseKw(cfg.keywords), loc=parseLoc(cfg.storeLocation).toLowerCase(), kwt=kws.map(function(k){return k.toLowerCase();}).join(' ');
    var mQ=!q||[(s.name||'').toLowerCase(),(cfg.description||'').toLowerCase(),kwt,loc,(cfg.storeLocation||'').toLowerCase()].some(function(f){return f.includes(q);});
    var mC=!activeCat||(activeCat==='mayorista'?cfg.businessType==='mayorista':kws.some(function(k){return k.toLowerCase()===activeCat;}));
    var mL=!activeLoc||loc===activeLoc;
    return mQ&&mC&&mL;
  });
  renderDir(list);
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderDir(stores){
  var g=document.getElementById('dir-grid');
  document.getElementById('count-badge').textContent=stores.length+' tienda'+(stores.length!==1?'s':'')+' disponible'+(stores.length!==1?'s':'');
  if(!stores.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-ico">🏪</div><h3>Sin tiendas disponibles</h3><p>Prueba con otro filtro</p></div>';return;}
  g.innerHTML=stores.map(function(s){
    var cfg=s.config||{}, ini=(s.name||'?')[0].toUpperCase();
    var logoSrc=fixImgUrl(cfg.logo||cfg.logoUrl||''), bannerSrc=fixImgUrl(cfg.bannerUrl||'');
    var kws=parseKw(cfg.keywords), locC=parseLoc(cfg.storeLocation);
    var kwH=kws.slice(0,3).map(function(kw){return '<span class="store-kw-tag" onclick="event.stopPropagation();setCatFilterByVal(\''+esc(kw.toLowerCase())+'\')">'+esc(kw)+'</span>';}).join('');
    if(kws.length>3) kwH+='<span class="store-kw-tag" style="opacity:.6">+' +(kws.length-3)+'</span>';
    var locH=locC?'<span class="store-loc-tag" onclick="event.stopPropagation();setLocFilterByVal(\''+esc(locC.toLowerCase())+'\')">📍 '+esc(locC)+'</span>':'';
    return '<div class="store-card" onclick="openPopup(\''+s.storeId+'\')">' +
      '<div class="store-banner" style="'+(bannerSrc?'background-image:url('+bannerSrc+')':'background:var(--primary)')+'"><div class="store-logo">'+(logoSrc?'<img src="'+esc(logoSrc)+'" onerror="this.parentNode.textContent=\''+ini+'\'">':ini)+'</div></div>' +
      '<div class="store-body"><div class="store-name">'+esc(s.name)+'</div><div class="store-desc">'+esc((cfg.description||'Visita nuestra tienda').slice(0,80))+'</div>' +
      '<div class="store-keywords">'+kwH+locH+'</div>' +
      (cfg.businessType==='mayorista'?'<div class="store-tags"><span class="store-tag mayorista">★ Mayorista</span></div>':'') +
      '<div class="store-foot"><button class="btn-visit" onclick="event.stopPropagation();window.open(\''+buildStoreUrl(s.storeId)+'\',\'_blank\')">Ver tienda →</button><div class="btn-qr" onclick="event.stopPropagation();openQR(\''+s.storeId+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 20h3M20 17v3"/></svg></div></div>' +
      '</div></div>';
  }).join('');
}
function setCatFilterByVal(v){document.querySelectorAll('#chips-cat .chip').forEach(function(c){if(c.textContent.trim().toLowerCase()===v)setCatFilter(v,c);});}
function setLocFilterByVal(v){document.querySelectorAll('#chips-loc .chip').forEach(function(c){var l=c.textContent.replace('📍','').trim().toLowerCase();if(l===v)setLocFilter(v,c);});}

// ── SEO ───────────────────────────────────────────────────────
function updateSEO(stores){
  var kwSet={},locSet={};
  stores.forEach(function(s){parseKw(s.config.keywords).forEach(function(k){kwSet[k.toLowerCase()]=k;});var l=parseLoc(s.config.storeLocation);if(l)locSet[l.toLowerCase()]=l;});
  var kwC=Object.values(kwSet).join(', '),locC=Object.values(locSet).join(', '),comb=[kwC,locC].filter(Boolean).join(', ');
  document.getElementById('meta-keywords').content='tiendas, directorio, '+comb;
  var dt='Directorio de tiendas con: '+kwC+'. Ubicadas en: '+locC+'.';
  document.getElementById('meta-desc').content=dt; document.getElementById('og-desc').content=dt;
  document.title='Directorio — '+(kwC.slice(0,50)||'Tiendas')+' | '+(locC.slice(0,40)||'Localidades');
  if(kwC) document.getElementById('header-desc').textContent=kwC.slice(0,80)+(kwC.length>80?'…':'')+' — disponibles a tu necesidad';
  document.getElementById('schema-ld').textContent=JSON.stringify({'@context':'https://schema.org','@type':'ItemList','name':'Directorio de Tiendas','description':dt,'numberOfItems':stores.length,'keywords':comb,'itemListElement':stores.map(function(s,i){return{'@type':'ListItem','position':i+1,'item':{'@type':'LocalBusiness','name':s.name,'description':s.config.description||'','url':buildStoreUrl(s.storeId),'keywords':(s.config.keywords||'')+', '+(s.config.storeLocation||''),'address':{'@type':'PostalAddress','addressLocality':parseLoc(s.config.storeLocation)}}};})});
}

// ── POPUP TIENDA ──────────────────────────────────────────────
function openPopup(id){
  var s=ALL_STORES.find(function(x){return x.storeId===id;}); if(!s) return;
  var cfg=s.config||{},logo=fixImgUrl(cfg.logo||cfg.logoUrl||''),banner=fixImgUrl(cfg.bannerUrl||'');
  var ini=(s.name||'?')[0].toUpperCase(),url=buildStoreUrl(id),kws=parseKw(cfg.keywords),loc=parseLoc(cfg.storeLocation);
  currentWA=cfg.whatsapp||'';
  document.getElementById('popup-banner').style.background=banner?'url('+banner+') center/cover no-repeat':'var(--primary)';
  document.getElementById('popup-logo').innerHTML=logo?'<img src="'+esc(logo)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent=\''+ini+'\'">':ini;
  document.getElementById('popup-name').textContent=s.name||'';
  document.getElementById('popup-location').innerHTML=cfg.storeLocation?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> '+esc(cfg.storeLocation):'';
  document.getElementById('popup-keywords').innerHTML=kws.map(function(k){return'<span class="popup-kw">'+esc(k)+'</span>';}).join('')+(loc?'<span class="popup-kw loc">📍 '+esc(loc)+'</span>':'');
  document.getElementById('popup-desc').textContent=cfg.description||'Visita nuestra tienda y descubre todos nuestros productos y servicios.';
  document.getElementById('popup-visit-btn').href=url;
  document.getElementById('popup-wa-btn').style.display=currentWA?'flex':'none';
  var qe=document.getElementById('popup-qr-code'); qe.innerHTML='';
  try{new QRCode(qe,{text:url,width:140,height:140,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
  document.getElementById('popup-bg').classList.add('on');
  document.body.style.overflow='hidden';
}
function closePopup(){document.getElementById('popup-bg').classList.remove('on');document.body.style.overflow='';}
function openWA(){if(currentWA)window.open('https://wa.me/'+currentWA.replace(/\D/g,''),'_blank');}
function openQR(id){
  var s=ALL_STORES.find(function(x){return x.storeId===id;}); if(!s) return;
  document.getElementById('qr-store-name').textContent=s.name||'';
  var qe=document.getElementById('qr-code-small'); qe.innerHTML='';
  try{new QRCode(qe,{text:buildStoreUrl(id),width:180,height:180,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
  document.getElementById('qr-modal-bg').classList.add('on');
}
function closeQR(){document.getElementById('qr-modal-bg').classList.remove('on');}
</script>
