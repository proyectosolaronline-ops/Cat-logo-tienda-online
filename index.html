<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* Mantengo tus estilos intactos para que no cambie visualmente nada */
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --cta:#ff6900;--cta-dark:#e55c00;
  --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#717185;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* HEADER & SEARCH */
.header{background:linear-gradient(135deg,var(--primary) 0%,#0d47a1 100%);color:#fff;padding:48px 20px 56px;text-align:center;position:relative;overflow:hidden}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(6px)}
.header h1{font-family:var(--font-d);font-size:clamp(24px,5vw,42px);font-weight:800;line-height:1.1;margin-bottom:12px}
.header h1 span{color:#ffd54f}
.search-wrap{max-width:520px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:2}
.search-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);display:flex;align-items:center;overflow:hidden;border:1.5px solid var(--border)}
.search-box input{flex:1;padding:14px 16px;border:none;outline:none;font-size:14px}

/* FILTERS */
.filters-wrap{padding:24px 16px 8px;max-width:960px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* GRID */
.dir-wrap{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.store-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column}
.store-banner{height:90px;background-size:cover;background-position:center;position:relative}
.store-logo{width:52px;height:52px;border-radius:12px;border:3px solid #fff;background:#fff;position:absolute;bottom:-22px;left:16px;display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden}
.store-logo img{width:100%;height:100%;object-fit:cover}
.store-body{padding:30px 16px 16px;flex:1}
.store-name{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:4px}
.store-desc{font-size:12px;color:var(--muted);margin-bottom:12px;height:36px;overflow:hidden}
.store-foot{display:flex;gap:8px}
.btn-visit{flex:1;padding:10px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;text-align:center;text-decoration:none}

/* POPUP */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify(content):center;padding:16px;backdrop-filter:blur(4px)}
.popup-bg.on{display:flex;justify-content:center}
.popup{background:#fff;border-radius:var(--r-xl);width:100%;max-width:420px;overflow:hidden}
.popup-banner{height:120px;background-size:cover;position:relative}
.popup-close{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.3);color:#fff;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer}
.popup-body{padding:40px 20px 24px}
.popup-qr{background:#f5f6f7;padding:15px;text-align:center;border-radius:10px;margin:15px 0}
.popup-actions{display:flex;gap:10px}
.btn-cta{flex:1;background:var(--cta);color:#fff;padding:12px;border-radius:var(--r);text-align:center;text-decoration:none;font-weight:700}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">🌐 Directorio de tiendas</div>
  <h1>Todo en un solo lugar —<br><span>productos y servicios</span></h1>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar tienda..." oninput="filterDir()">
  </div>
</div>

<div class="filters-wrap">
  <div class="chip on" onclick="setFilter('',this)">Todas</div>
  <div class="chip" onclick="setFilter('mayorista',this)">★ Mayoristas</div>
</div>

<div class="dir-wrap">
  <div id="count-badge" class="count-badge"></div>
  <div class="dir-grid" id="dir-grid"></div>
</div>

<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-banner" id="popup-banner">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div id="popup-logo" style="width:60px;height:60px;background:#fff;position:absolute;bottom:-30px;left:20px;border-radius:10px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:bold;overflow:hidden"></div>
    </div>
    <div class="popup-body">
      <h2 id="popup-name" style="margin-bottom:10px"></h2>
      <p id="popup-desc" style="font-size:14px;color:#666;margin-bottom:15px"></p>
      <div class="popup-qr">
        <div id="popup-qr-code" style="display:flex;justify-content:center;margin-bottom:5px"></div>
        <small>Escanea para ir a la tienda</small>
      </div>
      <div class="popup-actions">
        <a id="popup-visit-btn" class="btn-cta" target="_blank">Visitar tienda ahora</a>
      </div>
    </div>
  </div>
</div>

<script>
// --- TU LÓGICA ORIGINAL RESTAURADA ---
var params = new URLSearchParams(location.search);
var BACKEND = params.get('backend') || 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
var STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';

var ALL_STORES = [];
var activeFilter = '';

function buildStoreUrl(storeId) {
  // Esta es la línea exacta que hace que la tienda abra
  return STORE_BASE + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(storeId);
}

function fixImgUrl(url) {
  if (!url) return '';
  var m = url.match(/[?&]id=([\w-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  return url;
}

window.addEventListener('load', async function() {
  try {
    var r = await fetch(BACKEND + '?action=stores.directory');
    var d = await r.json();
    ALL_STORES = (d.stores || []).map(s => {
      s.config = (typeof s.config === 'string') ? JSON.parse(s.config) : (s.config || {});
      return s;
    });
    renderDir(ALL_STORES);
  } catch(e) { console.error(e); }
});

function renderDir(stores) {
  var g = document.getElementById('dir-grid');
  document.getElementById('count-badge').textContent = stores.length + ' tiendas';
  
  g.innerHTML = stores.map(s => {
    var cfg = s.config || {};
    var url = buildStoreUrl(s.storeId);
    var logo = fixImgUrl(cfg.logo || cfg.logoUrl);
    return `
      <div class="store-card" onclick="openPopup('${s.storeId}')">
        <div class="store-banner" style="background-image:url('${fixImgUrl(cfg.bannerUrl)}');background-color:#1a73e8">
          <div class="store-logo">${logo ? `<img src="${logo}">` : s.name[0]}</div>
        </div>
        <div class="store-body">
          <div class="store-name">${s.name}</div>
          <div class="store-desc">${(cfg.description || '').slice(0,60)}...</div>
          <div class="store-foot">
            <a class="btn-visit" href="${url}" target="_blank" onclick="event.stopPropagation()">Abrir Tienda</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openPopup(storeId) {
  var s = ALL_STORES.find(x => x.storeId === storeId);
  if(!s) return;
  var url = buildStoreUrl(s.storeId);
  
  document.getElementById('popup-name').textContent = s.name;
  document.getElementById('popup-desc').textContent = s.config.description || '';
  document.getElementById('popup-visit-btn').href = url;
  document.getElementById('popup-banner').style.backgroundImage = `url('${fixImgUrl(s.config.bannerUrl)}')`;
  
  var qrEl = document.getElementById('popup-qr-code');
  qrEl.innerHTML = '';
  new QRCode(qrEl, { text: url, width: 120, height: 120 });
  
  document.getElementById('popup-bg').classList.add('on');
}

function closePopup() { document.getElementById('popup-bg').classList.remove('on'); }

function filterDir() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var filtered = ALL_STORES.filter(s => s.name.toLowerCase().includes(q));
  renderDir(filtered);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  // Lógica de filtro aquí si la necesitas
}
</script>
</body>
</html>
