<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tiendas Externas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;}
#map{width:100%;height:100dvh;}

.ext-pin{
  width:52px;height:52px;border-radius:50%;
  border:4px solid #f97316;object-fit:cover;display:block;
  box-shadow:0 3px 14px rgba(249,115,22,.65);
  background:#fff;
}
.ext-pin-ph{
  width:52px;height:52px;border-radius:50%;
  border:4px solid #f97316;
  background:linear-gradient(135deg,#f97316,#ea580c);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#fff;
  box-shadow:0 3px 14px rgba(249,115,22,.65);
}
.lf-popup .leaflet-popup-content-wrapper{
  border-radius:16px;padding:0;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.22);
  min-width:230px;
}
.lf-popup .leaflet-popup-content{margin:0;width:100%!important;}
.lf-popup .leaflet-popup-tip-container{display:none;}
.pop-foto{width:100%;height:120px;object-fit:cover;display:block;}
.pop-foto-ph{
  width:100%;height:90px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  display:flex;align-items:center;justify-content:center;font-size:36px;
}
.pop-body{padding:12px 14px 16px;}
.pop-name{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;}
.pop-loc{font-size:12px;color:#888;margin-bottom:10px;line-height:1.4;}
.pop-actions{display:flex;flex-direction:column;gap:7px;}
.pop-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border-radius:10px;font-size:13px;font-weight:700;
  text-decoration:none;color:#fff;
}
.pop-btn.azul{background:#1a73e8;}
.pop-btn.verde{background:#25d366;}
.yo-dot{
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:3px solid #16a34a;
  box-shadow:0 0 0 4px rgba(22,163,74,.25);
}
</style>
</head>
<body>
<div id="map"></div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';

/* ══════════════════════════════════════════
   fixImg — convierte cualquier URL de Google
   a URL directa de imagen descargable
   ══════════════════════════════════════════ */
function fixImg(u){
  if(!u) return '';

  // Google Drive: /file/d/ID/view  o  ?id=ID
  var m  = u.match(/[?&]id=([\w-]+)/);
  if(m)  return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2 = u.match(/\/d\/([\w-]+)/);
  if(m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];

  // Google Share link: share.google/... — no es imagen directa,
  // intentamos extraer el ID de 19+ caracteres que suelen contener
  var m3 = u.match(/\/([A-Za-z0-9_-]{19,})/);
  if(m3 && u.includes('google')) return 'https://lh3.googleusercontent.com/d/'+m3[1];

  // Google Photos / lh3
  if(u.includes('lh3.googleusercontent') || u.includes('googleusercontent')) return u;

  // URL normal
  return u;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('load', async function(){

  /* ── Mapa ── */
  var mapa = L.map('map',{zoomControl:true}).setView([22.5,-102.5],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapa);

  /* ── GPS usuario ── */
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      var icon=L.divIcon({html:'<div class="yo-dot"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
      L.marker([pos.coords.latitude,pos.coords.longitude],{icon})
       .addTo(mapa).bindTooltip('Tú',{permanent:false,direction:'top'});
    },null,{enableHighAccuracy:true,timeout:8000});
  }

  /* ── Cargar tiendas ── */
  try {
    var r    = await fetch(BACKEND+'?action=stores.directory');
    var data = await r.json();

    /* El backend filtra internamente status='activo', así que
       todo lo que llega con isExternal:true ya está activo */
    var externas = (data.stores||[]).filter(function(s){
      return s.isExternal === true;
    });

    if(!externas.length) return;

    var bounds = [];

    externas.forEach(function(s){
      var cfg = s.config || {};

      /* Coordenadas — vienen como string en cfg */
      var lat = parseFloat(String(cfg.locationLat||'').replace(',','.').trim());
      var lng = parseFloat(String(cfg.locationLng||'').replace(',','.').trim());
      if(isNaN(lat)||isNaN(lng)) return;

      /* Foto — cfg.logo = e.foto del sheet */
      var fotoRaw = cfg.logo || cfg.logoUrl || cfg.bannerUrl || '';
      var foto    = fixImg(fotoRaw);

      /* ── Pin ── */
      var pinHTML = foto
        ? '<img class="ext-pin" src="'+foto+'" onerror="this.outerHTML=\'<div class=\\\"ext-pin-ph\\\">🏪</div>\'">'
        : '<div class="ext-pin-ph">🏪</div>';

      var icon = L.divIcon({
        html      : pinHTML,
        className : '',
        iconSize  : [52,52],
        iconAnchor: [26,26]
      });

      /* ── Popup ── */
      var loc  = cfg.description || cfg.storeLocation || '';
      var link = cfg.linkNegocio || '';
      var tel  = (cfg.whatsapp||'').replace(/\D/g,'');

      var popHTML =
        (foto
          ? '<img class="pop-foto" src="'+foto+'" onerror="this.style.display=\'none\'">'
          : '<div class="pop-foto-ph">🏪</div>')+
        '<div class="pop-body">'+
          '<div class="pop-name">'+esc(s.name||'Tienda')+'</div>'+
          (loc?'<div class="pop-loc">📍 '+esc(loc)+'</div>':'')+
          '<div class="pop-actions">'+
            (link?'<a href="'+esc(link)+'" target="_blank" class="pop-btn azul">🔗 Ver negocio</a>':'')+
            (tel?'<a href="https://wa.me/'+tel+'" target="_blank" class="pop-btn verde">💬 WhatsApp</a>':'')+
          '</div>'+
        '</div>';

      L.marker([lat,lng],{icon})
        .addTo(mapa)
        .bindPopup(popHTML,{className:'lf-popup',maxWidth:260,minWidth:230});

      bounds.push([lat,lng]);
    });

    /* ── Centrar ── */
    if(bounds.length===1){
      mapa.setView(bounds[0],15);
    } else if(bounds.length>1){
      mapa.fitBounds(L.latLngBounds(bounds),{padding:[50,50],maxZoom:14});
    }

  } catch(e){
    console.error('Error tiendas externas:',e);
  }
});
</script>
</body>
</html>
