<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Directorio Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root { --primary:#1a73e8; --primary-dark:#0d47a1; --radius:16px; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ===== HEADER ===== */
#header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:12px 16px 10px;
  display:flex;flex-direction:column;gap:10px;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  flex-shrink:0;z-index:1100;
}
#header.hidden{transform:translateY(-100%);opacity:0;pointer-events:none;position:absolute;top:0;left:0;right:0;}
.header-top{display:flex;align-items:center;gap:12px;}
.header-logo{
  width:44px;height:44px;flex-shrink:0;
  background:rgba(255,255,255,.18);border-radius:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.header-title{font-size:13px;font-weight:700;line-height:1.3;opacity:.95;}
.header-sub{font-size:10px;opacity:.7;margin-top:1px;}

/* ===== SEARCH BAR ===== */
.search-wrap{
  padding:10px 16px 12px;
  background:linear-gradient(180deg,rgba(26,115,232,.08) 0%,transparent 100%);
  flex-shrink:0;z-index:1050;
}
#header.hidden + .search-wrap{padding-top:60px;}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:#fff;border-radius:50px;padding:0 14px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);height:46px;
}
.search-inner svg{flex-shrink:0;opacity:.45;}
#searchInput{
  flex:1;border:none;outline:none;font-size:15px;color:#222;background:transparent;
  font-family:'Inter',sans-serif;
}
#searchInput::placeholder{color:#aaa;}
#clearBtn{
  background:none;border:none;cursor:pointer;padding:4px;display:none;
  color:#999;font-size:20px;line-height:1;
}

/* ===== MAP ===== */
#map{flex:1;z-index:1;}

/* ===== FAB BUTTONS ===== */
.fab-group{
  position:absolute;bottom:28px;right:16px;
  display:flex;flex-direction:column;gap:12px;z-index:1200;
}
.fab{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 6px 20px rgba(0,0,0,.35);
  transition:transform .15s,box-shadow .15s;
  -webkit-user-select:none;user-select:none;
}
.fab:active{transform:scale(.93);box-shadow:0 3px 10px rgba(0,0,0,.3);}
.fab-list{background:var(--primary);color:#fff;}
.fab-qr{background:#fff;color:var(--primary);}

.btn-mostrar-bottom{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:1200;background:var(--primary);color:#fff;
  border:none;padding:13px 28px;border-radius:50px;font-size:15px;
  font-weight:600;box-shadow:0 6px 22px rgba(26,115,232,.5);
  cursor:pointer;white-space:nowrap;
}

/* ===== SEARCH RESULTS PANEL ===== */
#searchPanel{
  display:none;position:absolute;top:0;left:0;right:0;bottom:0;
  background:#f5f6fa;z-index:1300;flex-direction:column;overflow:hidden;
}
#searchPanel.active{display:flex;}
.sp-header{
  background:#fff;padding:14px 16px;border-bottom:1px solid #eee;
  display:flex;align-items:center;gap:10px;
}
.sp-search-inner{
  flex:1;display:flex;align-items:center;gap:8px;
  background:#f1f3f6;border-radius:50px;padding:0 14px;height:42px;
}
.sp-search-inner input{flex:1;border:none;outline:none;font-size:15px;background:transparent;font-family:'Inter',sans-serif;}
.sp-close{
  background:none;border:none;cursor:pointer;
  width:36px;height:36px;border-radius:50%;background:#f1f3f6;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#555;
}
.sp-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sp-empty{text-align:center;padding:60px 20px;color:#999;font-size:15px;}
.sp-item{
  display:flex;gap:14px;padding:14px 16px;background:#fff;
  border-bottom:1px solid #f0f0f0;cursor:pointer;align-items:center;
  transition:background .1s;
}
.sp-item:active{background:#f8f9ff;}
.sp-logo{
  width:58px;height:58px;flex-shrink:0;border-radius:14px;
  overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.sp-logo img{width:100%;height:100%;object-fit:cover;}
.sp-info h3{font-size:15px;font-weight:600;color:#111;margin-bottom:2px;}
.sp-info .sp-dist{font-size:12px;font-weight:600;color:#16a34a;}
.sp-info .sp-desc{font-size:12px;color:#777;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sp-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#e8f5e9;color:#2e7d32;font-weight:600;margin-right:6px;}

/* ===== POPUP DETALLE ===== */
.popup-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:2000;align-items:flex-end;justify-content:center;
  padding:0;
}
.popup-bg.open{display:flex;}
.popup{
  background:#fff;color:#222;border-radius:24px 24px 0 0;
  width:100%;max-height:88dvh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,.4);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.popup-drag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;display:block;}
.popup-banner{height:150px;background-size:cover;background-position:center;position:relative;margin:0 0 48px;}
.popup-close{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(0,0,0,.45);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.popup-logo{width:74px;height:74px;border-radius:16px;border:4px solid #fff;position:absolute;bottom:-37px;left:18px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.25);}
.popup-body{padding:0 18px 28px;}
.popup-name{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.popup-desc{line-height:1.6;color:#444;font-size:14px;margin-bottom:18px;}
.popup-btn{display:block;padding:14px;background:var(--primary);color:#fff;text-align:center;border-radius:14px;text-decoration:none;font-weight:600;font-size:15px;}

/* ===== MODAL LISTA ===== */
.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:2100;align-items:flex-end;justify-content:center;
}
.modal.open{display:flex;}
.modal-content{
  background:#fff;color:#222;width:100%;border-radius:24px 24px 0 0;
  max-height:82dvh;overflow:hidden;display:flex;flex-direction:column;
}
.modal-header{padding:16px 20px;background:var(--primary);color:#fff;font-weight:700;display:flex;justify-content:space-between;align-items:center;font-size:15px;}
.modal-close{font-size:26px;cursor:pointer;line-height:1;}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.store-item{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;align-items:center;}
.store-item:active{background:#f8f9ff;}
.store-logo{width:60px;height:60px;border-radius:14px;overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.store-logo img{width:100%;height:100%;object-fit:cover;}

/* ===== QR MODAL ===== */
.qr-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:2200;align-items:center;justify-content:center;padding:20px;
}
.qr-modal.open{display:flex;}
.qr-box{
  background:#fff;color:#222;border-radius:24px;
  padding:28px 24px 24px;max-width:320px;width:100%;text-align:center;
}
.qr-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.qr-sub{font-size:12px;color:#777;margin-bottom:20px;}
#qr-canvas{display:flex;justify-content:center;margin-bottom:20px;}
#qr-canvas canvas,#qr-canvas img{border-radius:12px;}
.qr-url{font-size:11px;color:#aaa;word-break:break-all;margin-bottom:18px;padding:8px 12px;background:#f5f5f5;border-radius:8px;}
.qr-actions{display:flex;gap:10px;}
.qr-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}
.qr-btn-share{background:var(--primary);color:#fff;}
.qr-btn-close{background:#f1f3f6;color:#444;}

/* ===== UTIL ===== */
.no-stores{text-align:center;padding:50px 20px;color:#999;font-size:14px;}
</style>
</head>
<body>

<!-- HEADER (se oculta al buscar) -->
<div id="header">
  <div class="header-top">
    <div class="header-logo" id="header-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Directorio Solar</div>
      <div class="header-sub">Tiendas de energía solar cerca de ti</div>
    </div>
  </div>
</div>

<!-- BARRA DE BÚSQUEDA (siempre visible) -->
<div class="search-wrap">
  <div class="search-inner">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Buscar tienda solar..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- MAPA -->
<div id="map"></div>

<!-- BOTÓN MOSTRAR TIENDAS (fijo abajo al centro) -->
<button class="btn-mostrar-bottom" id="btnList" onclick="showStoresModal()">
  📋 Tiendas cercanas
</button>

<!-- FABs derecha -->
<div class="fab-group">
  <button class="fab fab-qr" onclick="showQRModal()" title="Generar QR del mapa">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="5" y="5" width="3" height="3" fill="currentColor"/><rect x="16" y="5" width="3" height="3" fill="currentColor"/>
      <rect x="5" y="16" width="3" height="3" fill="currentColor"/>
      <path d="M14 14h3v3m0 4h3M17 14v3M14 21h3"/>
    </svg>
  </button>
</div>

<!-- PANEL DE RESULTADOS DE BÚSQUEDA -->
<div id="searchPanel">
  <div class="sp-header">
    <div class="sp-search-inner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput2" placeholder="Buscar tienda..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="sp-close" onclick="clearSearch()">✕</button>
  </div>
  <div class="sp-results" id="searchResults"></div>
</div>

<!-- POPUP DETALLE TIENDA -->
<div class="popup-bg" id="popup-bg" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <span class="popup-drag"></span>
    <div class="popup-banner" id="popup-banner">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div class="popup-logo" id="popup-logo"></div>
    </div>
    <div class="popup-body">
      <div class="popup-name" id="popup-name"></div>
      <div class="popup-desc" id="popup-desc"></div>
      <a id="popup-visit-btn" href="#" target="_blank" class="popup-btn">Ver tienda completa →</a>
    </div>
  </div>
</div>

<!-- MODAL LISTA TIENDAS -->
<div class="modal" id="stores-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-title">Tiendas cercanas (≤ 20 km)</span>
      <span class="modal-close" onclick="closeModal()">×</span>
    </div>
    <div class="modal-body" id="modal-stores-list"></div>
  </div>
</div>

<!-- MODAL QR -->
<div class="qr-modal" id="qr-modal">
  <div class="qr-box">
    <div class="qr-title">QR del Mapa Solar</div>
    <div class="qr-sub">Escanea para abrir este directorio</div>
    <div id="qr-canvas"></div>
    <div class="qr-url" id="qr-url-text"></div>
    <div class="qr-actions">
      <button class="qr-btn qr-btn-share" onclick="shareQR()">Compartir</button>
      <button class="qr-btn qr-btn-close" onclick="closeQRModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';
const STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
const RADIO_KM = 20;

let ALL_STORES = [], map, userLat = null, userLng = null, nearbyStores = [];
let searchTimeout = null;
let qrInstance = null;

function fixImgUrl(u){
  if(!u) return '';
  var m=u.match(/[?&]id=([\w-]+)/);
  if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2=u.match(/\/d\/([\w-]+)/);
  if(m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}
function haversineKm(la1,ln1,la2,ln2){
  var R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function buildStoreUrl(id){
  return STORE_BASE+'?backend='+encodeURIComponent(BACKEND)+'&store='+encodeURIComponent(id);
}

// ===== CARGA =====
window.addEventListener('load', async()=>{
  try{
    const r=await fetch(BACKEND+'?action=stores.directory');
    const data=await r.json();
    ALL_STORES=(data.stores||[]).map(s=>{
      s.config=typeof s.config==='string'?JSON.parse(s.config):(s.config||{});
      return s;
    });
  } catch(e){ console.warn('No se pudieron cargar tiendas'); }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat=pos.coords.latitude; userLng=pos.coords.longitude; initMap();
    },()=>{ userLat=19.4326; userLng=-99.1332; initMap(); });
  } else { userLat=19.4326; userLng=-99.1332; initMap(); }
});

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([userLat,userLng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.circleMarker([userLat,userLng],{radius:9,color:'#16a34a',fillColor:'#fff',weight:3,fillOpacity:1}).addTo(map);

  nearbyStores=ALL_STORES.filter(s=>{
    const cfg=s.config||{};
    const lat=parseFloat(cfg.locationLat), lng=parseFloat(cfg.locationLng);
    return !isNaN(lat)&&!isNaN(lng)&&haversineKm(userLat,userLng,lat,lng)<=RADIO_KM;
  });

  addMarkersToMap(nearbyStores);
}

function addMarkersToMap(stores){
  stores.forEach(s=>{
    const cfg=s.config||{};
    const lat=parseFloat(cfg.locationLat), lng=parseFloat(cfg.locationLng);
    if(isNaN(lat)||isNaN(lng)) return;
    const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const pinHTML=logoUrl
      ?`<img src="${logoUrl}" style="width:52px;height:52px;border-radius:50%;border:4px solid #fff;object-fit:cover;box-shadow:0 3px 10px rgba(0,0,0,.3);">`
      :`<div style="width:52px;height:52px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);">☀️</div>`;
    const icon=L.divIcon({html:pinHTML,className:'',iconSize:[56,56],iconAnchor:[28,28]});
    L.marker([lat,lng],{icon}).addTo(map).on('click',()=>openPopup(s.storeId));
  });
}

// ===== BÚSQUEDA =====
const searchInput = document.getElementById('searchInput');
const searchInput2 = document.getElementById('searchInput2');
const clearBtn = document.getElementById('clearBtn');
const header = document.getElementById('header');
const searchPanel = document.getElementById('searchPanel');

function syncSearch(val){
  searchInput.value=val;
  searchInput2.value=val;
}

searchInput.addEventListener('input', e=>{
  handleSearch(e.target.value);
});
searchInput2.addEventListener('input', e=>{
  syncSearch(e.target.value);
  renderSearchResults(e.target.value);
});

function handleSearch(val){
  syncSearch(val);
  clearBtn.style.display = val ? 'block' : 'none';
  if(val.trim().length > 0){
    header.classList.add('hidden');
    searchPanel.classList.add('active');
    renderSearchResults(val);
  } else {
    clearSearch();
  }
}

function clearSearch(){
  syncSearch('');
  clearBtn.style.display='none';
  header.classList.remove('hidden');
  searchPanel.classList.remove('active');
}

function renderSearchResults(query){
  const q=query.trim().toLowerCase();
  const results=ALL_STORES.filter(s=>{
    const cfg=s.config||{};
    const name=(s.name||'').toLowerCase();
    const desc=(cfg.description||'').toLowerCase();
    const city=(cfg.city||'').toLowerCase();
    return name.includes(q)||desc.includes(q)||city.includes(q);
  });

  const container=document.getElementById('searchResults');
  if(!results.length){
    container.innerHTML=`<div class="sp-empty">
      <div style="font-size:36px;margin-bottom:12px;">🔍</div>
      <div>No se encontraron tiendas con "<strong>${query}</strong>"</div>
    </div>`;
    return;
  }

  container.innerHTML='';
  results.forEach(s=>{
    const cfg=s.config||{};
    const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const lat=parseFloat(cfg.locationLat), lng=parseFloat(cfg.locationLng);
    const dist=userLat&&!isNaN(lat)?haversineKm(userLat,userLng,lat,lng).toFixed(1):null;
    const nearby=dist&&parseFloat(dist)<=RADIO_KM;

    const item=document.createElement('div');
    item.className='sp-item';
    item.innerHTML=`
      <div class="sp-logo">${logoUrl?`<img src="${logoUrl}" alt="${s.name}">`:'☀️'}</div>
      <div class="sp-info">
        <h3>${s.name||'Tienda'}</h3>
        ${dist?`<div class="sp-dist">📍 ${dist} km ${nearby?'<span class="sp-badge">Cercana</span>':''}</div>`:''}
        <div class="sp-desc">${cfg.description||'Tienda de energía solar'}</div>
      </div>
    `;
    item.onclick=()=>{
      clearSearch();
      if(!isNaN(lat)&&!isNaN(lng)) map.setView([lat,lng],15,{animate:true});
      setTimeout(()=>openPopup(s.storeId),350);
    };
    container.appendChild(item);
  });
}

// ===== POPUP DETALLE =====
function openPopup(id){
  const s=ALL_STORES.find(x=>x.storeId===id);
  if(!s) return;
  const cfg=s.config||{};
  const logo=fixImgUrl(cfg.logo||cfg.logoUrl||'');
  const banner=fixImgUrl(cfg.bannerUrl||'');
  document.getElementById('popup-banner').style.background=banner?`url(${banner}) center/cover`:'linear-gradient(135deg,#1a73e8,#0d47a1)';
  document.getElementById('popup-logo').innerHTML=logo?`<img src="${logo}" style="width:100%;height:100%;object-fit:cover">`:'☀️';
  document.getElementById('popup-name').textContent=s.name||'Tienda';
  document.getElementById('popup-desc').textContent=cfg.description||'Visita nuestra tienda de energía solar';
  document.getElementById('popup-visit-btn').href=buildStoreUrl(id);
  document.getElementById('popup-bg').classList.add('open');
}
function closePopup(){ document.getElementById('popup-bg').classList.remove('open'); }

// ===== MODAL LISTA =====
function showStoresModal(){
  const list=document.getElementById('modal-stores-list');
  list.innerHTML='';
  if(!nearbyStores.length){
    list.innerHTML='<div class="no-stores">No hay tiendas en un radio de 20 km.</div>';
  } else {
    document.getElementById('modal-title').textContent=`Tiendas cercanas — ${nearbyStores.length} encontradas`;
    nearbyStores.forEach(s=>{
      const cfg=s.config||{};
      const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
      const dist=userLat?haversineKm(userLat,userLng,parseFloat(cfg.locationLat||0),parseFloat(cfg.locationLng||0)).toFixed(1):'?';
      const item=document.createElement('div');
      item.className='store-item';
      item.innerHTML=`
        <div class="store-logo">${logoUrl?`<img src="${logoUrl}" alt="${s.name}">`:'☀️'}</div>
        <div>
          <h3 style="font-size:15px;font-weight:600;color:#111;">${s.name}</h3>
          <p style="color:#16a34a;font-weight:600;font-size:13px;">📍 ${dist} km</p>
          <p style="font-size:12px;color:#666;margin-top:2px;">${cfg.description||'Tienda solar'}</p>
        </div>
      `;
      item.onclick=()=>{ closeModal(); openPopup(s.storeId); };
      list.appendChild(item);
    });
  }
  document.getElementById('stores-modal').classList.add('open');
}
function closeModal(){ document.getElementById('stores-modal').classList.remove('open'); }

// ===== QR MODAL =====
function showQRModal(){
  const url=window.location.href;
  document.getElementById('qr-url-text').textContent=url;
  const canvas=document.getElementById('qr-canvas');
  canvas.innerHTML='';
  if(qrInstance){ try{qrInstance.clear();}catch(e){} }
  qrInstance=new QRCode(canvas,{
    text:url, width:200, height:200,
    colorDark:'#1a1a1a', colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.M
  });
  document.getElementById('qr-modal').classList.add('open');
}
function closeQRModal(){ document.getElementById('qr-modal').classList.remove('open'); }

async function shareQR(){
  const url=window.location.href;
  if(navigator.share){
    try{ await navigator.share({title:'Directorio Solar',text:'Encuentra tiendas de energía solar cerca de ti',url}); return; }
    catch(e){}
  }
  try{ await navigator.clipboard.writeText(url); alert('¡Enlace copiado!'); }
  catch(e){ alert('Comparte este enlace:\n'+url); }
}

// ===== TRIPLE TAP LOGO → DIRECTORIO =====
const DIRECTORIO_URL='https://proyectosolaronline-ops.github.io/SuperOnline-Stores/';
let tapCount=0, lastTapTime=0;
document.getElementById('header-logo').addEventListener('click',()=>{
  const now=Date.now();
  tapCount=(now-lastTapTime<400)?tapCount+1:1;
  lastTapTime=now;
  if(tapCount===3){
    tapCount=0;
    if(navigator.vibrate) navigator.vibrate([60,40,60,40,100]);
    const el=document.getElementById('header-logo');
    el.style.transition='transform .4s ease';
    el.style.transform='scale(1.3) rotate(10deg)';
    setTimeout(()=>{ el.style.transform='scale(1) rotate(0deg)'; },400);
    window.location.href=DIRECTORIO_URL;
  }
});
</script>
